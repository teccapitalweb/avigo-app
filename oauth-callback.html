<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AviGo</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #F0FDF4; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { text-align: center; padding: 40px 32px; }
.logo { font-size: 48px; margin-bottom: 16px; }
.titulo { font-size: 18px; font-weight: 800; color: #111827; margin-bottom: 8px; }
.sub { font-size: 13px; color: #6B7280; margin-bottom: 24px; }
.spinner { width: 32px; height: 32px; border: 3px solid #BBF7D0; border-top-color: #16A34A; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🐓</div>
  <div class="titulo">AviGo</div>
  <div class="sub" id="msg">Verificando...</div>
  <div class="spinner" id="spinner"></div>
</div>
<script>
(function() {
  function getParam(str, key) {
    var result = null;
    str.replace(/^[#?]/, '').split('&').forEach(function(p) {
      var kv = p.split('=');
      if (decodeURIComponent(kv[0]) === key && kv.length >= 2) {
        result = decodeURIComponent(kv.slice(1).join('='));
      }
    });
    return result;
  }

  var idToken     = getParam(location.hash, 'id_token')     || getParam(location.search, 'id_token');
  var accessToken = getParam(location.hash, 'access_token') || getParam(location.search, 'access_token');
  var error       = getParam(location.hash, 'error')        || getParam(location.search, 'error');

  if (error) {
    document.getElementById('msg').textContent = 'Error: ' + error;
    document.getElementById('spinner').style.display = 'none';
    return;
  }

  if (!idToken && !accessToken) {
    document.getElementById('msg').textContent = 'No se recibió el token.';
    document.getElementById('spinner').style.display = 'none';
    return;
  }

  document.getElementById('msg').textContent = '¡Listo! Volviendo a AviGo...';

  // Estrategia 1: ReactNativeWebView directo (si el callback carga dentro del WebView)
  if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(JSON.stringify({
      type: 'GOOGLE_TOKEN',
      idToken: idToken,
      accessToken: accessToken
    }));
    return;
  }

  // Estrategia 2: postMessage al opener (web popup)
  if (window.opener) {
    try {
      window.opener.postMessage({ type: 'AVIGO_GOOGLE_TOKEN', credential: idToken }, '*');
      setTimeout(function() { window.close(); }, 300);
    } catch(e) {}
    return;
  }

  // Estrategia 3: la URL ya tiene el token — openAuthSessionAsync del App.js
  // lo extrae directamente de result.url. Solo cerramos.
  // El App.js ya tiene el token porque la URL completa llega en result.url
  setTimeout(function() { window.close(); }, 500);
})();
</script>
</body>
</html>
