<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AviGo</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #F0FDF4; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { text-align: center; padding: 40px 32px; }
.logo { font-size: 48px; margin-bottom: 16px; }
.titulo { font-size: 18px; font-weight: 800; color: #111827; margin-bottom: 8px; }
.sub { font-size: 13px; color: #6B7280; margin-bottom: 24px; }
.spinner { width: 32px; height: 32px; border: 3px solid #BBF7D0; border-top-color: #16A34A; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🐓</div>
  <div class="titulo">AviGo</div>
  <div class="sub" id="msg">Verificando...</div>
  <div class="spinner" id="spinner"></div>
</div>
<script>
(function() {
  function getParam(source, key) {
    var result = null;
    (source || '').replace(/^[#?]/, '').split('&').forEach(function(p) {
      var eq = p.indexOf('=');
      if (eq > 0 && decodeURIComponent(p.slice(0, eq)) === key) {
        result = decodeURIComponent(p.slice(eq + 1));
      }
    });
    return result;
  }

  var h = window.location.hash;
  var s = window.location.search;

  var idToken     = getParam(h, 'id_token')     || getParam(s, 'id_token');
  var accessToken = getParam(h, 'access_token') || getParam(s, 'access_token');
  var avigoToken  = getParam(s, 'avigo_token');
  var error       = getParam(h, 'error')        || getParam(s, 'error');

  // Si ya venimos de la redirección interna — solo cerrar
  if (avigoToken) {
    document.getElementById('msg').textContent = 'Cerrando...';
    document.getElementById('spinner').style.display = 'none';
    setTimeout(function() { window.close(); }, 300);
    return;
  }

  if (error) {
    document.getElementById('msg').textContent = 'Error: ' + error;
    document.getElementById('spinner').style.display = 'none';
    return;
  }

  if (!idToken && !accessToken) {
    document.getElementById('msg').textContent = 'No se recibió token. Intenta de nuevo.';
    document.getElementById('spinner').style.display = 'none';
    return;
  }

  var token = idToken || accessToken;
  document.getElementById('msg').textContent = '¡Listo! Volviendo a AviGo...';

  // Estrategia 1: ReactNativeWebView directo
  try {
    if (window.ReactNativeWebView) {
      window.ReactNativeWebView.postMessage(JSON.stringify({
        type: 'GOOGLE_TOKEN',
        idToken: idToken,
        accessToken: accessToken
      }));
      return;
    }
  } catch(e) {}

  // Estrategia 2: Redirigir con token en query string
  // openAuthSessionAsync detecta esta URL y devuelve result.url con el token
  var returnUrl = window.location.href.split('?')[0].split('#')[0]
    + '?avigo_token=' + encodeURIComponent(token);
  window.location.replace(returnUrl);
})();
</script>
</body>
</html>
