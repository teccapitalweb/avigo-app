<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AviGo — Verificando...</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
    background: #F0FDF4;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    text-align: center;
    padding: 40px 32px;
  }
  .logo { font-size: 48px; margin-bottom: 16px; }
  .titulo {
    font-size: 18px;
    font-weight: 800;
    color: #111827;
    margin-bottom: 8px;
  }
  .sub {
    font-size: 13px;
    color: #6B7280;
    margin-bottom: 24px;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #BBF7D0;
    border-top-color: #16A34A;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error {
    display: none;
    background: #FEF2F2;
    border: 1px solid #FECACA;
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 13px;
    color: #DC2626;
    margin-top: 16px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🐓</div>
  <div class="titulo">AviGo</div>
  <div class="sub" id="msg">Verificando tu cuenta de Google...</div>
  <div class="spinner" id="spinner"></div>
  <div class="error" id="error-box"></div>
</div>

<script>
(function() {
  // ── Extraer id_token del hash de la URL ──────────────────
  var hash   = window.location.hash.substring(1);
  var params = {};
  hash.split('&').forEach(function(p) {
    var kv = p.split('=');
    if (kv.length === 2) params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1]);
  });

  var idToken = params['id_token'];
  var error   = params['error'];

  function mostrarError(msg) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').textContent = 'Algo salió mal';
    var box = document.getElementById('error-box');
    box.style.display = 'block';
    box.textContent = msg || 'No se pudo iniciar sesión con Google';
  }

  if (error) {
    mostrarError('Google reportó: ' + error);
    return;
  }

  if (!idToken) {
    mostrarError('No se recibió el token de Google. Intenta de nuevo.');
    return;
  }

  // ── Detectar si estamos dentro del APK (WebView Expo) ────
  // En APK: window.opener es null y ReactNativeWebView puede estar disponible
  // La estrategia: intentar postMessage a opener (web), si falla usar location redirect (APK)
  var esAPK = !window.opener || typeof window.ReactNativeWebView !== 'undefined';

  if (esAPK) {
    // ── APK: redirigir a deep link que App.js intercepta ──
    // App.js debe tener un Linking.addEventListener o manejar el scheme
    // El token va codificado en el fragment para que no llegue al servidor
    document.getElementById('msg').textContent = 'Volviendo a AviGo...';
    var redirect = 'avigo://oauth-callback#id_token=' + encodeURIComponent(idToken);
    window.location.href = redirect;

    // Fallback: si después de 2s no cerró, intentar con postMessage a parent
    setTimeout(function() {
      try {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'AVIGO_GOOGLE_TOKEN', credential: idToken }, '*');
        }
      } catch(e) {}
      // Último fallback: cerrar la ventana
      window.close();
    }, 2000);

  } else {
    // ── WEB: postMessage al opener (popup normal) ─────────
    try {
      window.opener.postMessage({ type: 'AVIGO_GOOGLE_TOKEN', credential: idToken }, '*');
      document.getElementById('msg').textContent = '¡Listo! Cerrando...';
      setTimeout(function() { window.close(); }, 800);
    } catch(e) {
      mostrarError('No se pudo comunicar con la app. Cierra esta ventana e intenta de nuevo.');
    }
  }
})();
</script>
</body>
</html>
