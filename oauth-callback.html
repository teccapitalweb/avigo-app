<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AviGo</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #F0FDF4; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { text-align: center; padding: 40px 32px; }
.logo { font-size: 48px; margin-bottom: 16px; }
.titulo { font-size: 18px; font-weight: 800; color: #111827; margin-bottom: 8px; }
.sub { font-size: 13px; color: #6B7280; margin-bottom: 24px; }
.spinner { width: 32px; height: 32px; border: 3px solid #BBF7D0; border-top-color: #16A34A; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🐓</div>
  <div class="titulo">AviGo</div>
  <div class="sub" id="msg">Verificando...</div>
  <div class="spinner" id="spinner"></div>
</div>
<script>
(function() {
  function getParam(str, key) {
    var result = null;
    (str || '').replace(/^[#?]/, '').split('&').forEach(function(p) {
      var eq = p.indexOf('=');
      if (eq > 0) {
        var k = decodeURIComponent(p.slice(0, eq));
        var v = decodeURIComponent(p.slice(eq + 1));
        if (k === key) result = v;
      }
    });
    return result;
  }

  var hash    = window.location.hash;
  var search  = window.location.search;

  var idToken     = getParam(hash, 'id_token')     || getParam(search, 'id_token');
  var accessToken = getParam(hash, 'access_token') || getParam(search, 'access_token');
  var error       = getParam(hash, 'error')        || getParam(search, 'error');

  if (error) {
    document.getElementById('msg').textContent = 'Error: ' + error;
    document.getElementById('spinner').style.display = 'none';
    return;
  }

  if (!idToken && !accessToken) {
    document.getElementById('msg').textContent = 'No se recibió token. Intenta de nuevo.';
    document.getElementById('spinner').style.display = 'none';
    return;
  }

  document.getElementById('msg').textContent = '¡Listo! Volviendo a AviGo...';

  var token = idToken || accessToken;

  // Estrategia 1: Redirigir a una URL con el token en query string
  // openAuthSessionAsync detecta esta URL y la devuelve en result.url
  // El App.js la lee y extrae el token
  var returnUrl = 'https://teccapitalweb.github.io/avigo-app/oauth-callback.html'
    + '?avigo_token=' + encodeURIComponent(token)
    + '&token_type=' + (idToken ? 'id_token' : 'access_token');

  // Si ya estamos en la URL con avigo_token — no redirigir de nuevo
  var yaRedirigido = getParam(search, 'avigo_token');
  if (yaRedirigido) {
    // El App.js ya leyó esta URL — solo cerrar
    document.getElementById('msg').textContent = 'Cerrando...';
    setTimeout(function() { window.close(); }, 500);
    return;
  }

  // Redirigir con el token en query string (no en fragment)
  // Así openAuthSessionAsync detecta la URL completa
  window.location.replace(returnUrl);
})();
</script>
</body>
</html>
