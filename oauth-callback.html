<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AviGo</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #F0FDF4; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { text-align: center; padding: 40px 32px; }
.logo { font-size: 48px; margin-bottom: 16px; }
.titulo { font-size: 18px; font-weight: 800; color: #111827; margin-bottom: 8px; }
.sub { font-size: 13px; color: #6B7280; margin-bottom: 24px; }
.spinner { width: 32px; height: 32px; border: 3px solid #BBF7D0; border-top-color: #16A34A; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🐓</div>
  <div class="titulo">AviGo</div>
  <div class="sub" id="msg">Verificando tu cuenta...</div>
  <div class="spinner" id="spinner"></div>
</div>
<script>
(function() {
  function getParams(str) {
    var p = {};
    str.replace(/^[#?]/, '').split('&').forEach(function(part) {
      var kv = part.split('=');
      if (kv.length >= 2) p[decodeURIComponent(kv[0])] = decodeURIComponent(kv.slice(1).join('='));
    });
    return p;
  }

  var hashParams  = getParams(window.location.hash);
  var queryParams = getParams(window.location.search);
  var idToken = hashParams['id_token'] || queryParams['id_token'];
  var error   = hashParams['error']    || queryParams['error'];

  if (error) {
    document.getElementById('msg').textContent = 'Error: ' + error;
    document.getElementById('spinner').style.display = 'none';
    return;
  }

  if (!idToken) {
    document.getElementById('msg').textContent = 'No se recibió token. Intenta de nuevo.';
    document.getElementById('spinner').style.display = 'none';
    return;
  }

  document.getElementById('msg').textContent = '¡Listo! Entrando a AviGo...';

  // Estrategia 1: ReactNativeWebView (APK con WebView)
  try {
    if (window.ReactNativeWebView) {
      window.ReactNativeWebView.postMessage(JSON.stringify({
        type: 'GOOGLE_TOKEN',
        idToken: idToken
      }));
      return;
    }
  } catch(e) {}

  // Estrategia 2: opener (popup web)
  try {
    if (window.opener) {
      window.opener.postMessage({ type: 'AVIGO_GOOGLE_TOKEN', credential: idToken }, '*');
      setTimeout(function() { window.close(); }, 500);
      return;
    }
  } catch(e) {}

  // Estrategia 3: parent (iframe)
  try {
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'AVIGO_GOOGLE_TOKEN', credential: idToken }, '*');
      return;
    }
  } catch(e) {}

  setTimeout(function() { window.close(); }, 1000);
})();
</script>
</body>
</html>
