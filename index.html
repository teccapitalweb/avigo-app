function urlBase64ToUint8Array(base64String) {
  var padding = '='.repeat((4 - base64String.length % 4) % 4);
  var base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  var rawData = window.atob(base64);
  var outputArray = new Uint8Array(rawData.length);
  for (var i = 0; i < rawData.length; ++i) {
    outputArray[i] = rawData.charCodeAt(i);
  }
  return outputArray;
}

function inicializarPush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    return;
  }
  navigator.serviceWorker.register('/avigo-app/sw.js')
  .then(function(reg) {
    return reg.pushManager.getSubscription();
  })
  .then(function(sub) {
    if (sub) {
      _pushSuscripcion = sub;
      if (avigoTieneSession()) {
        sincronizarSuscripcion(sub);
      }
    }
  })
  .catch(function(err) {
  });
}

function suscribirPush(callback) {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    if (callback) callback(false, 'No soportado');
    return;
  }
  navigator.serviceWorker.ready.then(function(reg) {
    return reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
  })
  .then(function(sub) {
    _pushSuscripcion = sub;
    sincronizarSuscripcion(sub);
    if (callback) callback(true);
  })
  .catch(function(err) {
    if (callback) callback(false, err.message);
  });
}

function sincronizarSuscripcion(sub) {

  var subJson = sub.toJSON();
  fetch(AVIGO_API + '/push/suscribir', {
    method: 'POST',
    headers: avigoHeaders(),
    body: JSON.stringify({
      endpoint:    subJson.endpoint,
      p256dh:      subJson.keys.p256dh,
      auth:        subJson.keys.auth,
      dispositivo: navigator.userAgent.substring(0, 100),
      sistema:     granja.sistema || 'jaula'
    })
  }).catch(function() {});
}

function desuscribirPush(callback) {
  if (!_pushSuscripcion) { if (callback) callback(true); return; }
  var endpoint = _pushSuscripcion.endpoint;
  _pushSuscripcion.unsubscribe()
  .then(function() {
    _pushSuscripcion = null;
    if (avigoTieneSession()) {

        method: 'DELETE',
        headers: avigoHeaders(),
        body: JSON.stringify({ endpoint })
      }).catch(function() {});
    }
    if (callback) callback(true);
  })
  .catch(function() { if (callback) callback(false); });

function avigoRenovarTokenSiNecesario() {
  if (!avigoTieneSession()) return;
  try {
    var parts = _avigoSession.token.split('.');
    if (parts.length !== 3) return;
    var payload = JSON.parse(atob(parts[1]));
    var ahora = Math.floor(Date.now() / 1000);
    var diasRestantes = (payload.exp - ahora) / 86400;
    if (diasRestantes < 30) {
      fetch(AVIGO_API + '/auth/refresh', {
        method: 'POST',
        headers: avigoHeaders()
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.token) {
          _avigoSession.token = data.token;
          try { localStorage.setItem('avigo_session', JSON.stringify(_avigoSession)); } catch(e) {}
        }
      })
      .catch(function() { /* silencioso */ });
    }
  } catch(e) { /* silencioso */ }
}

function avigoFlushSyncCola() {
  if (!avigoTieneSession()) return;
  try {
    var cola = JSON.parse(localStorage.getItem('avigo_sync_cola') || '[]');
    if (!cola.length) return;
    var pendientes = cola.slice();
    localStorage.removeItem('avigo_sync_cola');
    pendientes.forEach(function(item) {
      if (item.tipo === 'registro' && item.granjaId) {
        fetch(AVIGO_API + '/registros/' + item.granjaId, {
          method: 'POST',
          headers: avigoHeaders(),
          body: JSON.stringify(item.data)
        }).catch(function() {
          try {
            var c2 = JSON.parse(localStorage.getItem('avigo_sync_cola') || '[]');
            c2.push(item);
            localStorage.setItem('avigo_sync_cola', JSON.stringify(c2));
          } catch(e) {}
        });
      }
    });
  } catch(e) {}

    })

    if (data.resultados) {
    }
  })

}

function avigoCargarDatos() {
  if (!avigoTieneSession()) { nav('splash'); return; }

  var yaHayDatosLocal = granja.lotes && granja.lotes.length > 0 &&
    granja.lotes[0] && granja.lotes[0].granjaData &&
    granja.lotes[0].granjaData.numAves > 0;

  if (yaHayDatosLocal) {
    nav('dash');
    setTimeout(function() {
      fetch(AVIGO_API + '/sync/status', { headers: avigoHeaders() })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.granjas === 0) avigoSyncGranja(granja);
        avigoFlushSyncCola();
      })
      .catch(function() {});
    }, 2000);
    return;
  }

  fetch(AVIGO_API + '/sync/status', { headers: avigoHeaders() })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.granjas > 0) {
      return fetch(AVIGO_API + '/sync', { headers: avigoHeaders() })
        .then(function(r) { return r.json(); })
        .then(function(syncData) {
          if (syncData && syncData.lotes && syncData.lotes.length > 0) {
            granja.lotes = syncData.lotes;
            granja.loteActivo = syncData.loteActivo || 0;
            if (syncData.notifActiva !== undefined) granja.notifActiva = syncData.notifActiva;
            if (syncData.recordatorios) granja.recordatorios = syncData.recordatorios;
            if (typeof _aplicarLote === 'function') _aplicarLote(granja.loteActivo);
            if (typeof guardarEnStorage === 'function') guardarEnStorage();
          }
          nav('dash');
        })
        .catch(function() { nav('dash'); });
    } else {
      nav('ob1');
    }

    nav('splash');
  });
}

});

var _calcDashCache = null;
var _calcDashLoteActivo = -1;
var _calcDashHistLen = -1;
function calcDash(){
  var loteActual = granja.loteActivo || 0;
  var histLen = historial ? historial.length : 0;
  if (_calcDashCache && _calcDashLoteActivo === loteActual && _calcDashHistLen === histLen) {
    return _calcDashCache;
  }
  _calcDashLoteActivo = loteActual;
  _calcDashHistLen = histLen;
  var _result = _calcDashImpl();
  _calcDashCache = _result;
  return _result;
}
function _invalidarCacheCalcDash(){ _calcDashCache = null; }
function _calcDashImpl(){
  const g = granja;
  const raza  = g.raza || RAZAS[0];
  const etapa = g.etapa || ETAPAS_DATA[3];
  const aves  = (g.avesVivas>0) ? g.avesVivas : (g.numAves>0 ? g.numAves : 5000);
  const sem   = (g.semanaVida>0) ? g.semanaVida : 1;
  const precio= (g.precioKgAl>0) ? g.precioKgAl : 0;

  const gAveDia   = (g.raza && g.raza.consumo) ? g.raza.consumo : (etapa.consumo || 112);
  const kgDia     = parseFloat((aves * gAveDia / 1000).toFixed(1));
  const gastoDia  = Math.round(kgDia * precio);
  const gastoCiclo= Math.round(gastoDia * sem * 7);

  const pctPostura = (sem >= 21 && sem <= 70) ? (etapa.id==='p1'?94.2:91.5) : 0;
  const huevosDia  = Math.round(aves * pctPostura / 100);

  const aguaRangeStr = (raza && raza.ag) ? raza.ag : '200-210 ml/dГӯa';
  const aguaMatch = aguaRangeStr.match(/(\d+)/);
  const aguaLtDia = aguaMatch ? Math.round(aves * parseInt(aguaMatch[1]) / 1000) : 0;

  const semRestantes = Math.max(0, 80 - sem);

  const diasEnPostura = (sem >= 21) ? (sem - 20) * 7 : 0;

  const etapaNom = etapa.nombre || 'Postura';
  const etapaCol = etapa.color || '#16A34A';

  return { kgDia, gastoDia, gastoCiclo, pctPostura, huevosDia,
           aguaLtDia, semRestantes, diasEnPostura, sem, aves,
           raza, etapa, etapaNom, etapaCol, precio,
           sistema: g.sistema, granjaNombre: g.nombre || 'Mi Granja',
             registradoHoy: (historial.length>0 && historial[0] && historial[0].fecha===new Date().toISOString().split('T')[0]) ? true : false,
  };
}

function pedirGPSsiNoHayCoords(){
  if(!navigator.geolocation) return;             // dispositivo sin GPS
  navigator.geolocation.getCurrentPosition(
    function(pos){
      var lat = pos.coords.latitude;
      var lon = pos.coords.longitude;
      granja.climaLat = lat;
      granja.climaLon = lon;
      guardarEnStorage();
      fetchTemperatura(lat, lon, function(temp){
        var inp = document.getElementById('inp-temp');
        if(inp && (!inp.value || inp.value == '22')){ inp.value = temp; }
        actualizarClimaEnDash(temp, null);
      });
    },
    function(){ /* usuario denegГі вҖ” silencioso, no molestar */ },
    { timeout: 10000, enableHighAccuracy: false, maximumAge: 600000 }
  );
}

function detectarGPS(){
  const btn = document.getElementById('gps-btn');
  const msg = document.getElementById('gps-msg');
  if(!navigator.geolocation){ showToast('GPS no disponible en este dispositivo'); return; }
  if(msg){ msg.style.display='block'; msg.textContent='рҹ“Қ Detectando ubicaciГіn...'; }
  if(btn){ btn.style.opacity='.6'; btn.style.pointerEvents='none'; }
  navigator.geolocation.getCurrentPosition(
    function(pos){
      var lat = pos.coords.latitude, lon = pos.coords.longitude;
      granja.climaLat = lat;
      granja.climaLon = lon;
      guardarEnStorage();
      fetchTemperatura(lat, lon, null);
      if(msg){ msg.textContent='вң“ UbicaciГіn detectada В· '+lat.toFixed(3)+', '+lon.toFixed(3); }
      if(btn){ btn.style.opacity='1'; btn.style.pointerEvents='auto'; btn.textContent='вң“ GPS activo'; }
      var selEstado = document.getElementById('sel-estado');
      if(selEstado && lat > 17 && lat < 22 && lon > -100 && lon < -96){
        selEstado.value = 'PUE';
        cargarMunicipios('PUE');
        setTimeout(function(){
          var selMun = document.getElementById('sel-municipio');
          if(selMun){ selMun.value=''; if(selMun.options[0]) selMun.options[0].text='-- Confirma tu municipio --'; }
        }, 100);
      }
      showToast('вң“ UbicaciГіn detectada correctamente');
    },
    function(err){
      if(msg){ msg.style.display='none'; }
      if(btn){ btn.style.opacity='1'; btn.style.pointerEvents='auto'; }
      var errMsgs={1:'Permiso denegado вҖ” elige manualmente',2:'GPS no disponible',3:'Tiempo agotado вҖ” elige manualmente'};
      showToast(errMsgs[err.code] || 'No se pudo obtener el GPS вҖ” elige manualmente');
    },
    { timeout: 8000, enableHighAccuracy: true }
  );
}

function cargarMunicipios(estadoId){
  var sel = document.getElementById('sel-municipio');
  var altInp = document.getElementById('inp-altitud');
  var altBadge = document.getElementById('alt-badge');
  if(!sel) return;
  var estEl = document.getElementById('sel-estado');
  if(estEl && estEl.selectedIndex >= 0){
    var opt = estEl.options[estEl.selectedIndex];
    granja.estado = opt ? opt.text : estadoId;
  }
  sel.disabled = false;
  sel.innerHTML = '<option value="">-- Selecciona tu municipio --</option>';
  var muns = getMunicipios(estadoId);
  muns.forEach(function(m){
    var opt = document.createElement('option');
    opt.value = m.alt; opt.textContent = m.n;
    sel.appendChild(opt);
  });
  if(altInp){ altInp.value=''; altInp.placeholder='Selecciona municipio primero'; }
  if(altBadge){ altBadge.style.display='none'; }
}

function setAltitud(alt, munNombre){
  var inp = document.getElementById('inp-altitud');
  var badge = document.getElementById('alt-badge');
  if(inp && alt){
    inp.value = alt;
    if(badge){ badge.style.display='flex'; }
  }
  if(munNombre && munNombre !== '-- Selecciona tu municipio --'){
    granja.municipio = munNombre;
  }
  if(alt) granja.altitud = parseInt(alt) || 0;
}

function togglePass(inputId, btn){
  const inp = document.getElementById(inputId);
  if(!inp) return;
  if(inp.type==='password'){ inp.type='text'; btn.textContent='Ocultar'; }
  else { inp.type='password'; btn.textContent='Ver'; }
}

function calcPostura(val, totalAves){
  const h = parseInt(val) || 0;
  const pct = totalAves > 0 ? (h/totalAves*100).toFixed(1) : 0;
  const el = document.getElementById('daily-pct');
  if(el){ el.textContent = pct+'%'; el.style.color = pct>=90?'#16A34A':pct>=80?'#D97706':'#EF4444'; }
}
function calcMortalidad(val, totalAves){
  const b = parseInt(val) || 0;
  const pct = totalAves > 0 ? (b/totalAves*100).toFixed(2) : 0;
  const el = document.getElementById('daily-mort-pct');
  if(el){ el.textContent = pct+'%'; el.style.color = pct<0.1?'#16A34A':pct<0.3?'#D97706':'#EF4444'; }
}
function calcGAve(val, totalAves){
  const kg = parseFloat(val) || 0;
  const gAve = totalAves > 0 ? Math.round(kg*1000/totalAves) : 0;
  const disp = document.getElementById('g-ave-display');
  if(disp){ disp.textContent = gAve || 'вҖ”'; }
  const precio = granja.precioKgAl || 0;
  const costoEl = document.getElementById('costo-dia-display');
  const costoVal = document.getElementById('costo-dia-val');
  if(kg > 0 && precio > 0 && costoEl && costoVal){
    costoEl.style.display = 'block';
    costoVal.textContent = '$' + Math.round(kg*precio).toLocaleString('es-MX') + ' MXN';
  } else if(costoEl){
    costoEl.style.display = 'none';
  }
}

function calcAlimento(){
  const aves = parseInt(document.getElementById('ob4-aves')?.value) || 0;
  const precio = parseFloat(document.getElementById('inp-precio')?.value) || 0;
  const resultado = document.getElementById('calc-resultado');
  const resKg = document.getElementById('res-kg');
  const resCosto = document.getElementById('res-costo');
  const resMes = document.getElementById('res-mes');

  if(!currentAlimento || aves <= 0 || precio <= 0){
    if(resultado) resultado.style.display='none';
    return;
  }
  const kgDia = (aves * currentAlimento.consumo / 1000);
  const costoDia = kgDia * precio;
  const costoMes = costoDia * 30;

  if(resultado) resultado.style.display='block';
  if(resKg) resKg.textContent = kgDia.toFixed(1)+' kg';
  if(resCosto) resCosto.textContent = '$'+Math.round(costoDia).toLocaleString('es-MX');
  if(resMes) resMes.textContent = '$'+Math.round(costoMes).toLocaleString('es-MX');
}

function calcPost(inp){
  const val = parseInt(inp.value.replace(/,/g,''))||0;
  const pct = ((val/4980)*100).toFixed(1);
  const parent = inp.closest('.card');
  if(parent){
    const display = parent.querySelector('[data-post]');
    if(display) display.textContent = pct+'%';
  }
}

function _normCliente(c){
  if(!c || !c.nombre) return null;
  var q = parseInt(c.cantidad) || parseInt(c.docenas) || 0;
  var u = ['pieza','docena','cono','caja180','caja360'].indexOf(c.unidad)>=0 ? c.unidad : 'docena';
  if(q<=0) return null;
  return {nombre:String(c.nombre).trim(), unidad:u, cantidad:q};
}

function _limpiarClientesCorruptos(){
  if(granja.clientesJaula){
    granja.clientesJaula = granja.clientesJaula
      .map(_normCliente).filter(Boolean);
  }
  if(granja.traspatio && granja.traspatio.clientes){
    granja.traspatio.clientes = granja.traspatio.clientes
      .map(_normCliente).filter(Boolean);
  }
  try{ guardarEnStorage(); } catch(e){}
}

function cargarDeStorage(){
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);

    if(data.v === 2){
      granja.lotes      = data.lotes || [];
      granja.loteActivo = data.loteActivo || 0;
      if(data.notifActiva !== undefined) granja.notifActiva = data.notifActiva;
      if(data.notifHora)    granja.notifHora    = data.notifHora;
      if(data.recordatorios && Object.keys(data.recordatorios).length > 0){
        granja.recordatorios = data.recordatorios;
      }
      _aplicarLote(granja.loteActivo);
      _limpiarClientesCorruptos();
    } else {
      granja.lotes = [];
      var lote0 = {
        id:           Date.now(),
        nombre:       (data.g && data.g.nombre) || 'Lote principal',
        historial:    data.historial || [],
        alertas:      data.alertas   || [],
        vacunas:      data.vacunas   || [],
        recordatorios:data.recordatorios || {},
        granjaData:   data.g || {},
      };
      if(data.lotes && data.lotes.length > 0){
        data.lotes.forEach(function(l, li){
          if(li === 0){
            lote0.historial = l.historial || lote0.historial;
          } else {
            granja.lotes.push({
              id:           l.id || Date.now()+li,
              nombre:       l.nombre || 'Lote '+(li+1),
              historial:    l.historial || [],
              alertas:      [],
              vacunas:      JSON.parse(JSON.stringify(VAC_SCHEDULE)),
              recordatorios:{},
              granjaData: {
                razaId:    l.razaId,
                sistema:   l.sistema,
                numAves:   l.numAves,
                avesVivas: l.avesVivas,
                semVida:   l.semanaVida,
                etapaId:   l.etapaId,
                fInicio:   l.fechaInicio,
                precioKg:  l.precioKgAl,
                nombre:    l.nombre,
                precioH:   0,
              },
            });
          }
        });
      }
      granja.lotes.unshift(lote0);
      granja.loteActivo = data.loteActivo || 0;
      _aplicarLote(granja.loteActivo);
      setTimeout(guardarEnStorage, 500);
    }
    return true;
  } catch(e){ console.error('cargarDeStorage error:', e); return false; }
}

function _aplicarLote(idx){
  if(!granja.lotes || granja.lotes.length === 0) return;
  if(idx < 0) idx = 0;
  if(idx >= granja.lotes.length) idx = granja.lotes.length - 1;
  granja.loteActivo = idx;
  var l = granja.lotes[idx];
  var g = l.granjaData || {};

  granja.nombre      = l.nombre || g.nombre || 'Mi Granja';
  granja.estado      = g.estado      || '';
  granja.municipio   = g.municipio   || '';
  granja.altitud     = g.altitud     || 0;
  granja.galpones    = g.galpones    || 1;
  granja.raza        = RAZAS.find(function(r){ return r.id===g.razaId; }) || RAZAS[0];
  granja.sistema     = g.sistema     || 'jaula';
  granja.numAves     = g.numAves     || 0;
  granja.semanaVida  = g.semVida     || 0;
  granja.etapa       = ETAPAS_DATA.find(function(e){ return e.id===g.etapaId; }) || null;
  granja.fechaInicio = g.fInicio     || null;
  granja.precioKgAl  = g.precioKg    || 0;
  granja.avesVivas   = g.avesVivas   || g.numAves || 0;
  granja.precioHuevo = g.precioH     || 0;
  granja.kgBulto     = g.kgBulto     || 40;
  granja.inventarioKg= g.inventarioKg|| 0;
  granja.bultosCompra= g.bultosCompra|| 0;
  granja.tempHoy     = g.tempHoy     || 22;
  granja.climaLat    = g.climaLat    || null;
  granja.climaLon    = g.climaLon    || null;
  currentAlimento    = granja.etapa;

  historial          = (l.historial  || []).slice();
  alertas            = (l.alertas    || []).slice();
  granja.vacunas     = l.vacunas     || JSON.parse(JSON.stringify(VAC_SCHEDULE));
  if(!granja.recordatorios || Object.keys(granja.recordatorios).length === 0){
    granja.recordatorios = l.recordatorios || {};
  }
  function _fixCliente(c){
    if(!c||!c.nombre||!c.nombre.trim()) return null;
    var q = c.cantidad!==undefined ? parseInt(c.cantidad) : c.docenas!==undefined ? parseInt(c.docenas) : -1;
    if(isNaN(q)||q<=0) return null;
    var u = ['pieza','docena','cono','caja180','caja360'].indexOf(c.unidad)>=0 ? c.unidad : 'docena';
    return {nombre:c.nombre.trim(), unidad:u, cantidad:q};
  }
  var rawCJ = l.clientesJaula || (l.granjaData && l.granjaData.clientesJaula) || [];
  granja.clientesJaula = rawCJ.map(_fixCliente).filter(Boolean);
  var rawTP = l.traspatio || (l.granjaData && l.granjaData.traspatio) || {};
  if(rawTP.clientes) rawTP.clientes = rawTP.clientes.map(_fixCliente).filter(Boolean);
  granja.traspatio = rawTP;
  granja.registradoHoy = historial.length>0 && historial[0] &&
    historial[0].fecha === new Date().toISOString().split('T')[0];
}


function agregarAlHistorial(h, b, kg){
  const d    = calcDash();
  const hoy  = new Date().toISOString().split('T')[0];
  historial  = historial.filter(r=>r.fecha !== hoy);
  const pPost  = d.aves>0 && h>0 ? parseFloat((h/d.aves*100).toFixed(2)) : 0;
  const pMort  = d.aves>0 && b>0 ? parseFloat((b/d.aves*100).toFixed(3)) : 0;
  const gasto  = parseFloat((kg*(granja.precioKgAl||0)).toFixed(2));
  const ingreso= granja.precioHuevo>0 ? parseFloat((h*granja.precioHuevo).toFixed(2)) : 0;
  historial.unshift({fecha:hoy, huevos:h, bajas:b, kg, pctPostura:pPost, mortalidad:pMort, gastoDia:gasto, ingresoDia:ingreso});
  if(historial.length>90) historial = historial.slice(0,90);
  chkAlertas(pPost, pMort);
}

function alertasSinLeer(){ return alertas.filter(a=>!a.leida).length; }

function chkAlertas(pPost, pMort){
  const hoy  = new Date().toISOString().split('T')[0];
  const ayer = historial[1];
  if(ayer && ayer.pctPostura>0){
    const caida = ayer.pctPostura - pPost;
    if(caida>=3) alertas.unshift({tipo:'danger',emoji:'рҹ“ү',titulo:'CaГӯda de postura',msg:'Postura bajГі '+caida.toFixed(1)+'% vs ayer ('+ayer.pctPostura+'% вҶ’ '+pPost+'%)',fecha:hoy,leida:false});
  }
  if(pMort>=0.1) alertas.unshift({tipo:'danger',emoji:'вҡ пёҸ',titulo:'Mortalidad elevada',msg:'Mortalidad de '+pMort.toFixed(3)+'% supera el lГӯmite normal de 0.1%',fecha:hoy,leida:false});
  var _picoStr = (granja.raza&&granja.raza.pico) ? String(granja.raza.pico) : '90-94%';
  const picoMin = parseFloat(_picoStr.split('-')[0]) || 88;
  if(pPost>0 && pPost<picoMin-5) alertas.unshift({tipo:'warning',emoji:'рҹ””',titulo:'Postura bajo estГЎndar',msg:pPost+'% estГЎ por debajo del mГӯnimo esperado para '+(granja.raza?granja.raza.n:'esta raza'),fecha:hoy,leida:false});
  if(pPost>=95) alertas.unshift({tipo:'success',emoji:'рҹҺү',titulo:'Excelente producciГіn',msg:pPost+'% вҖ” Por encima del estГЎndar de la raza. ВЎGran dГӯa!',fecha:hoy,leida:false});
  alertas = alertas.slice(0,30);
}

function renderPeriodo(dias){
  function fmx(n){ return (n||0).toLocaleString('es-MX'); }
    var datos = historial.slice(0, dias);
    if(!datos.length) return '<div style="text-align:center;padding:40px 20px;color:#9CA3AF;font-size:14px;font-weight:600">Sin registros aГәn.<br>Registra tu primer dГӯa para ver el historial.</div>';

    var avgP  = (datos.reduce(function(s,r){return s+r.pctPostura;},0)/datos.length).toFixed(1);
    var avgM  = (datos.reduce(function(s,r){return s+r.mortalidad;},0)/datos.length).toFixed(3);
    var totH  = datos.reduce(function(s,r){return s+r.huevos;},0);
    var totG  = datos.reduce(function(s,r){return s+r.gastoDia;},0);
    var totI  = datos.reduce(function(s,r){return s+r.ingresoDia;},0);
    var gan   = totI - totG;
    var maxP  = Math.max.apply(null, datos.map(function(r){return r.pctPostura;}));
    var minP  = Math.min.apply(null, datos.map(function(r){return r.pctPostura;}));
    var mejorDia = datos.find(function(r){return r.pctPostura===maxP;});
    var peorDia  = datos.find(function(r){return r.pctPostura===minP;});

    var html='';

function updPrecio(tipo, val){
  var v = parseFloat(val) || 0;
  var pieza = tipo==='p' ? v : tipo==='d' ? v/12 : tipo==='k' ? v/16 : tipo==='c' ? v/360 : 0;
  if(pieza > 0){
    granja.precioHuevo = pieza;
    guardarEnStorage();
    var pp = document.getElementById('pr-pieza');
    var pd = document.getElementById('pr-doc');
    var pk = document.getElementById('pr-kg');
    var pc = document.getElementById('pr-caja');
    if(pp && tipo!=='p') pp.value = pieza.toFixed(2);
    if(pd && tipo!=='d') pd.value = (pieza*12).toFixed(1);
    if(pk && tipo!=='k') pk.value = (pieza*16).toFixed(1);
    if(pc && tipo!=='c') pc.value = Math.round(pieza*360);
    var d = calcDash();
    var ingDia = Math.round(d.huevosDia * pieza);
    var ganDia = ingDia - d.gastoDia;
    var margen = ingDia>0 ? ((ganDia/ingDia)*100).toFixed(1) : 0;
    var cg = function(n){ return n>=0?'#16A34A':'#EF4444'; };
    var bg = function(n){ return n>=0?'#F0FDF4':'#FEF2F2'; };
    var ri = document.getElementById('r-ing');
    var rg = document.getElementById('r-gan');
    var rb = document.getElementById('r-gan-box');
    var rm = document.getElementById('r-margen');
    if(ri) ri.textContent = '$'+Math.round(ingDia).toLocaleString('es-MX');
    if(rg){ rg.textContent = (ganDia>=0?'+':'')+Math.round(ganDia).toLocaleString('es-MX'); rg.style.color=cg(ganDia); }
    if(rb) rb.style.background = bg(ganDia);
    if(rm){ rm.textContent = 'Margen neto: '+margen+'%'; rm.style.color = cg(ganDia); }
  }
}

function guardarRegistro(){
  var h  = parseInt(document.getElementById('inp-huevos') ? document.getElementById('inp-huevos').value : 0)||0;
  var b  = parseInt(document.getElementById('inp-bajas')  ? document.getElementById('inp-bajas').value  : 0)||0;
  var kg = parseFloat(document.getElementById('inp-kg')   ? document.getElementById('inp-kg').value     : 0)||0;
  if(!h&&!b&&!kg){ showToast('Ingresa al menos un dato antes de guardar'); return; }
  if(b>0) granja.avesVivas = Math.max(0, granja.avesVivas-b);
  granja.registradoHoy = true;
  agregarAlHistorial(h, b, kg);
  guardarEnStorage();
  var btnReg = document.querySelector('button[onclick="guardarRegistro()"]') ||
               document.getElementById('btn-guardar-registro');

    btnReg.style.background = '#15803D';

  }
  showToast('вң“ Registro guardado correctamente');
  setTimeout(function(){ nav('dash'); }, 1000);
}

      semVida:   datos.semanaVida|| 0,
      etapaId:   datos.etapaId   || 'p3',
      fInicio:   datos.fechaInicio|| new Date().toISOString().split('T')[0],
      precioKg:  datos.precioKgAl|| 7,

      kgBulto:   40,

      tempHoy:   22,

  };
  nuevoLote.clientesJaula = [];

function activarNotificacionesPush() {
  var esNativo = (typeof window.AVIGO_NATIVE !== 'undefined' && window.AVIGO_NATIVE);

  if (esNativo) {
    if (typeof window.ReactNativeWebView !== 'undefined') {
      showToast('Activando notificaciones...');
      window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'REGISTER_PUSH' }));
      var _attempts = 0;
      var _timer = setInterval(function() {
        _attempts++;
        if (window.AVIGO_PUSH_TOKEN) {
          clearInterval(_timer);
          showToast('Notificaciones activadas');
          _recargarBannerPush();
        } else if (_attempts >= 60) {
          clearInterval(_timer);
          showToast('Ve a Ajustes > AviGo > Notificaciones y activalas');
        }
      }, 300);
    } else {
      showToast('Error: ReactNativeWebView no disponible');
    }
    return;
  }

  if (!('Notification' in window)) {
    showToast('Tu navegador no soporta notificaciones');
    return;
  }
  Notification.requestPermission().then(function(permiso) {
    if (permiso === 'granted') {
      suscribirPush(function(ok, err) {
        if (ok) {
          _recargarBannerPush();
        } else {
          showToast('Error al activar: ' + (err || 'desconocido'));
        }
      });
    } else if (permiso === 'denied') {
      showToast('Permiso denegado. Activalo desde Configuracion del navegador');
    }
  });
}

function avigoResetPassword() {
  var pass  = (document.getElementById('reset-pass')  || {}).value || '';
  var pass2 = (document.getElementById('reset-pass2') || {}).value || '';
  var msgEl = document.getElementById('reset-msg');
  var btn   = document.getElementById('reset-btn');

  if (pass.length < 6) {
    if (msgEl) { msgEl.style.display='block'; msgEl.style.background='#FEF2F2'; msgEl.style.color='#DC2626'; msgEl.textContent='La contrasena debe tener minimo 6 caracteres'; }
    return;
  }
  if (pass !== pass2) {
    if (msgEl) { msgEl.style.display='block'; msgEl.style.background='#FEF2F2'; msgEl.style.color='#DC2626'; msgEl.textContent='Las contrasenas no coinciden'; }
    return;
  }

  var urlParams = new URLSearchParams(window.location.search);
  var token = urlParams.get('reset');
  if (!token) {
    if (msgEl) { msgEl.style.display='block'; msgEl.style.background='#FEF2F2'; msgEl.style.color='#DC2626'; msgEl.textContent='Enlace invalido. Solicita uno nuevo.'; }

  }

  if (btn) { btn.disabled=true; btn.textContent='Guardando...'; }
  if (msgEl) msgEl.style.display='none';

  fetch(AVIGO_API + '/auth/reset-password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token: token, password: pass })
  })
  .then(function(r) { return r.json().then(function(d){ return { ok: r.ok, data: d }; }); })
  .then(function(res) {
    if (btn) { btn.disabled=false; btn.textContent='Guardar nueva contrasena'; }

    }
  })

    if (btn) { btn.disabled=false; btn.textContent='Guardar nueva contrasena'; }
    if (msgEl) { msgEl.style.display='block'; msgEl.style.background='#FEF2F2'; msgEl.style.color='#DC2626'; msgEl.textContent='Sin conexion. Verifica tu internet.'; }

  });
}

function avigoIniciarGoogle() {
  var esNativo = (typeof window.AVIGO_NATIVE !== 'undefined' && window.AVIGO_NATIVE)
    || (typeof window.ReactNativeWebView !== 'undefined');

  var nonce = Math.random().toString(36).slice(2);

  if (esNativo) {
    showToast('Abriendo cuenta de Google...');
    window.ReactNativeWebView.postMessage(JSON.stringify({
      type:   'GOOGLE_LOGIN',
      nonce:  nonce,
      client: GOOGLE_CLIENT_ID
    }));
    function _onGoogleDone() {
      window.removeEventListener('avigo_google_done', _onGoogleDone);
      var token = window.AVIGO_GOOGLE_CREDENTIAL;
      window.AVIGO_GOOGLE_CREDENTIAL = null;
      if (token) {
        avigoLoginGoogle(token);
      } else {
        showToast('Inicio con Google cancelado');
      }
    }
    window.addEventListener('avigo_google_done', _onGoogleDone);
    return;
  }

  var w = 500, h = 600;
  var left = Math.round((screen.width - w) / 2);
  var top  = Math.round((screen.height - h) / 2);
  var redirectUri = encodeURIComponent(window.location.origin + window.location.pathname + 'oauth-callback.html');
  var url = 'https://accounts.google.com/o/oauth2/v2/auth'
    + '?client_id=' + GOOGLE_CLIENT_ID
    + '&redirect_uri=' + redirectUri
    + '&response_type=id_token'
    + '&scope=openid%20email%20profile'
    + '&nonce=' + nonce
    + '&prompt=select_account';

  var popup = window.open(url, 'google_login',
    'width=' + w + ',height=' + h + ',left=' + left + ',top=' + top + ',scrollbars=yes');

  if (!popup) {
    showToast('Permite popups para iniciar sesion con Google');
  }
}

var _introIdx   = 0;
var _introTotal = 6;
function _introGoTo(n){
  var sls = document.querySelectorAll('.intro-slide');
  var dts = document.querySelectorAll('.intro-dot');
  if(!sls.length) return;
  var old = _introIdx;
  _introIdx = n;
  sls[old].style.opacity = '0';
  sls[old].style.transform = n > old ? 'translateX(-40px)' : 'translateX(40px)';
  sls[old].style.pointerEvents = 'none';
  sls[_introIdx].style.transform = n > old ? 'translateX(40px)' : 'translateX(-40px)';
  sls[_introIdx].style.opacity = '0';
  sls[_introIdx].style.pointerEvents = 'auto';
  setTimeout(function(){
    sls[_introIdx].style.opacity = '1';
    sls[_introIdx].style.transform = 'translateX(0)';
  }, 20);
  dts.forEach(function(d,i){
    d.style.width = i===_introIdx ? '22px' : '7px';
    d.style.background = i===_introIdx ? '#16A34A' : '#D1FAE5';
  });
  var btn = document.getElementById('intro-next-btn');
  if(btn){ btn.textContent = _introIdx === _introTotal-1 ? '\u00a1Comenzar!' : 'Siguiente \u2192'; }
}
function introNext(){ if(_introIdx < _introTotal-1){ _introGoTo(_introIdx+1); } else { introSkip(); } }
function introDot(n){ _introGoTo(n); }
function introSkip(){ try{ localStorage.setItem('avigo_intro_seen','1'); }catch(e){} _introIdx=0; nav('splash'); }

function agregarNuevoLote(){
  var nombreEl  = document.getElementById('nl-nombre');
  var avesEl    = document.getElementById('nl-aves');
  var semEl     = document.getElementById('nl-sem');
  var razaEl    = document.getElementById('nl-raza');
  var sistemaEl = document.getElementById('nl-sistema');
  var precioEl  = document.getElementById('nl-precio');

  if(!avesEl || !avesEl.value || parseInt(avesEl.value)<=0){
    showToast('вҡ  Ingresa el nГәmero de aves'); return;
  }
  if(!semEl || !semEl.value || parseInt(semEl.value)<=0){
    showToast('вҡ  Ingresa la semana de vida'); return;
  }

  var numAves  = parseInt(avesEl.value);
  var semV     = parseInt(semEl.value);
  var nombreV  = (nombreEl && nombreEl.value.trim()) ? nombreEl.value.trim() : ('Lote #'+(granja.lotes.length+1));
  var razaId   = razaEl   ? razaEl.value   : 'hylbrown';
  var sistemaV = sistemaEl? sistemaEl.value: 'jaula';
  var precioV  = (precioEl && precioEl.value) ? parseFloat(precioEl.value) : granja.precioKgAl;
  var etapa    = ETAPAS_DATA.find(function(e){ return semV>=e.min&&semV<=e.max; }) || ETAPAS_DATA[3];

  if(!granja.lotes) granja.lotes = [];

  var newIdx = crearLote({
    nombre:      nombreV,
    razaId:      razaId,
    sistema:     sistemaV,
    numAves:     numAves,
    avesVivas:   numAves,
    semanaVida:  semV,
    etapaId:     etapa.id,
    fechaInicio: new Date().toISOString().split('T')[0],
    precioKgAl:  precioV||granja.precioKgAl||7,
  });

  guardarEnStorage();

  var btn = document.getElementById('btn-crear-lote');
  if(btn){
    btn.textContent = 'вң“ Lote creado';
    btn.style.background = '#15803D';
    btn.disabled = true;

  showToast('вң“ Lote "'+nombreV+'" creado');

    guardarEnStorage();
    nav('dash');
  }, 600);
}

function calcAguaAjustada(avesVivas, raza, tempAmbiente){
  var aguaBase = avesVivas * (parseInt((raza&&raza.ag?raza.ag:'200').match(/\d+/)[0])||200);
  var temp     = parseFloat(tempAmbiente)||22;
  var factor   = temp>20 ? 1 + (temp-20)*0.05 : 1;
  return Math.round(aguaBase * factor / 1000); // litros
}

function programarNotificacion(){
  if(!granja.notifActiva || Notification.permission!=='granted') return;

  var urgente = generarMensajeInteligente();
  if(urgente && urgente.p >= 8){
    enviarNotif(urgente.titulo, urgente.body, urgente.tag);
  }

  var partes   = (granja.notifHora||'07:00').split(':');
  var ahora    = new Date();
  var objetivo = new Date();
  objetivo.setHours(parseInt(partes[0])||7, parseInt(partes[1])||0, 0, 0);
  var diff = objetivo - ahora;
  if(diff < 0) diff += 86400000;

  setTimeout(function(){
    if(Notification.permission==='granted' && granja.notifActiva){
      var msg = generarMensajeInteligente();
      if(msg){
        enviarNotif(msg.titulo, msg.body, msg.tag);
      } else {
        enviarNotif('AviGo вҖ” Buenos dГӯas рҹҢ…', 'Empieza el dГӯa registrando '+granja.nombre+'. Toca para abrir la app.', 'buenos-dias');
      }
    }
    var tarde = new Date();
    tarde.setHours(17, 0, 0, 0);
    var diffTarde = tarde - new Date();
    if(diffTarde > 0){
      setTimeout(function(){
        if(Notification.permission==='granted' && granja.notifActiva){
          var hoyStr = new Date().toISOString().split('T')[0];
          var yaReg  = historial.length>0 && historial[0].fecha===hoyStr;
          if(!yaReg){
            enviarNotif('рҹҢҶ AГәn no registraste hoy вҖ” '+granja.nombre, 'Son las 5pm. Registra postura, mortalidad y alimento antes de que termine el dГӯa.', 'recordatorio-tarde');
          }
        }
      }, diffTarde);
    }
    if(granja.notifActiva) programarNotificacion();
  }, Math.min(diff, 86400000));
}

function calcAguaPorTemp(aves, raza, tempC){
  var t    = parseFloat(tempC) || 22;
  var base = parseInt(((raza && raza.ag) ? raza.ag : '200').match(/\d+/)[0]) || 200;
  var factor, aguaRazon;
  if(t < 12)      { factor = 0.70; aguaRazon = 'FrГӯo extremo вҖ” aves rechazan agua muy frГӯa'; }
  else if(t < 18) { factor = 0.85; aguaRazon = 'Temperatura baja вҖ” menor consumo de agua'; }
  else if(t < 25) { factor = 1.00; aguaRazon = 'Temperatura ideal вҖ” consumo normal'; }
  else if(t < 28) { factor = 1.15; aguaRazon = 'Temperatura alta вҖ” mayor necesidad de agua'; }
  else if(t < 31) { factor = 1.30; aguaRazon = 'Calor elevado вҖ” aumenta frecuencia de llenado'; }
  else if(t < 34) { factor = 1.55; aguaRazon = 'Calor alto вҖ” riesgo de deshidrataciГіn'; }
  else if(t < 36) { factor = 1.80; aguaRazon = 'Calor extremo вҖ” bebederos siempre llenos'; }
  else            { factor = 2.00; aguaRazon = 'CRГҚTICO вҖ” doble de agua, ventila de inmediato'; }
  var mlAve  = Math.round(base * factor);
  var litros = Math.round(aves * mlAve / 1000);
  var nivel  = t >= 35 ? 'critico' : t >= 28 ? 'alto' : t >= 18 ? 'normal' : 'bajo';
  var factorAl, alRazon, alIcono;
  if(t < 12)      { factorAl = 1.08; alRazon = 'FrГӯo extremo вҖ” las gallinas gastan mГЎs energГӯa en calentarse. Dale 8% mГЎs de alimento para compensar.'; alIcono = 'вқ„пёҸ'; }
  else if(t < 18) { factorAl = 1.04; alRazon = 'Temperatura frГӯa вҖ” consume mГЎs alimento para mantener el calor corporal. Se sugiere 4% extra.'; alIcono = 'рҹҢӨпёҸ'; }
  else if(t < 25) { factorAl = 1.00; alRazon = 'Temperatura ideal (18-24В°C) вҖ” consumo de alimento normal segГәn tu raza.'; alIcono = 'вң…'; }
  else if(t < 28) { factorAl = 0.97; alRazon = 'Temperatura algo elevada вҖ” las gallinas reducen ligeramente el alimento. -3% del normal.'; alIcono = 'вҡ пёҸ'; }
  else if(t < 31) { factorAl = 0.93; alRazon = 'Calor moderado вҖ” menor apetito. Se recomienda dar 7% menos para evitar desperdicio.'; alIcono = 'вҳҖпёҸ'; }
  else if(t < 34) { factorAl = 0.88; alRazon = 'Calor alto вҖ” las gallinas comen poco. Da 12% menos. Prioriza agua fresca sobre alimento.'; alIcono = 'рҹ”Ҙ'; }
  else            { factorAl = 0.82; alRazon = 'CALOR CRГҚTICO вҖ” come muy poco. Reduce 18%. La prioridad es agua frГӯa y ventilaciГіn urgente.'; alIcono = 'рҹҡЁ'; }
  return { mlAve: mlAve, litros: litros, factor: factor, nivel: nivel, temp: t,
           aguaRazon: aguaRazon, factorAl: factorAl, alRazon: alRazon, alIcono: alIcono };
}

function colorAgua(nivel){

}

function bgAgua(nivel){

}

function diasRestantesInventario(){
  var d = calcDash();
  if(!granja.inventarioKg || !d.kgDia || d.kgDia<=0) return null;
  return Math.floor(granja.inventarioKg / d.kgDia);
}

function nivelInventario(dias){
  if(dias === null) return 'sin-datos';
  if(dias <= 2)  return 'critico';
  if(dias <= 5)  return 'bajo';
  if(dias <= 10) return 'ok';
  return 'bien';
}

function colorInventario(nivel){
  return nivel==='critico'?'#EF4444':nivel==='bajo'?'#D97706':nivel==='ok'?'#0369A1':'#16A34A';
}

function registrarSemanaActual(pctPostura){
  var sem = granja.semanaVida || 0;
  if(!sem) return;
  if(!granja.histSemanal) granja.histSemanal = [];
  var existing = granja.histSemanal.findIndex(function(x){ return x.sem === sem; });
  if(existing >= 0){
    granja.histSemanal[existing].pct = pctPostura;
  } else {
    granja.histSemanal.push({ sem: sem, pct: pctPostura });
    granja.histSemanal.sort(function(a,b){ return a.sem - b.sem; });
  }
  if(granja.histSemanal.length > 80) granja.histSemanal = granja.histSemanal.slice(-80);
}

guardarRegistro = function(){
  var hEl  = document.getElementById('inp-huevos');
  var bEl  = document.getElementById('inp-bajas');
  var kEl  = document.getElementById('inp-kg');
  var tEl  = document.getElementById('inp-temp');
  var h    = parseInt(hEl  ? hEl.value  : 0) || 0;
  var b    = parseInt(bEl  ? bEl.value  : 0) || 0;
  var kg   = kEl && kEl.value.trim()!=='' ? (parseFloat(kEl.value)||0) : 0;
  var temp = parseFloat(tEl ? tEl.value : granja.tempHoy) || 22;
  if(!h && !b){ showToast('Ingresa al menos huevos o bajas antes de guardar'); return; }
  granja.bultosCompra = 0;
  granja.tempHoy = temp;
  if(kg > 0 && granja.inventarioKg > 0){
    granja.inventarioKg = Math.max(0, granja.inventarioKg - kg);
  }
  if(b > 0) granja.avesVivas = Math.max(0, granja.avesVivas - b);
  granja.registradoHoy = true;
  var d = calcDash();
  if(h > 0 && d.aves > 0) registrarSemanaActual(parseFloat((h/d.aves*100).toFixed(1)));
  agregarAlHistorial(h, b, kg);
  guardarEnStorage();
  showToast('Registro guardado correctamente');
  setTimeout(function(){ nav('dash'); }, 1200);
};

screens.calendario = function(){
  setStatus(false);
  var hoy     = new Date();
  var mesActual = hoy.getMonth();
  var anioActual = hoy.getFullYear();

  var mapaHist = {};
  historial.forEach(function(r){
    mapaHist[r.fecha] = r;
  });

  function renderMes(anio, mes){
    var nombresMes = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    var primerDia  = new Date(anio, mes, 1).getDay(); // 0=Dom
    var diasMes    = new Date(anio, mes+1, 0).getDate();

    var html = '<div style="margin-bottom:4px;display:flex;justify-content:space-between;align-items:center">';
    html += '<div style="font-size:13px;font-weight:800;color:#111827">'+nombresMes[mes]+' '+anio+'</div>';
    html += '</div>';
    html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px">';
    ['D','L','M','X','J','V','S'].forEach(function(d){
      html += '<div style="text-align:center;font-size:9px;font-weight:700;color:#9CA3AF;padding:2px 0">'+d+'</div>';
    });
    html += '</div>';
    html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">';
    for(var v=0; v<primerDia; v++){
      html += '<div></div>';
    }
    for(var dia=1; dia<=diasMes; dia++){
      var fechaStr = anio+'-'+String(mes+1).padStart(2,'0')+'-'+String(dia).padStart(2,'0');
      var reg      = mapaHist[fechaStr];
      var esHoy    = fechaStr === hoy.toISOString().split('T')[0];
      var bg='#F9FAFB', color='#9CA3AF', dot='';
      if(reg){
        if(reg.pctPostura >= 94)      { bg='#F0FDF4'; color='#15803D'; dot='#16A34A'; }
        else if(reg.pctPostura >= 88) { bg='#FFFBEB'; color='#92400E'; dot='#F59E0B'; }
        else if(reg.pctPostura > 0)   { bg='#FEF2F2'; color='#991B1B'; dot='#EF4444'; }
        else                          { bg='#F9FAFB'; color='#6B7280'; dot='#D1D5DB'; }
        if(reg.mortalidad >= 0.1) dot = '#EF4444';
      }
      html += '<div onclick="verDiaCalendario(\''+fechaStr+'\')" style="'
        +'aspect-ratio:1;border-radius:8px;background:'+bg+';'
        +'display:flex;flex-direction:column;align-items:center;justify-content:center;'
        +'cursor:'+(reg?'pointer':'default')+';'
        +'border:1.5px solid '+(esHoy?'#16A34A':'transparent')+';'
        +'position:relative;padding:2px">';
      html += '<span style="font-size:10px;font-weight:'+(esHoy?'900':'700')+';color:'+color+'">'+dia+'</span>';
      if(dot) html += '<div style="width:5px;height:5px;border-radius:50%;background:'+dot+';margin-top:1px"></div>';
      html += '</div>';
    }
    html += '</div>';
    return html;
  }

  var sc = '<div style="flex:1;display:flex;flex-direction:column;background:#EDFAF3;overflow:hidden">';
  sc += '<div style="background:#fff;padding:14px 20px;box-shadow:0 2px 12px rgba(0,0,0,.04);flex-shrink:0">';
  sc += '<div style="font-size:17px;font-weight:900;color:#111827">Calendario</div>';
  sc += '<div style="font-size:11px;font-weight:600;color:#9CA3AF;margin-top:2px">'+historial.length+' dГӯas registrados</div>';
  sc += '<div style="display:flex;gap:12px;margin-top:10px;flex-wrap:wrap">';
  sc += '<div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:50%;background:#16A34A"></div><span style="font-size:10px;font-weight:600;color:#374151">Excelente вүҘ94%</span></div>';
  sc += '<div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:50%;background:#F59E0B"></div><span style="font-size:10px;font-weight:600;color:#374151">Normal 88-94%</span></div>';
  sc += '<div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:50%;background:#EF4444"></div><span style="font-size:10px;font-weight:600;color:#374151">Alerta o mortalidad</span></div>';
  sc += '</div></div>';

  sc += '<div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px">';

  sc += '<div style="background:#fff;border-radius:18px;box-shadow:0 4px 16px rgba(0,0,0,.06);padding:16px;margin-bottom:12px">';
  sc += renderMes(anioActual, mesActual);
  sc += '</div>';

  var mesAnterior = mesActual === 0 ? 11 : mesActual - 1;
  var anioAnterior = mesActual === 0 ? anioActual - 1 : anioActual;
  var tieneRegMesAnt = historial.some(function(r){
    return r.fecha.startsWith(anioAnterior+'-'+String(mesAnterior+1).padStart(2,'0'));
  });
  if(tieneRegMesAnt || historial.length > 0){
    sc += '<div style="background:#fff;border-radius:18px;box-shadow:0 4px 16px rgba(0,0,0,.06);padding:16px;margin-bottom:12px">';
    sc += renderMes(anioAnterior, mesAnterior);
    sc += '</div>';
  }

  sc += '<div id="cal-detalle" style="margin-bottom:12px"></div>';

  var regMesActual = historial.filter(function(r){
    return r.fecha.startsWith(anioActual+'-'+String(mesActual+1).padStart(2,'0'));
  });
  if(regMesActual.length > 0){
    var avgP = (regMesActual.reduce(function(s,r){return s+r.pctPostura;},0)/regMesActual.length).toFixed(1);
    var mejorDia = regMesActual.reduce(function(a,b){ return a.pctPostura>b.pctPostura?a:b; });
    var peorDia  = regMesActual.reduce(function(a,b){ return a.pctPostura<b.pctPostura?a:b; });
    sc += '<div style="background:#fff;border-radius:18px;box-shadow:0 4px 16px rgba(0,0,0,.06);padding:16px;margin-bottom:12px">';
    sc += '<div style="font-size:12px;font-weight:800;color:#111827;margin-bottom:12px">Resumen del mes</div>';
    sc += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">';
    sc += '<div style="background:#F0FDF4;border-radius:12px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:900;color:#16A34A">'+avgP+'%</div><div style="font-size:9px;font-weight:700;color:#9CA3AF;margin-top:2px">Promedio</div></div>';
    sc += '<div style="background:#F0FDF4;border-radius:12px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:900;color:#16A34A">'+mejorDia.pctPostura+'%</div><div style="font-size:9px;font-weight:700;color:#9CA3AF;margin-top:2px">Mejor dГӯa</div></div>';
    sc += '<div style="background:#FEF2F2;border-radius:12px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:900;color:#EF4444">'+peorDia.pctPostura+'%</div><div style="font-size:9px;font-weight:700;color:#9CA3AF;margin-top:2px">Peor dГӯa</div></div>';
    sc += '</div></div>';
  }

  sc += '<div style="height:8px"></div></div>';
  sc += navBar('calendario');
  sc += '</div>';
  return sc;
};

screens.tendencia = function(){
  setStatus(false);
  var d    = calcDash();
  var raza = granja.raza || RAZAS[0];
  var semActual = granja.semanaVida || 0;

  function pctEstandar(sem){
    if(sem < 18) return 0;
    if(sem === 18) return 30;
    if(sem === 19) return 60;
    if(sem === 20) return 82;
    if(sem <= 25)  return 90 + (sem-20)*0.8;
    if(sem <= 45)  return 94;
    if(sem <= 55)  return 94 - (sem-45)*0.3;
    if(sem <= 65)  return 91 - (sem-55)*0.4;
    if(sem <= 75)  return 87 - (sem-65)*0.5;
    return 82 - (sem-75)*1.0;
  }

  var histSem = granja.histSemanal || [];
  if(histSem.length === 0 && historial.length > 0){
    var mapaSem = {};
    historial.forEach(function(r){
      var sem = granja.semanaVida; // aproximaciГіn вҖ” en producciГіn se calcularГӯa por fecha
      if(!mapaSem[sem]) mapaSem[sem] = {total:0,cnt:0};
      mapaSem[sem].total += r.pctPostura;
      mapaSem[sem].cnt++;
    });
    Object.keys(mapaSem).forEach(function(s){
      histSem.push({sem:parseInt(s), pct: parseFloat((mapaSem[s].total/mapaSem[s].cnt).toFixed(1))});
    });
  }

  var semInicio = 18;
  var semFin    = Math.max(semActual + 6, 35);
  var semTotal  = semFin - semInicio + 1;

  var maxPct = 100, minPct = 60;
  var w_bar  = Math.floor(260 / semTotal); // ancho de cada columna en px
  var h_graf = 120; // altura de la grГЎfica en px

  function xPos(sem){ return (sem - semInicio) * w_bar; }
  function yPos(pct){ return h_graf - Math.round((Math.min(pct,100) - minPct) / (maxPct - minPct) * h_graf); }

  var puntosEstandar = [];
  for(var s=semInicio; s<=semFin; s++){
    puntosEstandar.push({x: xPos(s), y: yPos(pctEstandar(s)), sem:s, pct:pctEstandar(s)});
  }
  var polyEst = puntosEstandar.map(function(p){ return p.x+','+p.y; }).join(' ');

  var puntosReal = histSem.filter(function(h2){ return h2.sem>=semInicio && h2.sem<=semFin; })
    .map(function(h2){ return {x:xPos(h2.sem), y:yPos(h2.pct), sem:h2.sem, pct:h2.pct}; });
  var polyReal = puntosReal.length>1 ? puntosReal.map(function(p){return p.x+','+p.y;}).join(' ') : '';

  var proyPuntos = [];
  for(var ps=semActual; ps<=semFin; ps++){
    proyPuntos.push({x:xPos(ps), y:yPos(pctEstandar(ps))});
  }
  var polyProy = proyPuntos.length>1 ? proyPuntos.map(function(p){return p.x+','+p.y;}).join(' ') : '';

  var xActual = xPos(semActual);
  var totalW  = xPos(semFin) + w_bar;

  var semsRestantes  = Math.max(0, 80 - semActual);
  var huevosProy     = Math.round(d.huevosDia * semsRestantes * 7);
  var ingresoProy    = granja.precioHuevo>0 ? Math.round(huevosProy * granja.precioHuevo) : 0;
  var costoProy      = Math.round(d.gastoDia * semsRestantes * 7);
  var ganProy        = ingresoProy - costoProy;
  var fmx            = function(n){ return Math.round(n).toLocaleString('es-MX'); };

  var sc = '<div style="flex:1;display:flex;flex-direction:column;background:#EDFAF3;overflow:hidden">';
  sc += '<div style="background:#fff;padding:14px 20px;box-shadow:0 2px 12px rgba(0,0,0,.04);flex-shrink:0">';
  sc += '<div style="font-size:17px;font-weight:900;color:#111827">Tendencia del ciclo</div>';
  sc += '<div style="font-size:11px;font-weight:600;color:#9CA3AF;margin-top:2px">'+raza.n+' В· Semana '+semActual+' de 80</div>';
  sc += '</div>';
  sc += '<div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px">';

  sc += '<div style="background:#fff;border-radius:18px;box-shadow:0 4px 16px rgba(0,0,0,.06);padding:16px;margin-bottom:12px">';
  sc += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
  sc += '<div style="font-size:12px;font-weight:800;color:#111827">Curva de postura del ciclo</div>';
  sc += '<div style="display:flex;gap:10px">';
  sc += '<div style="display:flex;align-items:center;gap:4px"><div style="width:16px;height:2px;background:#D1D5DB;border-top:2px dashed #D1D5DB"></div><span style="font-size:9px;color:#9CA3AF;font-weight:600">EstГЎndar</span></div>';
  if(polyReal) sc += '<div style="display:flex;align-items:center;gap:4px"><div style="width:16px;height:3px;background:#16A34A;border-radius:2px"></div><span style="font-size:9px;color:#9CA3AF;font-weight:600">Real</span></div>';
  if(polyProy) sc += '<div style="display:flex;align-items:center;gap:4px"><div style="width:16px;height:2px;background:#BBF7D0"></div><span style="font-size:9px;color:#9CA3AF;font-weight:600">ProyecciГіn</span></div>';
  sc += '</div></div>';

  sc += '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch">';
  sc += '<svg width="'+Math.max(totalW+20, 260)+'" height="'+(h_graf+40)+'" viewBox="0 0 '+(Math.max(totalW+20,260))+' '+(h_graf+40)+'">';

  [70,80,90,100].forEach(function(pct){
    var y = yPos(pct);
    sc += '<line x1="0" y1="'+y+'" x2="'+totalW+'" y2="'+y+'" stroke="#F3F4F6" stroke-width="1"/>';
    sc += '<text x="'+totalW+'" y="'+(y+3)+'" font-size="8" fill="#D1D5DB" text-anchor="end">'+pct+'%</text>';
  });

  var areaEst = '0,'+h_graf+' '+polyEst+' '+totalW+','+h_graf;
  sc += '<polygon points="'+areaEst+'" fill="#F0FDF4" opacity="0.4"/>';

  sc += '<polyline points="'+polyEst+'" fill="none" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="4,3"/>';

  if(polyProy) sc += '<polyline points="'+polyProy+'" fill="none" stroke="#BBF7D0" stroke-width="2" stroke-dasharray="5,3"/>';

  if(polyReal) sc += '<polyline points="'+polyReal+'" fill="none" stroke="#16A34A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';

  puntosReal.forEach(function(p){
    sc += '<circle cx="'+p.x+'" cy="'+p.y+'" r="3" fill="#16A34A"/>';
  });

  if(semActual >= semInicio){
    sc += '<line x1="'+xActual+'" y1="0" x2="'+xActual+'" y2="'+h_graf+'" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="3,2"/>';
    sc += '<rect x="'+(xActual-14)+'" y="'+(h_graf+2)+'" width="28" height="14" rx="3" fill="#F0FDF4"/>';
    sc += '<text x="'+xActual+'" y="'+(h_graf+12)+'" font-size="8" fill="#16A34A" text-anchor="middle" font-weight="bold">Sem '+semActual+'</text>';
  }

  for(var sx=semInicio; sx<=semFin; sx+=5){
    sc += '<text x="'+xPos(sx)+'" y="'+(h_graf+28)+'" font-size="8" fill="#9CA3AF" text-anchor="middle">'+sx+'</text>';
  }

  sc += '</svg></div>';

  if(d.pctPostura > 0){
    sc += '<div style="margin-top:10px;display:flex;align-items:center;justify-content:space-between">';
    sc += '<div style="font-size:12px;color:#374151;font-weight:600">Postura actual: <strong style="color:#16A34A">'+d.pctPostura+'%</strong></div>';
    var diff = parseFloat((d.pctPostura - pctEstandar(semActual)).toFixed(1));
    var diffCol = diff >= 0 ? '#16A34A' : '#EF4444';
    sc += '<div style="font-size:12px;font-weight:700;color:'+diffCol+'">'+(diff>=0?'+':'')+diff+'% vs estГЎndar</div>';
    sc += '</div>';
  }
  sc += '</div>';

  sc += '<div style="background:#fff;border-radius:18px;box-shadow:0 4px 16px rgba(0,0,0,.06);padding:16px;margin-bottom:12px">';
  sc += '<div style="font-size:12px;font-weight:800;color:#111827;margin-bottom:12px">ProyecciГіn hasta fin de ciclo</div>';

function calcPosturaTraspatio(){
  var nido  = parseInt(document.getElementById('inp-huevos').value)||0;
  var suelo = parseInt(document.getElementById('inp-huevos-suelo')?.value)||0;
  var total = nido + suelo;
  var aves  = calcDash().aves;
  var pct   = aves>0 ? Math.round(total/aves*1000)/10 : 0;
  var el    = document.getElementById('daily-pct');
  if(el) el.textContent = pct+'%';
  var col   = pct>=75?'#16A34A':pct>=60?'#D97706':'#EF4444';
  if(el) el.style.color = col;
}

function _toggleFuenteTraspatio(id){
  var btn = document.getElementById('btn-fuente-'+id);
  var inp = document.getElementById('inp-fuente-'+id);
  if(!btn) return;
  var activo = btn.style.borderColor === 'rgb(22, 163, 74)' || btn.style.borderColor === '#16A34A';
  btn.style.borderColor = activo ? '#E5E7EB' : '#16A34A';
  btn.style.background  = activo ? '#fff'     : '#F0FDF4';
  if(inp){
    inp.disabled = activo;
    if(activo) inp.value = '';
    inp.style.borderColor = activo ? '#E5E7EB' : '#16A34A';
  }
  if(id === 'pasto'){
    var lbl = document.getElementById('pasto-label');
    if(lbl){
      lbl.textContent = activo ? 'вҖ” Tocar' : 'вң“ SГӯ';
      lbl.style.color = activo ? '#9CA3AF' : '#16A34A';
    }
  }
}

function guardarRegistroTraspatio(){
  var d = calcDash();
  var fuentes = ['balanceado','alfalfa','forraje','maiz','desperdicios','insectos','pasto'];
  var alimentos = {};
  fuentes.forEach(function(f){
    var inp = document.getElementById('inp-fuente-'+f);
    var btn = document.getElementById('btn-fuente-'+f);
    if(btn && btn.style.borderColor === 'rgb(22, 163, 74)'){
      alimentos[f] = inp ? (parseFloat(inp.value)||0) : 1;
    }
  });

  var huevosNido  = parseInt(document.getElementById('inp-huevos')?.value)||0;
  var huevosSuelo = parseInt(document.getElementById('inp-huevos-suelo')?.value)||0;
  var totalHuevos = huevosNido + huevosSuelo;
  var bajas       = parseInt(document.getElementById('inp-bajas')?.value)||0;
  var temp        = parseFloat(document.getElementById('inp-temp')?.value)||22;
  var zona        = document.getElementById('inp-zona')?.value||'A';
  var pasto       = document.getElementById('inp-pasto')?.value||'bueno';
  var comportamiento = document.getElementById('inp-comportamiento')?.value||'normal';
  var plumaje     = document.getElementById('inp-plumaje')?.value||'completo';
  var vendidos    = parseInt(document.getElementById('inp-vendidos')?.value)||0;
  var autoconsumo = parseInt(document.getElementById('inp-autoconsumo')?.value)||0;
  var causaBaja   = document.getElementById('inp-causa-baja')?.value||'';
  var aguaFuente  = document.getElementById('inp-agua-fuente')?.value||'suministrada';
  var obs         = document.getElementById('inp-obs')?.value||'';

  var tp0b = _getTraspatio();
  var precios = {
    balanceado:  granja.precioKgAl   || 7,
    alfalfa:     tp0b.precioAlfalfa  || 4,
    maiz:        tp0b.precioMaiz     || 5.5,
    forraje:     0.8,   // producciГіn propia, muy barato
    desperdicios:0,     // gratis
    insectos:    0,     // gratis
    pasto:       0,     // libre acceso gratis
  };
  var desglose = {};
  var gasto = 0;
  Object.keys(alimentos).forEach(function(f){
    var kg = parseFloat(alimentos[f])||0;
    if(kg>0 && precios[f]!==undefined){
      var costo = Math.round(kg * precios[f]);
      desglose[f] = {kg:kg, precio:precios[f], costo:costo};
      gasto += costo;
    }
  });
  var kgBal = parseFloat(alimentos['balanceado']||0);
  var d2 = calcDash();
  var costoSiBalanceado = Math.round(d2.kgDia * (granja.precioKgAl||7));
  var ahorroAlimentacion = Math.max(0, costoSiBalanceado - gasto);
  var hoyTemp = new Date().toISOString().split('T')[0];
  var tp0 = _getTraspatio();
  var ventasReales = (tp0.historialVentas||[]).filter(function(v){return v.fecha===hoyTemp;});
  var ingresoVentas = ventasReales.reduce(function(s,v){return s+(v.ingreso||0);},0);
  var ingreso = ingresoVentas > 0 ? ingresoVentas : Math.round(totalHuevos * (granja.precioHuevo||3.5));
  var pct   = d.aves>0 ? Math.round(totalHuevos/d.aves*1000)/10 : 0;
  var mort  = d.aves>0 ? Math.round(bajas/d.aves*10000)/100 : 0;

  var hoy = new Date().toISOString().split('T')[0];
  var registro = {
    fecha:      hoy,
    huevos:     totalHuevos,
    huevosNido: huevosNido,
    huevosSuelo:huevosSuelo,
    bajas:      bajas,
    causaBaja:  causaBaja,
    kg:         kgBal,
    alimentos:  alimentos,
    pctPostura: pct,
    mortalidad: mort,
    gastoDia:       gasto,
    gastoDesglose:  desglose,
    costoSiBalanceado: costoSiBalanceado,
    ahorroAlimentacion: ahorroAlimentacion,
    ingresoDia:     ingreso,
    temp:       temp,
    zona:       zona,
    pasto:      pasto,
    comportamiento: comportamiento,
    plumaje:    plumaje,
    vendidos:   vendidos,
    autoconsumo:autoconsumo,
    aguaFuente: aguaFuente,
    obs:        obs,
    sistema:    'pastoreo',
  };

  if(historial.length>0 && historial[0].fecha===hoy){
    historial[0] = registro;
  } else {
    historial.unshift(registro);
  }

  granja.avesVivas   = Math.max(0, d.aves - bajas);
  granja.tempHoy     = temp;
  granja.zonaActual  = zona;
  granja.aguaFuenteTraspatio = aguaFuente;
  granja.alimentosTraspatio  = alimentos;
  granja.registradoHoy = true;

  guardarEnStorage();
  var btnTp = document.querySelector('button[onclick="guardarRegistroTraspatio()"]');
  if(btnTp){
    btnTp.textContent = 'вң“ Guardado';
    btnTp.style.background = '#15803D';
    btnTp.disabled = true;
  }
  showToast('вң“ Registro guardado correctamente');
  setTimeout(function(){ nav('dash'); }, 1000);
}

function actualizarAgua(val){
  var d        = calcDash();
  var temp     = parseFloat(val) || 22;
  granja.tempHoy = temp;
  var aguaCalc = calcAguaPorTemp(d.aves, d.raza, temp);
  var elLitros = document.querySelector('#daily-agua-val') || null;
  var allDivs = document.querySelectorAll('div');
  allDivs.forEach(function(div){
    if(div.id === 'agua-nivel'){
      div.textContent = aguaCalc.nivel==='critico'?'вҡ  CRГҚTICO':aguaCalc.nivel==='alto'?'вҡ  ALTO':aguaCalc.nivel==='bajo'?'вҶ“ BAJO':'вң“ Normal';
      div.style.color = colorAgua(aguaCalc.nivel);
    }
  });
}

function cambiarBultos(delta){
  if(!granja.bultosCompra) granja.bultosCompra=0;
  var kgB = granja.kgBulto || 40;
  var prevBultos = granja.bultosCompra;
  granja.bultosCompra = Math.max(0, granja.bultosCompra + delta);

  var kgDiff = (granja.bultosCompra - prevBultos) * kgB;
  granja.inventarioKg = Math.max(0, (granja.inventarioKg||0) + kgDiff);

  var kgTotal = granja.bultosCompra * kgB;
  var bv = document.getElementById('bultos-val');
  if(bv){
    bv.textContent = granja.bultosCompra;
    var sub = bv.nextElementSibling;
    if(sub){
      sub.textContent = granja.inventarioKg>0
        ? 'bultos В· '+granja.inventarioKg.toLocaleString('es-MX')+' kg en bodega'
        : 'sin stock en bodega';
    }
  }
  var d = calcDash();
  var diasNuevos = d.kgDia>0 && granja.inventarioKg>0 ? Math.floor(granja.inventarioKg/d.kgDia) : null;
  var elDias = document.getElementById('inv-dias-display');
  if(elDias){
    elDias.textContent = diasNuevos!==null ? diasNuevos+' dГӯas restantes' : 'вҖ”';
    elDias.style.color = diasNuevos===null?'#9CA3AF':diasNuevos<=2?'#EF4444':diasNuevos<=5?'#D97706':'#16A34A';
  }
  guardarEnStorage();
  if(delta>0){
    var flash = document.getElementById('bultos-val');
    if(flash){ flash.style.color='#15803D'; setTimeout(function(){ if(flash) flash.style.color='#16A34A'; },400); }
    showToast('вң“ '+granja.inventarioKg.toLocaleString('es-MX')+' kg en bodega');
  }
}

function getBioHoy(){
  var hoy = new Date().toISOString().split('T')[0];
  if(!granja.bioHistorial) granja.bioHistorial = {};
  if(!granja.bioHistorial[hoy]){
    granja.bioHistorial[hoy] = {
      fecha: hoy,
      items: BIO_ITEMS_FULL.map(function(b){ return Object.assign({}, b, {done:false}); }),
      pct: 0,
      obs: '',
    };
  }
  return granja.bioHistorial[hoy];
}

function calcPctBio(items){
  var alta = items.filter(function(i){ return i.prioridad==='alta'; });
  var doneAlta = alta.filter(function(i){ return i.done; }).length;
  var doneAll  = items.filter(function(i){ return i.done; }).length;
  var pctAlta  = alta.length > 0 ? doneAlta/alta.length*70 : 70;
  var resto    = items.length - alta.length;
  var doneRest = doneAll - doneAlta;
  var pctRest  = resto > 0 ? doneRest/resto*30 : 30;
  return Math.round(pctAlta + pctRest);
}

function toggleBioNuevo(itemId){
  var hoyData = getBioHoy();
  var item    = hoyData.items.find(function(i){ return i.id===itemId; });
  if(!item) return;

  item.done = !item.done;
  hoyData.pct = calcPctBio(hoyData.items);

  var cb   = document.getElementById('bio-cb-'+itemId);
  var txt  = document.getElementById('bio-t-'+itemId);
  var row  = document.getElementById('bio-row-'+itemId);
  var prog = document.getElementById('bioProg');

  if(cb){
    cb.style.background   = item.done ? '#16A34A' : '#F9FAFB';
    cb.style.borderColor  = item.done ? '#16A34A' : '#E5E7EB';
    cb.innerHTML = item.done
      ? '<svg width="14" height="12" viewBox="0 0 14 12" fill="none"><path d="M1 6l4 5L13 1" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      : '';
  }
  if(txt){
    txt.style.color          = item.done ? '#9CA3AF' : '#111827';
    txt.style.textDecoration = item.done ? 'line-through' : 'none';
  }
  if(row){
    var isAlta = item.prioridad === 'alta';
    row.style.borderColor = item.done ? '#BBF7D0' : isAlta ? '#FECACA' : '#F3F4F6';
  }
  if(prog){
    var pctColor = hoyData.pct===100?'#16A34A':hoyData.pct>=75?'#0369A1':hoyData.pct>=50?'#D97706':'#EF4444';
    prog.style.width      = hoyData.pct + '%';
    prog.style.background = pctColor;
  }

  if(hoyData.pct === 100) showToast('рҹҺү ВЎBioseguridad del dГӯa completa!');

  guardarEnStorage();
}

  guardarEnStorage();

function iniciarPago(tipo) {
  if (!avigoTieneSession()) { nav('splash'); return; }
  var plan = _MP_PRECIOS[tipo];
  if (!plan) return;

  showToast('Preparando pago seguro...');

  fetch(AVIGO_API + '/pagos/crear-preferencia', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + _avigoSession.token },
    body: JSON.stringify({ tipo: tipo, monto: plan.monto, descripcion: plan.label })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.sandbox_init_point || data.init_point) {
      var url = data.init_point || data.sandbox_init_point;
      if (typeof window.ReactNativeWebView !== 'undefined') {
        window.ReactNativeWebView.postMessage(JSON.stringify({
          type: 'ABRIR_PAGO',
          url: url,
          tipo: tipo
        }));
      } else {
        window.open(url, '_blank');
      }
    } else {
      showToast('Error al crear el pago. Intenta de nuevo.');
    }
  })
  .catch(function() {
    showToast('Sin conexiГіn. Verifica tu internet.');
  });
}

(function(){
  var _navOrig = nav;
  nav = function(name){
    var rutasProtegidas = ['dash','daily','historial','ia','tendencia','renta','bio','vac','perfil','planes','nuevo_lote',
      'parvada','alimentacion_natural','salud_natural','economia_traspatio','clientes_traspatio','ventas_traspatio','clientes_jaula'];
    if(rutasProtegidas.indexOf(name) >= 0 && !avigoTieneSession()){
      name = 'splash';
    }
    var fn = screens[name];
    if(!fn){ console.warn('nav: pantalla no encontrada:', name); return; }
    var sc = document.getElementById('screen');
    if(!sc) return;

    var fromIdx = NAV_ORDER.indexOf(_lastScreen);
    var toIdx   = NAV_ORDER.indexOf(name);
    var animClass = 'screen-enter';
    if(name === _lastScreen){
      animClass = 'screen-fade';
    } else if(name === 'dash' || name === 'splash' || name === 'login'){
      animClass = 'screen-fade';
    } else if(toIdx > fromIdx){
      animClass = 'screen-enter';
    } else if(toIdx < fromIdx){
      animClass = 'screen-enter-left';
    } else {
      animClass = 'screen-pop';
    }

    sc.style.opacity = '0';
    sc.style.transition = 'opacity .08s ease';

    setTimeout(function(){
      sc.innerHTML   = fn();
      sc.className   = 'screen ' + animClass;
      sc.style.opacity = '';
      sc.style.transition = '';
      _lastScreen = name;
      if(afterRender && afterRender[name]) afterRender[name]();
      if(name === 'perfil'){ setTimeout(bindRecordatorios, 200); setTimeout(bindLotes, 200); }

function generarTipsRapidos(d, ultReg, ayer, diasInv){
  var tips = [];

  if(ultReg && ayer && ayer.pctPostura>0){
    var caida = ayer.pctPostura - ultReg.pctPostura;
    if(caida >= 2){
      tips.push({color:'#EF4444', titulo:'в¬Ү Postura cayГі '+caida.toFixed(1)+'%', texto:'Una caГӯda repentina puede deberse a estrГ©s, cambio de alimento, calor excesivo o problemas de agua. Revisa bebederos, ventilaciГіn y si hubo algГәn cambio reciente.'});
    }
    if(ultReg.mortalidad >= 0.1){
      tips.push({color:'#EF4444', titulo:'вҡ  Mortalidad fuera del rango normal', texto:'MГЎs de 0.1% diario requiere atenciГіn. Retira las aves muertas de inmediato, revisa si hay sГӯntomas en el lote y consulta al veterinario si continГәa.'});
    }
  }

  if(diasInv !== null && diasInv <= 5){
    tips.push({color:'#D97706', titulo:'рҹ“Ұ Stock de alimento bajo вҖ” '+diasInv+' dГӯas', texto:'Programa tu compra hoy. Con tu consumo actual de '+d.kgDia+' kg/dГӯa necesitas al menos '+(d.kgDia*14).toFixed(0)+' kg para 2 semanas de reserva.'});
  }

  var temp = granja.tempHoy || 22;
  if(temp >= 28){
    tips.push({color:'#D97706', titulo:'рҹҢЎ Calor elevado вҖ” revisa agua', texto:'A '+temp+'В°C las aves beben '+(Math.round((temp-20)*5))+'% mГЎs agua. Verifica que los bebederos estГ©n llenos y el agua estГ© fresca. El calor reduce la postura si no se controla.'});
  }

  if(d.sem >= 21 && d.pctPostura > 0 && d.pctPostura < 88){
    tips.push({color:'#7C3AED', titulo:'рҹ“Ҡ Postura bajo el estГЎndar para Sem '+d.sem, texto:'En postura fase 1 se espera 90-95%. Una postura baja puede indicar deficiencia de calcio, problemas de luz o densidad excesiva de aves. Revisa el programa de luz y el nivel de calcio en el alimento.'});
  }

  if(historial.length === 0){
    tips.push({color:'#16A34A', titulo:'рҹ‘Ӣ Bienvenido вҖ” Soy Don Gallo', texto:'Empieza registrando tu primer dГӯa. Cuantos mГЎs datos tengas, mejores consejos te podrГ© dar. El historial diario es la base de todo el anГЎlisis avГӯcola.'});
  }

  if(historial.length >= 7 && tips.length === 0){
    tips.push({color:'#16A34A', titulo:'вң“ Todo en orden en tu granja', texto:'No hay alertas activas. Sigue con el mismo manejo. Recuerda revisar el programa de vacunaciГіn y mantener los registros diarios actualizados.'});
  }

  return tips.slice(0,4);
}

  if(!chat) return;

  if (!esPro()) {
    var hoy = new Date().toISOString().split('T')[0];
    var keyIA = 'avigo_ia_' + hoy;
    var conteo = 0;
    try { conteo = parseInt(localStorage.getItem(keyIA) || '0'); } catch(e) {}
    if (conteo >= 3) {
      mostrarBloqueoProIA();
      return;
    }
    try { localStorage.setItem(keyIA, String(conteo + 1)); } catch(e) {}
  }

  if(inp) { inp.value=''; inp.style.height='auto'; }

  chat.innerHTML += '<div style="display:flex;justify-content:flex-end;margin-bottom:8px">'
    +'<div style="background:#16A34A;border-radius:18px 18px 4px 18px;padding:10px 13px;max-width:82%;font-size:12px;font-weight:500;color:#fff;line-height:1.5">'+texto+'</div>'

function donGalloResponde(pregunta, histConv){
  var d       = calcDash();
  var p       = pregunta.toLowerCase();
  var convActual  = histConv || [];
  var ultRespDG   = convActual.length>=2 ? convActual[convActual.length-2].content.toLowerCase() : '';
  var ultPregUser = convActual.length>=3 ? convActual[convActual.length-3].content.toLowerCase() : '';
  var dxEsperando = /cuГ©ntame|cuГ©nta|describe|cГіmo se ve|cuГЎntas.*afectadas|hace cuГЎnto|desde cuГЎndo|quГ© sГӯntoma|quГ© mГЎs|algo mГЎs|observaste|notaste/.test(ultRespDG);
  var dxTema      = /respirat|moquillo|newcastle|coccidio|diarrea|ojo|nariz|pata|parГЎlis|muerta|mort|come poco|pluma|torticolis/.test(ultRespDG+ultPregUser);
  var raza    = granja.raza ? granja.raza.n : 'tu raza';
  var sem     = granja.semanaVida || 0;
  var aves    = granja.avesVivas  || granja.numAves || 0;
  var pct     = d.pctPostura || 0;
  var temp    = granja.tempHoy || 22;
  var sistema = granja.sistema === 'jaula' ? 'jaula en baterГӯa' : granja.sistema === 'piso' ? 'piso con cama' : 'libre pastoreo';
  var altitud = granja.altitud || 0;
  var diasInv = granja.inventarioKg>0 && d.kgDia>0 ? Math.floor(granja.inventarioKg/d.kgDia) : null;
  var ultReg  = historial.length>0 ? historial[0] : null;
  var ayer    = historial.length>1 ? historial[1] : null;

  if(dxEsperando && dxTema){
    if(/ojo.*hinchad|hinchad.*ojo|cara.*hinchad|hinchad.*cara|ojos.*cerrad|moco.*ojo/.test(p))
      return 'Con los ojos hinchados y cara inflamada, lo mГЎs probable es Coriza Infecciosa (Haemophilus paragallinarum). CaracterГӯsticas: olor muy feo, hinchazГіn facial que puede ser unilateral o bilateral, secreciГіn nasal y ocular, y caГӯda de postura del 10-40%.\n\nQuГ© hacer ahora mismo:\n1. AГӯsla las aves con sГӯntomas del resto del lote\n2. AntibiГіtico: eritromicina o estreptomicina en agua por 5-7 dГӯas (con veterinario)\n3. Lava los ojos afectados con suero fisiolГіgico\n4. Refuerza la vitamina A en el agua (protege mucosas)\n5. Revisa la ventilaciГіn вҖ” el amoniaco empeora la coriza\n\nвҡ пёҸ La coriza se transmite muy rГЎpido entre aves. ActГәa hoy. ВҝCuГЎntas aves tienen sГӯntomas ya?';

    if(/torticolis|cuello.*torcido|vuelta.*cabeza|cabeza.*atrГЎs|gira.*cabeza|movimiento.*cabeza/.test(p))
      return 'вҡ пёҸ ALERTA ALTA вҖ” El tortГӯcolis (cuello torcido) es el sГӯntoma mГЎs caracterГӯstico de Newcastle. Llama a tu veterinario hoy mismo.\n\nMientras tanto:\n1. AГӯsla de inmediato todas las aves con sГӯntomas вҖ” Newcastle se contagia por aire, heces y secreciones\n2. No muevas aves, equipo ni personas entre galpones\n3. Refuerza la desinfecciГіn de entradas\n4. Revisa el historial de vacunaciГіn вҖ” ВҝcuГЎndo fue la Гәltima vacuna de Newcastle?\n\nSi el lote NO estaba vacunado: la mortalidad puede llegar al 80-100% sin tratamiento. Solo hay manejo de soporte (vitaminas, electrolitos).\n\nSi el lote SГҚ estaba vacunado: puede ser una cepa mГЎs agresiva o que la vacuna estГ© vencida. El veterinario puede tomar muestras para confirmar.\n\nВҝCuГЎntas aves tienen sГӯntomas y cuГЎnto tiempo llevan asГӯ?';

    if(/diarrea.*sangre|sangre.*diarrea|excreta.*sangre|caca.*roja|roja.*caca/.test(p))
      return 'Diarrea con sangre en aves de postura вҖ” los diagnГіsticos mГЎs probables son:\n\n1. COCCIDIOSIS (mГЎs comГәn en piso): parГЎsito Eimeria que daГұa el intestino. Tratamiento: amprolium o sulfonamidas en agua 5-7 dГӯas.\n2. ENTERITIS HEMORRГҒGICA: infecciГіn bacteriana. Tratamiento: antibiГіtico especГӯfico segГәn cultivo.\n3. INTOXICACIГ“N: por micotoxinas en alimento en mal estado.\n\nAcciones inmediatas:\nвң… Retira el alimento actual y revГӯsalo вҖ” Вҝhuele diferente? ВҝEstГЎ hГәmedo?\nвң… Da agua limpia con electrolitos\nвң… AГӯsla las aves mГЎs afectadas\nвң… Llama al veterinario вҖ” necesitas un diagnГіstico antes de medicar\n\nВҝEl sistema es piso o jaula? ВҝCuГЎntas aves muestran el sГӯntoma y desde cuГЎndo?';

    if(/parГЎlisis|no.*camina|no se mueve|pata.*caГӯda|ala.*caГӯda|cojea|pata.*torcida/.test(p))
      return 'La parГЎlisis o inmovilidad en aves puede tener varias causas segГәn la edad:\n\nEn aves jГіvenes (semana 4-20): probable ENFERMEDAD DE MAREK вҖ” parГЎlisis de patas y/o alas, sin tratamiento pero sГӯ prevenciГіn futura.\n\nEn aves adultas (postura): \nвҖў ARTRITIS INFECCIOSA (Mycoplasmosis sinovial): articulaciones inflamadas, cojera. Tratamiento: antibiГіticos (lincomicina, espectinomicina)\nвҖў GOLPE DE CALOR SEVERO: aves postradas, jadeo, sin parГЎlisis real вҖ” mojar con agua frГӯa y electrolitos\nвҖў DEFICIENCIA DE RIBOFLAVINA (Vitamina B2): dedos curvados, caminar inestable\nвҖў INTOXICACIГ“N: por plantas tГіxicas en pastoreo o productos quГӯmicos\n\nВҝLas patas estГЎn frГӯas o calientes? ВҝLas articulaciones estГЎn inflamadas? ВҝCuГЎntas aves estГЎn afectadas?';

    if(/come poco|no come|perdiГі apetito|bajГі consumo|no quiere comer/.test(p))
      return 'La pГ©rdida de apetito es el primer sГӯntoma de casi cualquier enfermedad. Para afinar el diagnГіstico necesito mГЎs datos:\n\nВҝNotas alguno de estos sГӯntomas adicionales?\nвҖў Tos, estornudos o secreciГіn nasal вҶ’ problema respiratorio\nвҖў Diarrea (color y consistencia) вҶ’ problema digestivo o enfermedad\nвҖў Plumas erizadas y aves agrupadas вҶ’ fiebre o estrГ©s severo\nвҖў ReducciГіn de agua tambiГ©n вҶ’ muy grave, enfermedad sistГ©mica\nвҖў Solo bajГі el alimento sin otros sГӯntomas вҶ’ revisa temperatura (calor reduce apetito), frescura del alimento y estrГ©s\n\nMientras me cuentas mГЎs: da electrolitos en el agua (azГәcar + sal) y vitaminas. No mediques sin diagnГіstico. ВҝHay otros sГӯntomas ademГЎs de que no come?';

    if(/tos|estornudo|resoplido|ronquido|ruido.*respirar|respirar.*difГӯcil|boqueo|moquillo/.test(p))
      return 'Problemas respiratorios confirmados. Las causas mГЎs frecuentes por probabilidad:\n\n1. MICOPLASMOSIS (Mycoplasma gallisepticum) вҖ” MUY COMГҡN:\n   SГӯntomas: tos, estertores, secreciГіn nasal, ojos hГәmedos, producciГіn baja\n   Tratamiento: tilosina, enrofloxacina o doxiciclina en agua por 5-7 dГӯas\n\n2. BRONQUITIS INFECCIOSA:\n   SГӯntomas: tos seca, estertores, huevos deformes\n   No hay tratamiento вҖ” solo soporte y prevenciГіn con vacuna\n\n3. NEWCASTLE (forma respiratoria):\n   SГӯntomas: tos, caГӯda brusca de postura, puede progresar a sГӯntomas nerviosos\n   URGENTE вҖ” llama al veterinario\n\n4. CORIZA INFECCIOSA:\n   SГӯntomas: tos + hinchazГіn facial + MAL OLOR\n   Tratamiento: antibiГіticos\n\nВҝQuГ© porcentaje del lote tiene sГӯntomas? ВҝHay caГӯda de postura? ВҝLos huevos tienen forma normal? ВҝHay mal olor en el galpГіn?';

    if(/aves|gallina|lote|algunas|muchas|pocas|toda|varios/.test(p) && /sГӯntoma|mal|enferma|rara|diferente|decaГӯda|triste/.test(p))
      return 'Gracias por los detalles. Para darte el diagnГіstico mГЎs preciso necesito que me confirmes:\n\n1. ВҝQuГ© porcentaje del lote estГЎ afectado? (1-5 aves / 5-20% / mГЎs del 20%)\n2. ВҝCuГЎnto tiempo llevan con sГӯntomas? (horas / dГӯas / semanas)\n3. ВҝLa mortalidad ha aumentado?\n4. ВҝCambiГі algo recientemente? (alimento nuevo, vacuna, visita al galpГіn, lluvia, cambio de temperatura)\n5. ВҝEl alimento y el agua estГЎn normales?\n\nResponde lo que puedas y te doy mi diagnГіstico.';
  }

  if(/mi gallina.*enferma|gallina.*enferma|aves.*enfermas|lote.*enfermo|algo.*raro|se ven mal|estГЎn mal|algo.*pasa|quГ©.*tiene|quГ© le.*pasa|cГіmo sГ©.*quГ©|cГіmo.*saber.*quГ©|cГіmo.*diagnostico/.test(p)){
    return 'Vamos a diagnosticarlo juntos. Para saber quГ© le pasa a tu lote necesito que me describes lo que estГЎs viendo.\n\nContГ©stame estas preguntas:\n\nрҹ”Қ ВҝQUГү VES EN LAS AVES?\nвҖў ВҝTienen los ojos hinchados, cerrados o con moco?\nвҖў ВҝTosen, estornudan o hacen ruidos al respirar?\nвҖў ВҝTienen diarrea? ВҝDe quГ© color? (amarilla, verde, blanca, con sangre)\nвҖў ВҝAlguna tiene el cuello torcido o no puede caminar?\nвҖў ВҝLas plumas estГЎn erizadas?\n\nрҹ“Ҡ ВҝQUГү TANTO AFECTA?\nвҖў ВҝCuГЎntas aves tienen sГӯntomas?\nвҖў ВҝHace cuГЎnto empezГі?\nвҖў ВҝLa postura bajГі? ВҝCuГЎnto?\nвҖў ВҝHa habido muertes?\n\nCuГ©ntame todo lo que ves y te doy mi diagnГіstico con los pasos a seguir.';
  }

  if(/quГ© me recomiendas|que me recomiendas|quГ© hago|que hago|cГіmo mejoro|por dГіnde empiezo|quГ© es lo primero|quГ© deberГӯa hacer|dame un consejo|ayГәdame|ayudame/.test(p)){

    }

    if(historial.length>1){
      var caida=(historial[1].pctPostura-historial[0].pctPostura);

      recomendaciones.push('рҹҢҫ Revisa que el inventario de alimento tenga al menos 2 semanas de reserva.');
      recomendaciones.push('рҹ’ү MantГ©n el programa de vacunaciГіn al dГӯa.');
    }

    return 'Mis recomendaciones para tu lote de '+aves.toLocaleString('es-MX')+' aves en semana '+sem+':\n\n'+recomendaciones.join('\n\n')+'\n\nВҝQuieres que profundice en alguno de estos puntos?';
  }

  if(convActual.length>=2 && /tengo|tenemos|hay|notГ©|notan|vi|vemos|sГӯ.*hay|sГӯ.*tiene|tiene.*tambiГ©n|ademГЎs|tambiГ©n/.test(p) && p.length>10){
    var sintomas=[];
    if(/tos|estornudo|moco|respirar/.test(p)) sintomas.push('respiratorio');
    if(/diarrea|excreta|caca|heces/.test(p)) sintomas.push('digestivo');
    if(/ojo|cara|hinchad/.test(p)) sintomas.push('ocular');

    }
