// Sincronizar todos los recordatorios al backend
function sincronizarRecordatorios() {
  if (!avigoTieneSession()) return;
  var tipoMap = { 'rec-alim':'alimentacion','rec-huevo':'recoleccion','rec-bebedero':'bebederos','rec-comedero':'comederos','rec-cama':'cama','rec-galpon':'galpon' };
  var todosRecs = granja.recordatorios || {};
  var recsArray = Object.keys(tipoMap).map(function(k) {
    var r = todosRecs[k] || {};
    var hora = (r.horas && r.horas.length > 0) ? r.horas[0] : '07:00';
    return { tipo: tipoMap[k], activo: r.activo || false, hora: hora, frecuencia: r.frec || 'diario' };
  });
  fetch(AVIGO_API + '/push/recordatorios', {
    method: 'POST',
    headers: avigoHeaders(),
    body: JSON.stringify({ recordatorios: recsArray })
  }).then(function() {
    console.log('[PUSH] Recordatorios sincronizados');
  }).catch(function() {});
}

function agregarHoraRec(id){
  var data = _getRecData(id);
  data.horas.push('07:00');
  guardarEnStorage();
  // Re-render solo la lista de horarios
  var lista = document.getElementById('lista-hrs-'+id);
  if(!lista) return;
  _reRenderHoras(id);
}

function quitarHoraRec(id, idx){ idx=parseInt(idx);
  var data = _getRecData(id);
  if(data.horas.length<=1){ showToast('Debe tener al menos un horario'); return; }
  data.horas.splice(idx,1);
  guardarEnStorage();
  _reRenderHoras(id);
  showToast('Horario eliminado');
}

function cambiarHoraRec(id, idx, valor){ idx=parseInt(idx);
  var data = _getRecData(id);
  // Asegurar formato HH:MM con padding
  if (valor && valor.indexOf(':') >= 0) {
    var parts = valor.split(':');
    valor = parts[0].padStart(2,'0') + ':' + parts[1].padStart(2,'0');
  }
  data.horas[idx] = valor;
  guardarEnStorage();
  // Sincronizar con backend para que el cron use la hora correcta
  setTimeout(sincronizarRecordatorios, 500);
}

function bindLotes(){
  if(!granja.lotes) return;
  granja.lotes.forEach(function(lote, _li){
    var item = document.getElementById('lote-item-'+_li);
    if(item){ item.onclick = (function(i){ return function(){ cambiarLote(i); }; })(_li); }
    var del = document.getElementById('del-lote-'+_li);
    if(del){ del.onclick = (function(i){ return function(e){ e.stopPropagation(); eliminarLote(i); }; })(_li); }
  });
}


function backupDatos(){
  try {
    // Sincronizar historial del lote activo antes de guardar
    if(granja.lotes && granja.lotes[granja.loteActivo||0]){
      granja.lotes[granja.loteActivo||0].historial = historial.slice();
    }
    var raw = localStorage.getItem('avigo_v1');
    if(!raw){ showToast('Sin datos para respaldar'); return; }
    var fecha = new Date().toISOString().split('T')[0];
    var nombre = 'avigo-backup-'+granja.nombre.replace(/[^a-zA-Z0-9]/g,'-')+'-'+fecha+'.json';
    var blob = new Blob([raw], {type:'application/json'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = nombre;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    showToast('✓ Respaldo descargado: '+nombre);
  } catch(e){ showToast('Error al crear respaldo: '+e.message); }
}

function restaurarDatos(input){
  var file = input.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    try {
      var datos = JSON.parse(e.target.result);
      // Verificar que es un backup válido de AviGo
      if(!datos.g || !datos.g.nombre){ showToast('⚠ Archivo no válido'); return; }
      if(!confirm('¿Restaurar datos de "'+datos.g.nombre+'"?\nSe reemplazarán los datos actuales.')) return;
      localStorage.setItem('avigo_v1', e.target.result);
      showToast('✓ Datos restaurados. Reiniciando...');
      setTimeout(function(){ location.reload(); }, 1000);
    } catch(e){ showToast('Error al restaurar: '+e.message); }
  };
  reader.readAsText(file);
  // Limpiar el input para poder restaurar el mismo archivo de nuevo
  input.value = '';
}

// Auto-backup cada vez que se guarda (en memoria, no descarga)
var _lastAutoBackup = null;
function autoBackupCheck(){
  try {
    var now = new Date().toISOString().split('T')[0];
    if(_lastAutoBackup !== now && historial.length > 0){
      _lastAutoBackup = now;
      // Guardar copia en sessionStorage como red de seguridad
      var raw = localStorage.getItem('avigo_v1');
      if(raw) sessionStorage.setItem('avigo_autobackup_'+now, raw);
    }
  } catch(e){}
}

      else if(prom7>=70){ pIco='🥚'; pCol='#16A34A'; pMsg='Postura '+prom7+'% — vas bien, meta cumplida.'; }
      else if(prom7>=60){ pIco='🥚'; pCol='#D97706'; pMsg='Postura '+prom7+'% — un poco baja. Revisa que tengan suficiente calcio (cascarón molido) y agua fresca.'; }
      else { pIco='🥚'; pCol='#EF4444'; pMsg='Postura '+prom7+'% — muy baja. Revisa alimentación, agua, estrés y posibles enfermedades.'; }
      decisiones.push({ico:pIco, col:pCol, msg:pMsg});
    }

    // 2. ZONA / ROTACIÓN
    if(diasEnZona>=7){ decisiones.push({ico:'🔄', col:'#EF4444', msg:'Llevas '+diasEnZona+' días en Zona '+zona+' — mueve tus gallinas HOY a otra zona. El pasto ya se agotó.'}); }
    else if(diasEnZona>=5){ decisiones.push({ico:'🔄', col:'#D97706', msg:'Llevas '+diasEnZona+' días en Zona '+zona+' — en '+(7-diasEnZona)+' días cambia de zona para que el pasto se recupere.'}); }
    else if(diasEnZona>0){ decisiones.push({ico:'🔄', col:'#16A34A', msg:'Zona '+zona+' en buen estado — llevas '+diasEnZona+' días, aún tienes '+(7-diasEnZona)+' días antes de rotar.'}); }

    // 3. PASTO
    if(pasto==='seco'){ decisiones.push({ico:'🌿', col:'#EF4444', msg:'El pasto está seco — dale hoy alfalfa, maíz o forraje extra para compensar la falta de hierba.'}); }
    else if(pasto==='regular'){ decisiones.push({ico:'🌿', col:'#D97706', msg:'El pasto está regular — complementa con algo de alfalfa o forraje para que no les falte nutrientes.'}); }
    else { decisiones.push({ico:'🌿', col:'#16A34A', msg:'El pasto está bueno — tus gallinas están aprovechando bien el área de pastoreo.'}); }

    // 4. BAJAS / DEPREDADORES
    if(diasSinBajas===0 && historial.length>0 && (historial[0].bajas||0)>0){
      var causa = historial[0].causaBaja||'';
      var cauMsg = causa==='coyote'||causa==='aguila'||causa==='zorro'||causa==='serpiente'||causa==='roedor' ?
        'Revisa y refuerza cercas y gallinero esta noche. Cierra bien antes de que oscurezca.' :
        'Observa las demás gallinas, separa las enfermas y revisa el agua y alimento.';
      decisiones.push({ico:'🦊', col:'#EF4444', msg:'Tuviste '+(historial[0].bajas)+' baja(s) hoy. '+cauMsg});
    } else if(diasSinBajas>=14){ decisiones.push({ico:'✅', col:'#16A34A', msg:diasSinBajas+' días sin pérdidas — tu rancho está muy bien protegido. Sigue cerrando el gallinero cada noche.'}); }
    else if(diasSinBajas>=7){ decisiones.push({ico:'✅', col:'#16A34A', msg:diasSinBajas+' días sin bajas — buen control. Revisa las cercas cada semana.'}); }

    // 5. COMPORTAMIENTO
    if(comportamiento==='estresado'){ decisiones.push({ico:'🐔', col:'#EF4444', msg:'Tus gallinas están estresadas — revisa si hay depredadores rondando, mucho calor o falta de agua.'}); }
    else if(comportamiento==='letargico'){ decisiones.push({ico:'🐔', col:'#EF4444', msg:'Tus gallinas están quietas — puede ser enfermedad. Separa las que veas mal y observa si comen y toman agua.'}); }
    else if(comportamiento==='normal'&&regHoy){ decisiones.push({ico:'🐔', col:'#16A34A', msg:'Tus gallinas están normal y activas — buen signo de salud y bienestar.'}); }

    // 6. GANANCIA
    if(regHoy && ingreso>0){
      var gMsg = 'Ganaste $'+ingreso.toLocaleString('es-MX')+' hoy';
      if(ahorroDia>0) gMsg += ' y ahorraste $'+ahorroDia.toLocaleString('es-MX')+' vs comprar todo balanceado.';
      else gMsg += '.';
      decisiones.push({ico:'💰', col:'#D97706', msg:gMsg});
    }

    // 7. DESPARASITACIÓN
    var tp3=_getTraspatio();
    var dd=tp3.ultDesparas?Math.round((new Date()-new Date(tp3.ultDesparas))/86400000):null;
    var pd=dd!==null?Math.max(0,90-dd):null;
    if(pd!==null&&pd<=0){ decisiones.push({ico:'💊', col:'#EF4444', msg:'¡Es tiempo de desparasitar! Dale ajo en agua o semillas de calabaza molidas 3 días seguidos.'}); }
    else if(pd!==null&&pd<=15){ decisiones.push({ico:'💊', col:'#D97706', msg:'Desparasitación en '+pd+' días — prepara el ajo o semillas de calabaza.'}); }

    // 8. PARVADA — gallos, cluecas, pollitos
    var gallos=tp3.gallos||0;
    var cluecas=tp3.cluecas||0;
    var pollitos=tp3.pollitos||0;
    var incubando=tp3.incubando||0;
    var fechaEclos=tp3.fechaEclos||'';
    var gallinas=d.aves||0;
    if(gallos>0){
      var proporcion=Math.round(gallinas/gallos);
      if(proporcion>12){ decisiones.push({ico:'🐓', col:'#D97706', msg:'Tienes 1 gallo por '+proporcion+' gallinas — lo ideal es 1 por cada 8-12. Considera agregar otro gallo.'}); }
      else if(proporcion<8){ decisiones.push({ico:'🐓', col:'#D97706', msg:'Tienes demasiados gallos (1 por '+proporcion+' gallinas) — pueden estresarlas. Lo ideal es 1 por 8-12.'}); }
      else { decisiones.push({ico:'🐓', col:'#16A34A', msg:'Tienes '+gallos+' gallo(s) para '+gallinas+' gallinas — proporción ideal, buena fertilidad.'}); }
    } else {
      decisiones.push({ico:'🐓', col:'#9CA3AF', msg:'No tienes gallos registrados. Si quieres incubar huevos naturalmente, necesitas al menos 1 gallo por cada 10 gallinas.'});
    }
    if(cluecas>0){ decisiones.push({ico:'🪺', col:'#7C3AED', msg:cluecas+' gallina(s) cluecas — llevan ~21 días sin poner. Esto explica parte de la baja en postura.'}); }
    if(pollitos>0){ decisiones.push({ico:'🐥', col:'#0284C7', msg:'Tienes '+pollitos+' pollitos en cría — en 20-26 semanas empezarán a poner. Dales maíz molido fino y agua limpia.'}); }
    if(fechaEclos){
      var diasEclos=Math.round((new Date(fechaEclos)-new Date())/86400000);
      if(diasEclos>=0&&diasEclos<=3){ decisiones.push({ico:'🐣', col:'#D97706', msg:'¡Los huevos eclosionan en '+diasEclos+' día(s)! Prepara un lugar cálido y seco para los pollitos.'}); }
      else if(diasEclos>3&&diasEclos<=7){ decisiones.push({ico:'🥚', col:'#16A34A', msg:'Eclosión en '+diasEclos+' días — revisa que la gallina clueca esté bien y no sea molestada.'}); }
    }

    // 9. ALIMENTACIÓN NATURAL
    var m2F=tp3.m2Forraje||0;
    var fermKg=tp3.fermentando||0;
    var huerto3=tp3.huerto||[];
    if(m2F>0){
      var prodF=Math.round(m2F*3.125*10)/10;
      var kgNec=Math.round(d.aves*0.108*0.4*10)/10;
      var pctCub=kgNec>0?Math.min(100,Math.round(prodF/kgNec*100)):0;
      if(pctCub>=80){ decisiones.push({ico:'🌿', col:'#16A34A', msg:'Tu forraje hidropónico cubre el '+pctCub+'% de la alimentación — excelente ahorro. Produce '+prodF+' kg/día.'}); }
      else if(pctCub>0){ decisiones.push({ico:'🌿', col:'#D97706', msg:'Tu forraje cubre el '+pctCub+'% de la alimentación. Aumenta a '+Math.ceil(kgNec/3.125)+' m² para cubrir el 100%.'}); }
    } else {
      decisiones.push({ico:'🌱', col:'#9CA3AF', msg:'No tienes forraje hidropónico registrado. Con solo '+Math.ceil(d.aves*0.108*0.4/3.125)+' m² podrías ahorrar $'+Math.round(d.aves*0.108*0.4*30*(granja.precioKgAl||7)*0.85).toLocaleString('es-MX')+' al mes.'});
    }
    if(fermKg>0){ decisiones.push({ico:'🫙', col:'#16A34A', msg:'Tienes '+fermKg+' kg de granos fermentando — mejora la digestión 20% y reduces el consumo de balanceado.'}); }
    if(huerto3.length>0){ decisiones.push({ico:'🥬', col:'#16A34A', msg:'Usas '+huerto3.length+' planta(s) del huerto — tus gallinas tienen variedad natural que mejora la calidad del huevo.'}); }

    // 10. PIOJOS / HIGIENE
    var estadoPiojos=tp3.estadoPiojos||'';
    if(estadoPiojos==='grave'){ decisiones.push({ico:'🚨', col:'#EF4444', msg:'Infestación grave de piojos — aplica tierra de diatomeas en plumaje y cambia el arenal. Urgente.'}); }
    else if(estadoPiojos==='leve'){ decisiones.push({ico:'⚠️', col:'#D97706', msg:'Infestación leve de piojos — pon ceniza en el arenal y coloca hierbas repelentes (albahaca, menta) en los nidos.'}); }

    // Renderizar
    if(decisiones.length===0){
      sc+='<div style="font-size:12px;color:#9CA3AF;font-style:italic">Registra el día de hoy para ver el análisis de tu rancho.</div>';
    } else {
      decisiones.forEach(function(dec){
        sc+='<div style="display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #F9FAFB">';
        sc+='<div style="font-size:18px;flex-shrink:0;width:24px;text-align:center">'+dec.ico+'</div>';
        sc+='<div style="font-size:13px;color:#374151;line-height:1.5;font-weight:600">'+dec.msg+'</div>';
        sc+='</div>';
      });
    }
  })();

  sc+='</div>';

  // HERRAMIENTAS
  sc+='<div style="background:#fff;border-radius:16px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.04)">';
  sc+='<div style="font-size:13px;font-weight:900;color:#111827;margin-bottom:10px">🌿 Herramientas</div>';
  sc+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
  [{screen:"parvada",emoji:"🐔",n:"Mi parvada",sub:"Gallos · Cluecas · Pollitos"},
   {screen:"alimentacion_natural",emoji:"🌱",n:"Alimentación",sub:"Forraje · Fermentación"},
   {screen:"salud_natural",emoji:"💊",n:"Salud natural",sub:"Remedios · Parásitos"},
   {screen:"economia_traspatio",emoji:"💰",n:"Economía",sub:"Clientes · Gallinaza"},
  ].forEach(function(m){
    sc+='<div onclick="nav(\''+m.screen+'\')" style="background:#F9FAFB;border-radius:14px;padding:12px;cursor:pointer;border:1.5px solid #F3F4F6">';
    sc+='<div style="font-size:22px;margin-bottom:5px">'+m.emoji+'</div>';
    sc+='<div style="font-size:12px;font-weight:800;color:#111827">'+m.n+'</div>';
    sc+='<div style="font-size:10px;color:#9CA3AF;margin-top:2px">'+m.sub+'</div></div>';
  });
  sc+='</div></div>';
  sc+='<div style="height:8px"></div>';
  sc+='</div></div>';
  sc+=navBar('dash');
  sc+='</div>';
  return sc;
}

// PANTALLA: PARVADA COMPLETA (gallos, cluecas, pollitos)
// ══════════════════════════════════════════════════════════════
screens.parvada = function(){
  setStatus(false);
  var tp = _getTraspatio();
  var gallos      = tp.gallos      || 0;
  var cluecas     = tp.cluecas     || 0;
  var pollitos    = tp.pollitos    || 0;
  var incubando   = tp.incubando   || 0;
  var fechaEclos  = tp.fechaEclos  || '';
  var gallinas    = granja.avesVivas || 0;
  var proporcion  = gallos>0 ? Math.round(gallinas/gallos) : 0;
  var propColor   = proporcion>=8&&proporcion<=12 ? '#16A34A' : proporcion>0 ? '#D97706' : '#9CA3AF';
  var propMsg     = proporcion>=8&&proporcion<=12 ? 'Proporción ideal' : proporcion>12 ? 'Faltan gallos' : proporcion>0&&proporcion<8 ? 'Demasiados gallos' : 'Sin gallos registrados';

  // Días para eclosión
  var diasEclos = '';
  if(fechaEclos){
    var diff = Math.round((new Date(fechaEclos) - new Date()) / 86400000);
    diasEclos = diff>0 ? diff+' días para eclosión' : diff===0 ? '¡Hoy eclosionan!' : 'Eclosión hace '+Math.abs(diff)+' días';
  }

  var CARD = 'background:#fff;border-radius:18px;box-shadow:0 4px 16px rgba(0,0,0,.06);padding:16px';
  var LABEL = 'font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px';
  var INP = 'width:100%;padding:12px;border:1.5px solid #E5E7EB;border-radius:12px;font-size:20px;font-weight:900;text-align:center;font-family:inherit;outline:none;box-sizing:border-box';
  var GRID2 = 'display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px';

  var sc = '<div style="flex:1;display:flex;flex-direction:column;background:#EDFAF3;overflow:hidden">';
  sc += '<div style="background:#fff;padding:14px 20px;box-shadow:0 2px 12px rgba(0,0,0,.04);flex-shrink:0;display:flex;align-items:center;gap:12px">';
  sc += '<button onclick="nav(\'dash\')" style="width:36px;height:36px;border-radius:50%;border:1.5px solid #E5E7EB;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 4L6 8l4 4" stroke="#374151" stroke-width="1.8" stroke-linecap="round"/></svg></button>';
  sc += '<div><div style="font-size:17px;font-weight:900;color:#111827">Mi Parvada</div>';
  sc += '<div style="font-size:11px;color:#9CA3AF;margin-top:1px">🌿 Control completo de traspatio</div></div>';
  sc += '</div>';

  sc += '<div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px">';
  sc += '<div style="display:flex;flex-direction:column;gap:12px">';

  // RESUMEN PARVADA
  sc += '<div style="'+CARD+'">';
  sc += '<div style="font-size:13px;font-weight:900;color:#111827;margin-bottom:12px">🐔 Composición de la parvada</div>';
  sc += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">';
  var items = [
    {n:'Gallinas', v:gallinas, col:'#16A34A', emoji:'🐔'},
    {n:'Gallos',   v:gallos,   col:'#D97706', emoji:'🐓'},
    {n:'Cluecas',  v:cluecas,  col:'#7C3AED', emoji:'🪺'},
    {n:'Pollitos', v:pollitos, col:'#0284C7', emoji:'🐥'},
  ];
  items.forEach(function(it){
    sc += '<div style="text-align:center;background:#F9FAFB;border-radius:12px;padding:10px 4px">';
    sc += '<div style="font-size:18px">'+it.emoji+'</div>';
    sc += '<div style="font-size:18px;font-weight:900;color:'+it.col+'">'+it.v+'</div>';
    sc += '<div style="font-size:9px;color:#9CA3AF;font-weight:700">'+it.n.toUpperCase()+'</div>';
    sc += '</div>';
  });
  sc += '</div>';
  // Proporción gallo/gallina
  if(gallos>0){
    sc += '<div style="margin-top:12px;background:#F0FDF4;border-radius:12px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center">';
    sc += '<div style="font-size:12px;font-weight:700;color:#374151">Proporción gallo : gallinas</div>';
    sc += '<div style="font-size:13px;font-weight:900;color:'+propColor+'">1 : '+proporcion+' · '+propMsg+'</div>';
    sc += '</div>';
  }
  sc += '</div>';

  // CONTROL DE GALLOS
  sc += '<div style="'+CARD+'">';
  sc += '<div style="font-size:13px;font-weight:900;color:#111827;margin-bottom:12px">🐓 Control de gallos</div>';
  sc += '<div style="'+GRID2+'">';
  sc += '<div><div style="'+LABEL+'">Gallos activos</div>';
  sc += '<input id="inp-gallos" type="number" min="0" value="'+gallos+'" style="'+INP+';color:#D97706"></div>';
  sc += '<div><div style="'+LABEL+'">Proporción ideal</div>';
  sc += '<div style="background:#F0FDF4;border-radius:12px;padding:12px;text-align:center">';
  sc += '<div style="font-size:16px;font-weight:900;color:#16A34A">1 : 8-12</div>';
  sc += '<div style="font-size:10px;color:#9CA3AF;margin-top:2px">gallinas por gallo</div>';
  sc += '</div></div></div>';
  sc += '<div style="margin-top:10px;background:#FFFBEB;border-radius:10px;padding:10px 12px;font-size:11px;color:#92400E;font-weight:600">';
  sc += '💡 Con '+gallinas+' gallinas necesitas '+(Math.ceil(gallinas/10))+' a '+(Math.ceil(gallinas/8))+' gallos para fertilidad óptima';
  sc += '</div></div>';

  // GALLINAS CLUECAS
  sc += '<div style="'+CARD+'">';
  sc += '<div style="font-size:13px;font-weight:900;color:#111827;margin-bottom:12px">🪺 Gallinas echadas / cluecas</div>';
  sc += '<div style="'+GRID2+'">';
  sc += '<div><div style="'+LABEL+'">Cluecas ahora</div>';
  sc += '<input id="inp-cluecas" type="number" min="0" value="'+cluecas+'" style="'+INP+';color:#7C3AED"></div>';
  sc += '<div><div style="'+LABEL+'">Cuánto dura</div>';
  sc += '<div style="background:#F5F3FF;border-radius:12px;padding:12px;text-align:center">';
  sc += '<div style="font-size:16px;font-weight:900;color:#7C3AED">21 días</div>';
  sc += '<div style="font-size:10px;color:#9CA3AF;margin-top:2px">incubación natural</div>';
  sc += '</div></div></div>';
  sc += '<div style="margin-top:10px;background:#F5F3FF;border-radius:10px;padding:10px 12px;font-size:11px;color:#5B21B6;font-weight:600">';
  sc += '💡 Una gallina clueca deja de poner durante ~21 días + 2-4 semanas de crianza = 6 semanas sin postura';
  sc += '</div></div>';

  // INCUBACIÓN NATURAL
  sc += '<div style="'+CARD+'">';
  sc += '<div style="font-size:13px;font-weight:900;color:#111827;margin-bottom:12px">🥚 Huevos puestos a incubar</div>';
  sc += '<div style="'+GRID2+'">';
  sc += '<div><div style="'+LABEL+'">Huevos incubando</div>';
  sc += '<input id="inp-incubando" type="number" min="0" value="'+incubando+'" style="'+INP+';color:#D97706"></div>';
  sc += '<div><div style="'+LABEL+'">Fecha de eclosión</div>';
  sc += '<input id="inp-eclosion" type="date" value="'+fechaEclos+'" style="width:100%;padding:11px;border:1.5px solid #E5E7EB;border-radius:12px;font-size:13px;font-family:inherit;outline:none;box-sizing:border-box"></div>';
  sc += '</div>';
  if(diasEclos){
    sc += '<div style="margin-top:10px;background:#FFF7ED;border-radius:10px;padding:10px 12px;font-size:12px;font-weight:800;color:#C2410C">🐣 '+diasEclos+'</div>';
  }
  sc += '<div style="margin-top:10px;background:#FFFBEB;border-radius:10px;padding:10px 12px;font-size:11px;color:#92400E;font-weight:600">';
  sc += '💡 De estos huevos esperas: 70-85% de los huevos fértiles. Con '+incubando+' huevos espera '+Math.round(incubando*0.75)+' a '+Math.round(incubando*0.85)+' pollitos';
  sc += '</div></div>';

  // CONTROL DE POLLITOS
  sc += '<div style="'+CARD+'">';
  sc += '<div style="font-size:13px;font-weight:900;color:#111827;margin-bottom:12px">🐥 Pollitos en cría</div>';
  sc += '<div style="'+GRID2+'">';
  sc += '<div><div style="'+LABEL+'">Pollitos vivos</div>';
  sc += '<input id="inp-pollitos" type="number" min="0" value="'+pollitos+'" style="'+INP+';color:#0284C7"></div>';
  sc += '<div><div style="'+LABEL+'">Semanas para postura</div>';
  sc += '<div style="background:#EFF6FF;border-radius:12px;padding:12px;text-align:center">';
  sc += '<div style="font-size:16px;font-weight:900;color:#0284C7">20-26 sem</div>';
  sc += '<div style="font-size:10px;color:#9CA3AF;margin-top:2px">razas criollas</div>';
  sc += '</div></div></div>';
  sc += '<div style="margin-top:10px;background:#EFF6FF;border-radius:10px;padding:10px 12px;font-size:11px;color:#075985;font-weight:600">';
  sc += '💡 Alimentación pollitos: Días 1-7 maíz molido fino + agua con azúcar. Semana 2+ maíz + verduras picadas. Semana 8+ igual que adultas';
  sc += '</div></div>';

  // GUARDAR
  sc += '<button onclick="_guardarParvada()" style="width:100%;padding:16px;background:#16A34A;border:none;border-radius:16px;font-size:15px;font-weight:900;color:#fff;font-family:inherit;cursor:pointer;box-shadow:0 4px 20px rgba(22,163,74,.25)">Guardar parvada</button>';
  sc += '<div style="height:8px"></div>';
  sc += '</div></div>';
  sc += navBar('dash');
  sc += '</div>';
  return sc;
};

function _guardarParvada(){
  var tp = _getTraspatio();
  tp.gallos    = parseInt(document.getElementById('inp-gallos')?.value)||0;
  tp.cluecas   = parseInt(document.getElementById('inp-cluecas')?.value)||0;
  tp.incubando = parseInt(document.getElementById('inp-incubando')?.value)||0;
  tp.fechaEclos= document.getElementById('inp-eclosion')?.value||'';
  tp.pollitos  = parseInt(document.getElementById('inp-pollitos')?.value)||0;
  granja.traspatio = tp;
  guardarEnStorage();
  showToast('✓ Parvada actualizada');
  nav('dash');
}

// ══════════════════════════════════════════════════════════════
// PANTALLA: ALIMENTACIÓN NATURAL (forraje, fermentación, huerto)
// ══════════════════════════════════════════════════════════════
screens.alimentacion_natural = function(){
  setStatus(false);
  var tp = _getTraspatio();
  var m2Forraje   = tp.m2Forraje   || 0;
  var diaForraje  = tp.diaForraje  || ''; // día del ciclo de siembra
  var fermentando = tp.fermentando || 0;  // kg en fermentación
  var diasFerm    = tp.diasFerm    || 0;
  var huerto      = tp.huerto      || [];
  var aves        = granja.avesVivas || 0;

  // Calcular m² necesarios para cubrir X% de alimentación
  // 1 m² produce ~25 kg de forraje en 8 días = 3.125 kg/día por m²

function _calcForraje(m2, aves, precioKg){
  var m2n = parseFloat(m2)||0;
  var prod = Math.round(m2n * 3.125 * 10)/10;
  var kgNec = aves * 0.108 * 0.4;
  var pct = kgNec>0 ? Math.min(100, Math.round(prod/kgNec*100)) : 0;
  var col = pct>=80?'#16A34A':pct>=40?'#D97706':'#EF4444';
  var el1 = document.getElementById('pct-forraje');
  var el2 = document.getElementById('bar-forraje');
  var el3 = document.getElementById('ahorro-forraje');
  if(el1){ el1.textContent=pct+'%'; el1.style.color=col; }
  if(el2){ el2.style.width=pct+'%'; el2.style.background=col; }
  if(el3){ var ahorro=Math.round(prod*30*precioKg*0.85); el3.textContent='$'+ahorro.toLocaleString('es-MX'); }
}

function _toggleHuerto(id){
  var tp = _getTraspatio();
  if(!tp.huerto) tp.huerto=[];
  var idx = tp.huerto.indexOf(id);
  if(idx>=0) tp.huerto.splice(idx,1); else tp.huerto.push(id);
  granja.traspatio = tp;
  var btn = document.getElementById('hbtn-'+id);
  var tiene = tp.huerto.indexOf(id)>=0;
  if(btn){
    btn.style.borderColor = tiene?'#16A34A':'#E5E7EB';
    btn.style.background  = tiene?'#F0FDF4':'#fff';
    btn.textContent = tiene?'✓':'+ ';
  }
}

function _guardarAlimentacionNatural(){
  var tp = _getTraspatio();
  tp.m2Forraje    = parseFloat(document.getElementById('inp-m2forraje')?.value)||0;
  tp.fermentando  = parseFloat(document.getElementById('inp-fermentando')?.value)||0;
  tp.diasFerm     = parseInt(document.getElementById('inp-diasferm')?.value)||0;
  tp.precioAlfalfa= parseFloat(document.getElementById('inp-precio-alfalfa')?.value)||4;
  tp.precioMaiz   = parseFloat(document.getElementById('inp-precio-maiz')?.value)||5.5;
  granja.traspatio = tp;
  guardarEnStorage();
  showToast('✓ Alimentación natural guardada');
  nav('dash');
}

function _agregarCliente(){
  var elNombre  = document.getElementById('inp-cliente-nombre');
  var elUnidad  = document.getElementById('inp-cj-tp-unidad');
  var elCantidad= document.getElementById('inp-cliente-docenas');
  var nombre    = elNombre   ? elNombre.value.trim()         : '';
  var unidad    = elUnidad   ? (elUnidad.value||'docena')    : 'docena';
  var cantidad  = elCantidad ? parseInt(elCantidad.value)||0 : 0;
  if(!nombre)  { showToast('Escribe el nombre del cliente'); return; }
  if(!cantidad){ showToast('Escribe la cantidad'); return; }
  if(!['pieza','docena','cono','caja180','caja360'].includes(unidad)) unidad='docena';
  var tp = _getTraspatio();
  if(!tp.clientes) tp.clientes=[];
  tp.clientes.push({nombre:nombre, unidad:unidad, cantidad:cantidad});
  granja.traspatio = tp;
  guardarEnStorage();
  showToast('✓ '+nombre+' guardado ('+cantidad+' '+unidad+')');
  nav('clientes_traspatio');
}

function _guardarEconomia(){
  var tp = _getTraspatio();
  tp.precioCrello = parseFloat(document.getElementById('inp-precio-criollo')?.value)||3.5;
  tp.precioGall   = parseFloat(document.getElementById('inp-precio-gallinaza')?.value)||15;
  tp.gallinaza    = parseFloat(document.getElementById('inp-gallinaza')?.value)||0;
  tp.precioAve    = parseFloat(document.getElementById('inp-precio-ave')?.value)||0;
  tp.pesoAve      = parseFloat(document.getElementById('inp-peso-ave')?.value)||1.8;
  granja.traspatio = tp;
  guardarEnStorage();
  showToast('✓ Economía guardada');
  nav('dash');
}


function _rentaTraspatio(){
  var tp  = _getTraspatio();
  var d   = calcDash();
  var hoy = new Date().toISOString().split('T')[0];
  var today = new Date();
  var mesAct = hoy.substring(0,7);

  // Calcular totales del mes — FUENTE PRINCIPAL: historialVentas
  var ingMes=0, costMes=0, huevosMes=0, ahorroCiclo=0;

  // 1. Ventas reales del mes desde historialVentas
  var historialVentasAll = tp.historialVentas || [];
  ingMes = historialVentasAll
    .filter(function(v){ return v.fecha && v.fecha.substring(0,7)===mesAct; })
    .reduce(function(s,v){ return s+(v.ingreso||0); }, 0);

  // 2. Gastos y huevos desde historial de producción
  historial.forEach(function(r){
    if(r.fecha&&r.fecha.substring(0,7)===mesAct){
      costMes  += (r.gastoDia||0);
      huevosMes+= (r.huevos||0);
    }
    var kb=parseFloat((r.alimentos&&r.alimentos.balanceado)||r.kg||0);
    ahorroCiclo+=Math.max(0,Math.round((d.kgDia-kb)*(granja.precioKgAl||7)));
  });

  // 3. Si no hay ventas registradas pero sí producción, estimar por precio
  if(ingMes===0 && huevosMes>0){
    ingMes = Math.round(huevosMes * (granja.precioHuevo||3.5));
  }

  // Datos de economía guardados
  var precioCrello = tp.precioCrello || granja.precioHuevo || 3.5;
  var precioGall   = tp.precioGall   || 15;
  var gallinaza    = tp.gallinaza    || 0;
  var precioAve    = tp.precioAve    || 0;
  var pesoAve      = tp.pesoAve      || 1.8;

  var hoyFecha        = new Date().toISOString().split('T')[0];
  var ventasHoy       = historialVentas.filter(function(v){return v.fecha===hoyFecha;});
  var avesVivas       = granja.avesVivas || 0;

  // Totales de ventas de hoy
  var totalHuevosVendidos = ventasHoy.reduce(function(s,v){return s+(v.huevos||v.cant||0);},0);
  var totalIngresoHoy     = ventasHoy.reduce(function(s,v){return s+(v.ingreso||0);},0);



  // Proyección
  var diasMes   = new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
  var diaActual = today.getDate();
  var proyeccion= diaActual>0?Math.round((ingMes/diaActual)*diasMes):0;
  var costoHuevo= huevosMes>0?Math.round(costMes/huevosMes*100)/100:0;
  var margen    = costoHuevo>0&&precioCrello>0?Math.round((precioCrello-costoHuevo)/precioCrello*100):0;
  var ingGallinaza = Math.round(gallinaza*precioGall);
  var ingresoFin   = precioAve>0?Math.round(avesVivas*pesoAve*precioAve):0;

  // Unidades de venta: conversiones
  var unidades = [
    {id:'pieza',   n:'Pieza',      cant:1,   icon:'🥚'},
    {id:'docena',  n:'Docena',     cant:12,  icon:'📦'},
    {id:'cono',    n:'Cono (30)',  cant:30,  icon:'🛒'},

  ];

  // Precio sugerido según canal
  var precioDirecto     = Math.round(precioCrello*1.3*10)/10;

// Calcular tabla de precios
function _calcPrecios(precioBase){
  var p=parseFloat(precioBase)||0;
  var unidades=[{id:'pieza',n:'Pieza',cant:1,icon:'🥚'},{id:'docena',n:'Docena',cant:12,icon:'📦'},{id:'cono',n:'Cono (30)',cant:30,icon:'🛒'},{id:'caja',n:'Caja (360)',cant:360,icon:'📫'},{id:'kg',n:'Kg (~18)',cant:18,icon:'⚖️'}];
  var el=document.getElementById('tabla-precios');
  if(!el) return;
  var html='';
  unidades.forEach(function(u){
    var total=Math.round(p*u.cant*100)/100;
    html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:#F9FAFB;border-radius:10px;margin-bottom:6px">';
    html+='<div style="font-size:13px;font-weight:700;color:#111827">'+u.icon+' '+u.n+'</div>';
    html+='<div style="font-size:15px;font-weight:900;color:#16A34A">$'+total.toLocaleString('es-MX')+'</div>';

  el.innerHTML=html;

// Agregar venta al historial del día
function _agregarVenta(){
  var unidad = document.getElementById('vta-unidad')?.value||'pieza';
  var cant   = parseInt(document.getElementById('vta-cant')?.value)||1;
  var precio = parseFloat(document.getElementById('vta-precio')?.value)||0;
  var canal  = document.getElementById('vta-canal')?.value||'directo';
  var unidades={pieza:1,docena:12,cono:30,caja:360,kg:18};
  var huevos = cant*(unidades[unidad]||1);
  var ingreso= Math.round(precio*cant*100)/100;
  if(!precio||!cant){ showToast('Ingresa cantidad y precio'); return; }
  var tp=_getTraspatio();
  if(!tp.ventasHoy) tp.ventasHoy=[];
  tp.ventasHoy.push({unidad:unidad,cant:cant,precio:precio,canal:canal,huevos:huevos,ingreso:ingreso});
  // Actualizar ingresoDia en historial si existe registro de hoy
  var hoy=new Date().toISOString().split('T')[0];
  if(historial.length>0&&historial[0].fecha===hoy){
    var totalVentas=tp.ventasHoy.reduce(function(s,v){return s+(v.ingreso||0);},0);
    historial[0].ingresoVenta=totalVentas;
    historial[0].ingresoDia=totalVentas;
  }
  granja.traspatio=tp;
  guardarEnStorage();
  showToast('✓ Venta registrada');
  nav('ventas_traspatio');
}

// Quitar venta
function _quitarVenta(idx){
  var tp=_getTraspatio();
  if(!tp.ventasHoy) return;
  tp.ventasHoy.splice(idx,1);
  var hoy=new Date().toISOString().split('T')[0];
  if(historial.length>0&&historial[0].fecha===hoy){
    var totalVentas=tp.ventasHoy.reduce(function(s,v){return s+(v.ingreso||0);},0);
    historial[0].ingresoVenta=totalVentas;
    historial[0].ingresoDia=totalVentas;
  }
  granja.traspatio=tp;
  guardarEnStorage();
  nav('ventas_traspatio');
}

// Quitar cliente
function _quitarCliente(idx){
  var tp=_getTraspatio();
  if(!tp.clientes) return;
  tp.clientes.splice(idx,1);
  granja.traspatio=tp;
  guardarEnStorage();
  nav('clientes_traspatio');
}

  // LISTA
  sc+='<div style="'+CARD+'">';
  sc+='<div style="font-size:12px;font-weight:800;color:#9CA3AF;text-transform:uppercase;margin-bottom:10px">Clientes ('+clientes.length+')</div>';
  if(clientes.length===0){
    sc+='<div style="text-align:center;padding:20px 0">';
    sc+='<div style="font-size:36px;margin-bottom:8px">👤</div>';
    sc+='<div style="font-size:13px;color:#9CA3AF">Sin clientes registrados aún</div>';
    sc+='</div>';
  } else {
    clientes.forEach(function(c,ci){
      var unidad    = c.unidad || 'docena';
      var cant      = c.cantidad||c.docenas||0;
      var unidadNom = getNombreUnidad(unidad);
      var precioU   = getPrecioUnidad(unidad);
      var ingSem    = Math.round(cant*precioU);
      var uObj      = UNIDADES.find(function(u){return u.id===unidad;})||{cant:12};
      var huevosSem = cant*uObj.cant;
      sc+='<div style="background:#fff;border-radius:16px;padding:16px;margin-bottom:10px;border:1.5px solid #E5E7EB">';
      // Fila superior: nombre + botón eliminar
      sc+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">';
      sc+='<div style="display:flex;align-items:center;gap:10px">';
      sc+='<div style="width:44px;height:44px;border-radius:50%;background:#EFF6FF;border:2px solid #BFDBFE;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">👤</div>';
      sc+='<div><div style="font-size:16px;font-weight:900;color:#111827">'+c.nombre+'</div>';
      sc+='<div style="font-size:12px;color:#9CA3AF;margin-top:2px">'+cant+' '+unidadNom+' cada semana</div></div>';
      sc+='</div>';
      sc+='<button onclick="_quitarClienteJaula('+ci+')" style="width:32px;height:32px;border-radius:10px;border:none;background:#FEF2F2;color:#EF4444;font-size:16px;cursor:pointer;flex-shrink:0">✕</button>';
      sc+='</div>';
      // Fila inferior: 3 datos grandes
      sc+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">';
      sc+='<div style="text-align:center;background:#EFF6FF;border-radius:12px;padding:12px 6px">';
      sc+='<div style="font-size:18px;font-weight:900;color:#0284C7">$'+ingSem.toLocaleString('es-MX')+'</div>';
      sc+='<div style="font-size:10px;color:#075985;font-weight:700;margin-top:3px">Por semana</div></div>';
      sc+='<div style="text-align:center;background:#EFF6FF;border-radius:12px;padding:12px 6px">';
      sc+='<div style="font-size:18px;font-weight:900;color:#0284C7">$'+Math.round(ingSem*4.3).toLocaleString('es-MX')+'</div>';
      sc+='<div style="font-size:10px;color:#075985;font-weight:700;margin-top:3px">Por mes</div></div>';
      sc+='<div style="text-align:center;background:#F0FDF4;border-radius:12px;padding:12px 6px">';
      sc+='<div style="font-size:18px;font-weight:900;color:#16A34A">'+huevosSem+'</div>';
      sc+='<div style="font-size:10px;color:#15803D;font-weight:700;margin-top:3px">Huevos/sem</div></div>';
      sc+='</div></div>';
    });
  }
  sc+='</div>';

  // FORMULARIO
  sc+='<div style="'+CARD+'">';
  sc+='<div style="display:flex;align-items:center;justify-content:space-between">';
  sc+='<div style="font-size:13px;font-weight:900;color:#111827">+ Nuevo cliente</div>';
  sc+='<button onclick="_toggleFormClienteJaula()" id="btn-toggle-cliente-jaula" style="background:#0284C7;border:none;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:800;color:#fff;cursor:pointer;font-family:inherit">Agregar →</button>';
  sc+='</div>';
  sc+='<div id="form-cliente-jaula" data-oculto="true" style="display:none">';
  sc+='<div style="'+LABEL+'">Nombre del cliente</div>';
  sc+='<input id="inp-cj-nombre" placeholder="Ej: Doña María, Tienda La Esperanza" style="'+INP+';margin-bottom:10px">';
  sc+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">';
  sc+='<div><div style="'+LABEL+'">Unidad de venta</div>';
  sc+='<select id="inp-cj-unidad" onchange="_calcCJIngreso()" style="'+SEL+'">';
  UNIDADES.forEach(function(u){
    sc+='<option value="'+u.id+'">'+u.icon+' '+u.n+'</option>';
  });
  sc+='</select></div>';
  sc+='<div><div style="'+LABEL+'">Cantidad / semana</div>';
  sc+='<input id="inp-cj-cantidad" placeholder="0" type="number" oninput="_calcCJIngreso()" style="'+INP+';font-size:20px;font-weight:900;text-align:center;color:#0284C7"></div>';
  sc+='</div>';
  sc+='<div id="cj-preview" style="background:#EFF6FF;border-radius:12px;padding:12px;text-align:center;margin-bottom:12px">';
  sc+='<div style="font-size:22px;font-weight:900;color:#0284C7">$0</div>';
  sc+='<div style="font-size:10px;color:#075985;margin-top:1px">ingreso estimado por semana</div>';
  sc+='</div>';
  sc+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
  sc+='<button onclick="_toggleFormClienteJaula()" style="padding:12px;background:#F9FAFB;border:1.5px solid #E5E7EB;border-radius:12px;font-size:13px;font-weight:700;color:#374151;cursor:pointer;font-family:inherit">Cancelar</button>';
  sc+='<button onclick="_agregarClienteJaula()" style="padding:12px;background:#0284C7;border:none;border-radius:12px;font-size:13px;font-weight:900;color:#fff;cursor:pointer;font-family:inherit">✓ Guardar</button>';
  sc+='</div></div></div>';

  sc+='<div style="height:8px"></div>';
  sc+='</div></div>';
  sc+=navBar('renta');
  sc+='</div>';
  return sc;
};

function _limpiarYRedirigir(screen){
  if(granja.clientesJaula){
    granja.clientesJaula = granja.clientesJaula.filter(function(c){
      return c && c.nombre && c.nombre.trim().length>0 && parseInt(c.cantidad||c.docenas||0)>0;
    }).map(function(c){
      return {nombre:c.nombre.trim(), unidad:c.unidad||'docena', cantidad:parseInt(c.cantidad||c.docenas)};
    });
  }
  if(granja.traspatio && granja.traspatio.clientes){
    granja.traspatio.clientes = granja.traspatio.clientes.filter(function(c){
      return c && c.nombre && c.nombre.trim().length>0 && parseInt(c.cantidad||c.docenas||0)>0;
    }).map(function(c){
      return {nombre:c.nombre.trim(), unidad:c.unidad||'docena', cantidad:parseInt(c.cantidad||c.docenas)};
    });
  }
  guardarEnStorage();
  showToast('Listo, clientes corruptos eliminados');
  nav(screen);
}

function _toggleFormClienteJaula(){
  var el=document.getElementById('form-cliente-jaula');
  var btn=document.getElementById('btn-toggle-cliente-jaula');
  if(!el) return;
  var oculto = el.getAttribute('data-oculto')!=='false';
  if(oculto){
    el.setAttribute('data-oculto','false');
    el.style.display='block';
    el.style.marginTop='14px';
    if(btn){ btn.textContent='— Cancelar'; btn.style.background='#6B7280'; }
  } else {
    el.setAttribute('data-oculto','true');
    el.style.display='none';
    if(btn){ btn.textContent='Agregar →'; btn.style.background='#0284C7'; }
  }
}

function _calcCJIngreso(){
  var unidad   = document.getElementById('inp-cj-unidad')?.value||'docena';
  var cantidad = parseInt(document.getElementById('inp-cj-cantidad')?.value)||0;
  var UNIDADES = {pieza:1,docena:12,cono:30,caja180:180,caja360:360};
  var precio   = granja.precioHuevo||0;
  var ing      = Math.round(cantidad * precio * (UNIDADES[unidad]||12));
  var huevos   = cantidad*(UNIDADES[unidad]||12);
  var el=document.getElementById('cj-preview');
  if(el) el.innerHTML='<div style="font-size:22px;font-weight:900;color:#0284C7">$'+ing.toLocaleString('es-MX')+'</div><div style="font-size:10px;color:#075985;margin-top:1px">'+huevos+' huevos/semana</div>';
}

function _agregarClienteJaula(){
  var elNombre  = document.getElementById('inp-cj-nombre');
  var elUnidad  = document.getElementById('inp-cj-unidad');
  var elCantidad= document.getElementById('inp-cj-cantidad');
  var nombre    = elNombre   ? elNombre.value.trim()          : '';
  var unidad    = elUnidad   ? (elUnidad.value||'docena')     : 'docena';
  var cantidad  = elCantidad ? parseInt(elCantidad.value)||0  : 0;
  if(!nombre)  { showToast('Escribe el nombre del cliente'); return; }
  if(!cantidad){ showToast('Escribe la cantidad'); return; }
  if(!['pieza','docena','cono','caja180','caja360'].includes(unidad)) unidad='docena';
  if(!granja.clientesJaula) granja.clientesJaula=[];
  granja.clientesJaula.push({nombre:nombre, unidad:unidad, cantidad:cantidad});
  guardarEnStorage();
  showToast('✓ '+nombre+' guardado ('+cantidad+' '+unidad+')');
  nav('clientes_jaula');
}

function _quitarClienteJaula(idx){
  if(!granja.clientesJaula) return;
  granja.clientesJaula.splice(idx,1);
  guardarEnStorage();
  nav('clientes_jaula');
}

</script>

</body>
</html>
