// ─── PANTALLA TENDENCIA DEL CICLO ────────────────────────────
screens.tendencia = function(){
  setStatus(false);
  var d    = calcDash();
  var raza = granja.raza || RAZAS[0];
  var semActual = granja.semanaVida || 0;

  // Curva estándar de la raza (% postura por semana)
  function pctEstandar(sem){
    if(sem < 18) return 0;
    if(sem === 18) return 30;
    if(sem === 19) return 60;
    if(sem === 20) return 82;
    if(sem <= 25)  return 90 + (sem-20)*0.8;
    if(sem <= 45)  return 94;
    if(sem <= 55)  return 94 - (sem-45)*0.3;
    if(sem <= 65)  return 91 - (sem-55)*0.4;
    if(sem <= 75)  return 87 - (sem-65)*0.5;
    return 82 - (sem-75)*1.0;
  }

  // Datos reales del historial semanal
  var histSem = granja.histSemanal || [];
  // Si hay historial diario, construir promedios semanales
  if(histSem.length === 0 && historial.length > 0){
    var mapaSem = {};
    historial.forEach(function(r){
      var sem = granja.semanaVida; // aproximación — en producción se calcularía por fecha
      if(!mapaSem[sem]) mapaSem[sem] = {total:0,cnt:0};
      mapaSem[sem].total += r.pctPostura;
      mapaSem[sem].cnt++;
    });
    Object.keys(mapaSem).forEach(function(s){
      histSem.push({sem:parseInt(s), pct: parseFloat((mapaSem[s].total/mapaSem[s].cnt).toFixed(1))});
    });
  }

  // Rango de semanas a mostrar: desde sem 18 hasta max(semActual+4, 30)
  var semInicio = 18;
  var semFin    = Math.max(semActual + 6, 35);
  var semTotal  = semFin - semInicio + 1;

  // Calcular puntos de la gráfica
  var maxPct = 100, minPct = 60;
  var w_bar  = Math.floor(260 / semTotal); // ancho de cada columna en px
  var h_graf = 120; // altura de la gráfica en px

  function xPos(sem){ return (sem - semInicio) * w_bar; }
  function yPos(pct){ return h_graf - Math.round((Math.min(pct,100) - minPct) / (maxPct - minPct) * h_graf); }

  // Línea estándar
  var puntosEstandar = [];
  for(var s=semInicio; s<=semFin; s++){
    puntosEstandar.push({x: xPos(s), y: yPos(pctEstandar(s)), sem:s, pct:pctEstandar(s)});
  }
  var polyEst = puntosEstandar.map(function(p){ return p.x+','+p.y; }).join(' ');

  // Línea real (histSemanal)
  var puntosReal = histSem.filter(function(h2){ return h2.sem>=semInicio && h2.sem<=semFin; })
    .map(function(h2){ return {x:xPos(h2.sem), y:yPos(h2.pct), sem:h2.sem, pct:h2.pct}; });
  var polyReal = puntosReal.length>1 ? puntosReal.map(function(p){return p.x+','+p.y;}).join(' ') : '';

  // Proyección desde semana actual al fin
  var proyPuntos = [];
  for(var ps=semActual; ps<=semFin; ps++){
    proyPuntos.push({x:xPos(ps), y:yPos(pctEstandar(ps))});
  }
  var polyProy = proyPuntos.length>1 ? proyPuntos.map(function(p){return p.x+','+p.y;}).join(' ') : '';

  // Línea de semana actual
  var xActual = xPos(semActual);
  var totalW  = xPos(semFin) + w_bar;

  // Stats de proyección
  var semsRestantes  = Math.max(0, 80 - semActual);
  var huevosProy     = Math.round(d.huevosDia * semsRestantes * 7);
  var ingresoProy    = granja.precioHuevo>0 ? Math.round(huevosProy * granja.precioHuevo) : 0;

function calcPosturaTraspatio(){
  var nido  = parseInt(document.getElementById('inp-huevos').value)||0;
  var suelo = parseInt(document.getElementById('inp-huevos-suelo')?.value)||0;
  var total = nido + suelo;
  var aves  = calcDash().aves;
  var pct   = aves>0 ? Math.round(total/aves*1000)/10 : 0;
  var el    = document.getElementById('daily-pct');
  if(el) el.textContent = pct+'%';
  var col   = pct>=75?'#16A34A':pct>=60?'#D97706':'#EF4444';
  if(el) el.style.color = col;
}

function _toggleFuenteTraspatio(id){
  var btn = document.getElementById('btn-fuente-'+id);
  var inp = document.getElementById('inp-fuente-'+id);
  if(!btn) return;
  var activo = btn.style.borderColor === 'rgb(22, 163, 74)' || btn.style.borderColor === '#16A34A';
  // Toggle
  btn.style.borderColor = activo ? '#E5E7EB' : '#16A34A';
  btn.style.background  = activo ? '#fff'     : '#F0FDF4';
  if(inp){
    inp.disabled = activo;
    if(activo) inp.value = '';
    inp.style.borderColor = activo ? '#E5E7EB' : '#16A34A';
  }
  // Para pasto (libre acceso) actualizar el label
  if(id === 'pasto'){
    var lbl = document.getElementById('pasto-label');
    if(lbl){
      lbl.textContent = activo ? '— Tocar' : '✓ Sí';
      lbl.style.color = activo ? '#9CA3AF' : '#16A34A';

}

function guardarRegistroTraspatio(){
  var d = calcDash();
  // Recolectar fuentes de alimentación
  var fuentes = ['balanceado','alfalfa','forraje','maiz','desperdicios','insectos','pasto'];
  var alimentos = {};
  fuentes.forEach(function(f){
    var inp = document.getElementById('inp-fuente-'+f);
    var btn = document.getElementById('btn-fuente-'+f);
    if(btn && btn.style.borderColor === 'rgb(22, 163, 74)'){
      alimentos[f] = inp ? (parseFloat(inp.value)||0) : 1;
    }
  });

  var huevosNido  = parseInt(document.getElementById('inp-huevos')?.value)||0;
  var huevosSuelo = parseInt(document.getElementById('inp-huevos-suelo')?.value)||0;
  var totalHuevos = huevosNido + huevosSuelo;
  var bajas       = parseInt(document.getElementById('inp-bajas')?.value)||0;
  var temp        = parseFloat(document.getElementById('inp-temp')?.value)||22;
  var zona        = document.getElementById('inp-zona')?.value||'A';
  var pasto       = document.getElementById('inp-pasto')?.value||'bueno';
  var comportamiento = document.getElementById('inp-comportamiento')?.value||'normal';
  var plumaje     = document.getElementById('inp-plumaje')?.value||'completo';
  var vendidos    = parseInt(document.getElementById('inp-vendidos')?.value)||0;
  var autoconsumo = parseInt(document.getElementById('inp-autoconsumo')?.value)||0;
  var causaBaja   = document.getElementById('inp-causa-baja')?.value||'';
  var aguaFuente  = document.getElementById('inp-agua-fuente')?.value||'suministrada';
  var obs         = document.getElementById('inp-obs')?.value||'';

  // Calcular gasto REAL por cada fuente de alimentación
  var tp0b = _getTraspatio();
  // Precios por fuente (configurables, con defaults)
  var precios = {
    balanceado:  granja.precioKgAl   || 7,
    alfalfa:     tp0b.precioAlfalfa  || 4,
    maiz:        tp0b.precioMaiz     || 5.5,
    forraje:     0.8,   // producción propia, muy barato
    desperdicios:0,     // gratis
    insectos:    0,     // gratis
    pasto:       0,     // libre acceso gratis
  };
  var desglose = {};
  var gasto = 0;
  Object.keys(alimentos).forEach(function(f){
    var kg = parseFloat(alimentos[f])||0;
    if(kg>0 && precios[f]!==undefined){
      var costo = Math.round(kg * precios[f]);
      desglose[f] = {kg:kg, precio:precios[f], costo:costo};
      gasto += costo;
    }
  });
  // Costo si fuera solo balanceado (para calcular ahorro)
  var kgBal = parseFloat(alimentos['balanceado']||0);
  var d2 = calcDash();
  var costoSiBalanceado = Math.round(d2.kgDia * (granja.precioKgAl||7));
  var ahorroAlimentacion = Math.max(0, costoSiBalanceado - gasto);
  // Leer ventas reales del día desde historialVentas
  var hoyTemp = new Date().toISOString().split('T')[0];
  var tp0 = _getTraspatio();
  var ventasReales = (tp0.historialVentas||[]).filter(function(v){return v.fecha===hoyTemp;});
  var ingresoVentas = ventasReales.reduce(function(s,v){return s+(v.ingreso||0);},0);
  // Si hay ventas registradas usar ese total, si no calcular estimado
  var ingreso = ingresoVentas > 0 ? ingresoVentas : Math.round(totalHuevos * (granja.precioHuevo||3.5));
  var pct   = d.aves>0 ? Math.round(totalHuevos/d.aves*1000)/10 : 0;
  var mort  = d.aves>0 ? Math.round(bajas/d.aves*10000)/100 : 0;

  var hoy = new Date().toISOString().split('T')[0];
  var registro = {
    fecha:      hoy,
    huevos:     totalHuevos,
    huevosNido: huevosNido,
    huevosSuelo:huevosSuelo,
    bajas:      bajas,
    causaBaja:  causaBaja,
    kg:         kgBal,
    alimentos:  alimentos,
    pctPostura: pct,
    mortalidad: mort,
    gastoDia:       gasto,
    gastoDesglose:  desglose,
    costoSiBalanceado: costoSiBalanceado,
    ahorroAlimentacion: ahorroAlimentacion,
    ingresoDia:     ingreso,
    temp:       temp,
    zona:       zona,
    pasto:      pasto,
    comportamiento: comportamiento,
    plumaje:    plumaje,
    vendidos:   vendidos,
    autoconsumo:autoconsumo,
    aguaFuente: aguaFuente,
    obs:        obs,
    sistema:    'pastoreo',
  };

  // Guardar en historial
  if(historial.length>0 && historial[0].fecha===hoy){
    historial[0] = registro;
  } else {
    historial.unshift(registro);
  }

  // Actualizar granja
  granja.avesVivas   = Math.max(0, d.aves - bajas);
  granja.tempHoy     = temp;
  granja.zonaActual  = zona;
  granja.aguaFuenteTraspatio = aguaFuente;
  granja.alimentosTraspatio  = alimentos;
  granja.registradoHoy = true;

  guardarEnStorage();
  var btnTp = document.querySelector('button[onclick="guardarRegistroTraspatio()"]');
  if(btnTp){
    btnTp.textContent = '✓ Guardado';
    btnTp.style.background = '#15803D';
    btnTp.disabled = true;
  }
  showToast('✓ Registro guardado correctamente');
  setTimeout(function(){ nav('dash'); }, 1000);
}

function cambiarBultos(delta){
  if(!granja.bultosCompra) granja.bultosCompra=0;
  var kgB = granja.kgBulto || 40;
  var prevBultos = granja.bultosCompra;
  granja.bultosCompra = Math.max(0, granja.bultosCompra + delta);

  // Sumar/restar inmediatamente al inventario
  var kgDiff = (granja.bultosCompra - prevBultos) * kgB;
  granja.inventarioKg = Math.max(0, (granja.inventarioKg||0) + kgDiff);

  var kgTotal = granja.bultosCompra * kgB;
  var bv = document.getElementById('bultos-val');
  if(bv){
    bv.textContent = granja.bultosCompra;
    var sub = bv.nextElementSibling;
    if(sub){
      sub.textContent = granja.inventarioKg>0
        ? 'bultos · '+granja.inventarioKg.toLocaleString('es-MX')+' kg en bodega'
        : 'sin stock en bodega';
    }
  }
  // Actualizar display de días restantes
  var d = calcDash();
  var diasNuevos = d.kgDia>0 && granja.inventarioKg>0 ? Math.floor(granja.inventarioKg/d.kgDia) : null;
  var elDias = document.getElementById('inv-dias-display');
  if(elDias){
    elDias.textContent = diasNuevos!==null ? diasNuevos+' días restantes' : '—';
    elDias.style.color = diasNuevos===null?'#9CA3AF':diasNuevos<=2?'#EF4444':diasNuevos<=5?'#D97706':'#16A34A';
  }
  guardarEnStorage();
  // Feedback visual
  if(delta>0){
    var flash = document.getElementById('bultos-val');
    if(flash){ flash.style.color='#15803D'; setTimeout(function(){ if(flash) flash.style.color='#16A34A'; },400); }
    showToast('✓ '+granja.inventarioKg.toLocaleString('es-MX')+' kg en bodega');
  }
}

// Obtener items del día actual (fresco o desde storage)
function getBioHoy(){
  var hoy = new Date().toISOString().split('T')[0];
  if(!granja.bioHistorial) granja.bioHistorial = {};
  if(!granja.bioHistorial[hoy]){
    // Nuevo día → items frescos (todos en false)
    granja.bioHistorial[hoy] = {
      fecha: hoy,
      items: BIO_ITEMS_FULL.map(function(b){ return Object.assign({}, b, {done:false}); }),
      pct: 0,
      obs: '',
    };
  }
  return granja.bioHistorial[hoy];
}

function calcPctBio(items){
  var alta = items.filter(function(i){ return i.prioridad==='alta'; });
  var doneAlta = alta.filter(function(i){ return i.done; }).length;
  var doneAll  = items.filter(function(i){ return i.done; }).length;
  // Peso: items de alta prioridad valen 70%, el resto 30%
  var pctAlta  = alta.length > 0 ? doneAlta/alta.length*70 : 70;
  var resto    = items.length - alta.length;
  var doneRest = doneAll - doneAlta;
  var pctRest  = resto > 0 ? doneRest/resto*30 : 30;
  return Math.round(pctAlta + pctRest);
}

      var reg   = granja.bioHistorial[fecha];

      var fc    = p===100?'#16A34A':p>=75?'#0369A1':p>=50?'#D97706':'#EF4444';
      var fDate = new Date(fecha+'T12:00:00').toLocaleDateString('es-MX',{weekday:'short',day:'numeric',month:'short'});

  sc += '</div>';
  sc += navBar('bio');
  sc += '</div>';

// ─── TOGGLE BIO NUEVO (sin re-render completo) ────────────────
function toggleBioNuevo(itemId){
  var hoyData = getBioHoy();
  var item    = hoyData.items.find(function(i){ return i.id===itemId; });
  if(!item) return;

  item.done = !item.done;
  hoyData.pct = calcPctBio(hoyData.items);

  // Actualizar DOM sin re-render
  var cb   = document.getElementById('bio-cb-'+itemId);
  var txt  = document.getElementById('bio-t-'+itemId);
  var row  = document.getElementById('bio-row-'+itemId);
  var prog = document.getElementById('bioProg');

  if(cb){
    cb.style.background   = item.done ? '#16A34A' : '#F9FAFB';
    cb.style.borderColor  = item.done ? '#16A34A' : '#E5E7EB';
    cb.innerHTML = item.done
      ? '<svg width="14" height="12" viewBox="0 0 14 12" fill="none"><path d="M1 6l4 5L13 1" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      : '';
  }
  if(txt){
    txt.style.color          = item.done ? '#9CA3AF' : '#111827';
    txt.style.textDecoration = item.done ? 'line-through' : 'none';
  }
  if(row){
    var isAlta = item.prioridad === 'alta';
    row.style.borderColor = item.done ? '#BBF7D0' : isAlta ? '#FECACA' : '#F3F4F6';
  }
  if(prog){
    var pctColor = hoyData.pct===100?'#16A34A':hoyData.pct>=75?'#0369A1':hoyData.pct>=50?'#D97706':'#EF4444';
    prog.style.width      = hoyData.pct + '%';
    prog.style.background = pctColor;
  }

  // Confetti suave si se completa al 100%
  if(hoyData.pct === 100) showToast('🎉 ¡Bioseguridad del día completa!');

  guardarEnStorage();
}

function guardarObsBio(val){
  var hoyData = getBioHoy();
  hoyData.obs = val;
  guardarEnStorage();
}

(function(){
  cargarDeStorage = function(){
    try {
      var raw = localStorage.getItem('avigo_v1');
      if(!raw) return false;
      var data = JSON.parse(raw);
      // Soporte formato v2 (lotes) y v1 legacy (data.g)
      if(data.v===2 && data.lotes && data.lotes.length>0){
        granja.lotes      = data.lotes;
        granja.loteActivo = data.loteActivo || 0;
        granja.histSemanal  = data.histSemanal  || [];
        granja.bioHistorial = data.bioHistorial || {};
        // Aplicar lote activo
        var idx = granja.loteActivo;
        if(idx>=granja.lotes.length) idx=0;
        var l = granja.lotes[idx];
        var g = l.granjaData || {};
        granja.nombre        = l.nombre        || g.nombre       || 'Mi Granja';
        granja.estado        = g.estado        || '';
        granja.municipio     = g.municipio     || '';
        granja.altitud       = g.altitud       || 0;
        granja.galpones      = g.galpones      || 1;
        granja.raza          = RAZAS.find(function(r){return r.id===g.razaId;})||RAZAS[0];
        granja.sistema       = g.sistema       || 'jaula';
        granja.numAves       = g.numAves       || 0;
        granja.semanaVida    = g.semVida       || 0;
        granja.etapa         = ETAPAS_DATA.find(function(e){return e.id===g.etapaId;})||null;
        granja.fechaInicio   = g.fInicio       || null;
        granja.precioKgAl    = g.precioKg      || 0;
        granja.avesVivas     = g.avesVivas     || g.numAves || 0;
        granja.precioHuevo   = g.precioH       || 0;
        granja.kgBulto       = g.kgBulto       || 40;
        granja.inventarioKg  = g.inventarioKg  || g.invKg || 0;
        granja.bultosCompra  = g.bultosCompra  || 0;
        granja.tempHoy       = g.tempHoy       || 22;
        granja.climaLat      = g.climaLat      || null;
        granja.climaLon      = g.climaLon      || null;
        // Solo actualizar notifActiva si no hay valor global ya activo
        if(!granja.notifActiva) granja.notifActiva = g.notifActiva || false;
        if(!granja.notifHora)   granja.notifHora   = g.notifHora   || '07:00';
        granja.frecuenciaCompra = g.frecCompra || 'semanal';
        currentAlimento      = granja.etapa;
        historial            = (l.historial    || []).slice();
        alertas              = (l.alertas      || []).slice();
        granja.vacunas       = l.vacunas       || [];
        granja.recordatorios = l.recordatorios || {};
        // Clientes — normalizar
        function fixC(c){
          if(!c||!c.nombre||!c.nombre.trim()) return null;
          var q=parseInt(c.cantidad)||parseInt(c.docenas)||0;
          if(q<=0) return null;
          var u=['pieza','docena','cono','caja180','caja360'].indexOf(c.unidad)>=0?c.unidad:'docena';
          return {nombre:c.nombre.trim(),unidad:u,cantidad:q};
        }
        granja.clientesJaula = (l.clientesJaula||g.clientesJaula||[]).map(fixC).filter(Boolean);
        var rawTP = l.traspatio || g.traspatio || {};
        if(rawTP.clientes) rawTP.clientes = rawTP.clientes.map(fixC).filter(Boolean);
        granja.traspatio     = rawTP;
        granja.loteActivo    = idx;
        granja.registradoHoy = historial.length>0 && historial[0] &&
          historial[0].fecha===new Date().toISOString().split('T')[0];
        return true;
      }
      // Formato legacy v1
      if(!data.g) return false;
      var g = data.g;
      granja.nombre       = g.nombre      || 'Mi Granja';
      granja.estado       = g.estado      || '';
      granja.municipio    = g.municipio   || '';
      granja.altitud      = g.altitud     || 0;
      granja.galpones     = g.galpones    || 1;
      granja.raza         = RAZAS.find(function(r){ return r.id===g.razaId; }) || RAZAS[0];
      granja.sistema      = g.sistema     || 'jaula';
      granja.numAves      = g.numAves     || 0;
      granja.semanaVida   = g.semVida     || 0;
      granja.etapa        = ETAPAS_DATA.find(function(e){ return e.id===g.etapaId; }) || null;
      granja.fechaInicio  = g.fInicio     || null;
      granja.precioKgAl   = g.precioKg    || 0;
      granja.avesVivas    = g.avesVivas   || g.numAves || 0;
      granja.precioHuevo  = g.precioH     || 0;
      granja.kgBulto        = g.kgBulto    || 40;
      granja.frecuenciaCompra=g.frecCompra  || 'semanal';
      granja.inventarioKg = g.invKg       || 0;
      granja.tempHoy      = g.tempHoy     || 22;
      granja.notifActiva  = g.notifActiva || false;
      granja.notifHora    = g.notifHora   || '07:00';
      currentAlimento     = granja.etapa;
      if(data.historial)    historial            = data.historial;
      if(data.alertas)      alertas              = data.alertas;
      if(data.vacunas)      granja.vacunas       = data.vacunas;
      if(data.lotes)        granja.lotes         = data.lotes;
      if(data.loteActivo !== undefined) granja.loteActivo = data.loteActivo;
      if(data.histSemanal)  granja.histSemanal   = data.histSemanal;
      if(data.bioHistorial) granja.bioHistorial  = data.bioHistorial;
      return true;
    } catch(e){ return false; }
  };
})();

var NAV_ORDER = ['intro','splash','login','registro','forgot','reset','ob1','ob2','ob3','ob4','dash','daily','historial','ia','tendencia','renta','bio','vac','perfil','nuevo_lote','parvada','alimentacion_natural','salud_natural','economia_traspatio','ventas_traspatio','clientes_traspatio','clientes_jaula','calendario'];

// Override nav con animaciones
(function(){
  var _navOrig = nav;
  nav = function(name){
    // Protección de rutas — igual que el nav original
    var rutasProtegidas = ['dash','daily','historial','ia','tendencia','renta','bio','vac','perfil','nuevo_lote',
      'parvada','alimentacion_natural','salud_natural','economia_traspatio','clientes_traspatio','ventas_traspatio','clientes_jaula'];
    if(rutasProtegidas.indexOf(name) >= 0 && !avigoTieneSession()){
      name = 'splash';
    }
    var fn = screens[name];
    if(!fn){ console.warn('nav: pantalla no encontrada:', name); return; }
    var sc = document.getElementById('screen');
    if(!sc) return;

    // Determinar dirección de animación
    var fromIdx = NAV_ORDER.indexOf(_lastScreen);
    var toIdx   = NAV_ORDER.indexOf(name);
    var animClass = 'screen-enter';
    if(name === _lastScreen){
      animClass = 'screen-fade';
    } else if(name === 'dash' || name === 'splash' || name === 'login'){
      animClass = 'screen-fade';
    } else if(toIdx > fromIdx){
      animClass = 'screen-enter';
    } else if(toIdx < fromIdx){
      animClass = 'screen-enter-left';
    } else {
      animClass = 'screen-pop';
    }

    sc.style.opacity = '0';
    sc.style.transition = 'opacity .08s ease';

    setTimeout(function(){
      sc.innerHTML   = fn();
      sc.className   = 'screen ' + animClass;
      sc.style.opacity = '';
      sc.style.transition = '';
      _lastScreen = name;
      if(afterRender && afterRender[name]) afterRender[name]();
      if(name === 'perfil'){ setTimeout(bindRecordatorios, 200); setTimeout(bindLotes, 200); }
      if(name === 'daily' && granja.sistema === 'pastoreo') setTimeout(_bindFuentesTraspatio, 100);
    }, 80);
  };
})();

// ─── TIPS RÁPIDOS AUTOMÁTICOS (sin IA) ──────────────────────
function generarTipsRapidos(d, ultReg, ayer, diasInv){
  var tips = [];

  if(ultReg && ayer && ayer.pctPostura>0){
    var caida = ayer.pctPostura - ultReg.pctPostura;
    if(caida >= 2){
      tips.push({color:'#EF4444', titulo:'⬇ Postura cayó '+caida.toFixed(1)+'%', texto:'Una caída repentina puede deberse a estrés, cambio de alimento, calor excesivo o problemas de agua. Revisa bebederos, ventilación y si hubo algún cambio reciente.'});
    }
    if(ultReg.mortalidad >= 0.1){
      tips.push({color:'#EF4444', titulo:'⚠ Mortalidad fuera del rango normal', texto:'Más de 0.1% diario requiere atención. Retira las aves muertas de inmediato, revisa si hay síntomas en el lote y consulta al veterinario si continúa.'});
    }
  }

  if(diasInv !== null && diasInv <= 5){
    tips.push({color:'#D97706', titulo:'📦 Stock de alimento bajo — '+diasInv+' días', texto:'Programa tu compra hoy. Con tu consumo actual de '+d.kgDia+' kg/día necesitas al menos '+(d.kgDia*14).toFixed(0)+' kg para 2 semanas de reserva.'});
  }

  var temp = granja.tempHoy || 22;
  if(temp >= 28){
    tips.push({color:'#D97706', titulo:'🌡 Calor elevado — revisa agua', texto:'A '+temp+'°C las aves beben '+(Math.round((temp-20)*5))+'% más agua. Verifica que los bebederos estén llenos y el agua esté fresca. El calor reduce la postura si no se controla.'});
  }

  if(d.sem >= 21 && d.pctPostura > 0 && d.pctPostura < 88){
    tips.push({color:'#7C3AED', titulo:'📊 Postura bajo el estándar para Sem '+d.sem, texto:'En postura fase 1 se espera 90-95%. Una postura baja puede indicar deficiencia de calcio, problemas de luz o densidad excesiva de aves. Revisa el programa de luz y el nivel de calcio en el alimento.'});
  }

  if(historial.length === 0){
    tips.push({color:'#16A34A', titulo:'👋 Bienvenido — Soy Don Gallo', texto:'Empieza registrando tu primer día. Cuantos más datos tengas, mejores consejos te podré dar. El historial diario es la base de todo el análisis avícola.'});
  }

  if(historial.length >= 7 && tips.length === 0){
    tips.push({color:'#16A34A', titulo:'✓ Todo en orden en tu granja', texto:'No hay alertas activas. Sigue con el mismo manejo. Recuerda revisar el programa de vacunación y mantener los registros diarios actualizados.'});
  }

  return tips.slice(0,4);
}

var iaConversacion = [];

function contextoGranja(){
  var d       = calcDash();
  var diasInv = granja.inventarioKg>0 && d.kgDia>0 ? Math.floor(granja.inventarioKg/d.kgDia) : null;
  var ultReg  = historial.length>0 ? historial[0] : null;
  var ayer    = historial.length>1 ? historial[1] : null;

  var ctx = 'DATOS DE LA GRANJA DEL USUARIO:\n';
  ctx += '- Nombre: '+granja.nombre+'\n';
  ctx += '- Raza: '+((granja.raza&&granja.raza.n)?granja.raza.n:'No especificada')+'\n';
  ctx += '- Sistema: '+(granja.sistema==='jaula'?'Jaula en batería':granja.sistema==='piso'?'Piso con cama':'Libre pastoreo')+'\n';
  ctx += '- Aves vivas: '+d.aves.toLocaleString('es-MX')+'\n';
  ctx += '- Semana de vida: '+d.sem+'\n';
  ctx += '- Etapa: '+(d.etapaNom||'—')+'\n';
  ctx += '- Altitud: '+(granja.altitud>0?granja.altitud+' msnm':'No especificada')+'\n';
  ctx += '- Precio alimento: $'+(granja.precioKgAl||0)+'/kg\n';
  ctx += '- Temperatura hoy: '+(granja.tempHoy||22)+'°C\n';
  if(diasInv!==null) ctx += '- Días de alimento en bodega: '+diasInv+'\n';
  if(ultReg){
    ctx += '\nÚLTIMO REGISTRO ('+ultReg.fecha+'):\n';
    ctx += '- % Postura: '+ultReg.pctPostura+'%\n';
    ctx += '- Huevos: '+ultReg.huevos.toLocaleString('es-MX')+'\n';
    ctx += '- Mortalidad: '+ultReg.mortalidad+'%\n';
    ctx += '- Bajas: '+ultReg.bajas+'\n';
    ctx += '- Alimento consumido: '+ultReg.kg+' kg\n';
    ctx += '- Gasto: $'+ultReg.gastoDia.toLocaleString('es-MX')+'\n';
  }
  if(ayer){
    ctx += '\nAYER ('+ayer.fecha+'):\n';
    ctx += '- % Postura: '+ayer.pctPostura+'%\n';
    ctx += '- Mortalidad: '+ayer.mortalidad+'%\n';
  }
  if(historial.length >= 7){
    var avg7 = (historial.slice(0,7).reduce(function(s,r){return s+r.pctPostura;},0)/7).toFixed(1);
    ctx += '\n- Postura promedio últimos 7 días: '+avg7+'%\n';
  }
  return ctx;
}

function preguntarIA(pregunta){
  enviarPreguntaIA(pregunta);
}

function enviarPreguntaIA(textoForzado){
  var inp  = document.getElementById('ia-input');
  var chat = document.getElementById('ia-chat');
  if(!chat) return;
  var texto = textoForzado || (inp ? inp.value.trim() : '');
  if(!texto) return;
  if(inp) { inp.value=''; inp.style.height='auto'; }

  // Mensaje usuario
  chat.innerHTML += '<div style="display:flex;justify-content:flex-end;margin-bottom:8px">'
    +'<div style="background:#16A34A;border-radius:18px 18px 4px 18px;padding:10px 13px;max-width:82%;font-size:12px;font-weight:500;color:#fff;line-height:1.5">'+texto+'</div>'
    +'</div>';
  chat.scrollTop = chat.scrollHeight;

  // Indicador pensando
  var loadId = 'ia-load-'+Date.now();
  chat.innerHTML += '<div id="'+loadId+'" style="display:flex;align-items:flex-start;gap:8px;margin-bottom:8px">'
    +'<div style="width:30px;height:30px;background:#F0FDF4;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">🐓</div>'
    +'<div style="background:#F3F4F6;border-radius:12px 12px 12px 2px;padding:10px 13px;flex:1">'
    +'<div style="font-size:11px;font-weight:800;color:#16A34A;margin-bottom:3px">Don Gallo</div>'
    +'<div style="font-size:12px;color:#9CA3AF;font-weight:500">Pensando...</div>'
    +'</div></div>';
  chat.scrollTop = chat.scrollHeight;

  // Generar respuesta local (sin API)
  setTimeout(function(){
    // Guardar turno del usuario en historial
    iaConversacion.push({role:'user', content:texto});
    if(iaConversacion.length > 20) iaConversacion = iaConversacion.slice(-20);
    var respuesta = donGalloResponde(texto, iaConversacion);
    // Guardar respuesta en historial
    iaConversacion.push({role:'assistant', content:respuesta});
    var loadEl = document.getElementById(loadId);
    if(loadEl){
      loadEl.innerHTML = '<div style="width:30px;height:30px;background:#F0FDF4;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">🐓</div>'
        +'<div style="background:#F3F4F6;border-radius:12px 12px 12px 2px;padding:10px 13px;flex:1">'
        +'<div style="font-size:11px;font-weight:800;color:#16A34A;margin-bottom:3px">Don Gallo</div>'
        +'<div style="font-size:12px;color:#374151;line-height:1.7;font-weight:500">'+formatDG(respuesta)+'</div>'
        +'</div>';
    }
    if(chat) chat.scrollTop = chat.scrollHeight;
  }, 800);
}

// ═══════════════════════════════════════════════════════════════
// DON GALLO — MOTOR DE RESPUESTAS LOCAL (sin API, sin costo)
// ═══════════════════════════════════════════════════════════════
function donGalloResponde(pregunta, histConv){
  var d       = calcDash();
  var p       = pregunta.toLowerCase();
  // Contexto de la conversación anterior
  var convActual  = histConv || [];
  var ultRespDG   = convActual.length>=2 ? convActual[convActual.length-2].content.toLowerCase() : '';
  var ultPregUser = convActual.length>=3 ? convActual[convActual.length-3].content.toLowerCase() : '';
  // Detectar si Don Gallo hizo una pregunta de diagnóstico en su última respuesta
  var dxEsperando = /cuéntame|cuénta|describe|cómo se ve|cuántas.*afectadas|hace cuánto|desde cuándo|qué síntoma|qué más|algo más|observaste|notaste/.test(ultRespDG);
  var dxTema      = /respirat|moquillo|newcastle|coccidio|diarrea|ojo|nariz|pata|parális|muerta|mort|come poco|pluma|torticolis/.test(ultRespDG+ultPregUser);
  var raza    = granja.raza ? granja.raza.n : 'tu raza';
  var sem     = granja.semanaVida || 0;
  var aves    = granja.avesVivas  || granja.numAves || 0;
  var pct     = d.pctPostura || 0;
  var temp    = granja.tempHoy || 22;
  var sistema = granja.sistema === 'jaula' ? 'jaula en batería' : granja.sistema === 'piso' ? 'piso con cama' : 'libre pastoreo';
  var altitud = granja.altitud || 0;
  var diasInv = granja.inventarioKg>0 && d.kgDia>0 ? Math.floor(granja.inventarioKg/d.kgDia) : null;
  var ultReg  = historial.length>0 ? historial[0] : null;
  var ayer    = historial.length>1 ? historial[1] : null;

  // ── DETECTAR TEMA ──────────────────────────────────────────

  // ═══════════════════════════════════════════════════════════
  // SISTEMA DE DIAGNÓSTICO CONVERSACIONAL
  // Don Gallo pregunta síntomas y da diagnóstico progresivo
  // ═══════════════════════════════════════════════════════════

  // RESPUESTA A SÍNTOMAS cuando Don Gallo ya preguntó y el usuario describe
  if(dxEsperando && dxTema){
    // El usuario está describiendo síntomas en respuesta a la pregunta de Don Gallo
    if(/ojo.*hinchad|hinchad.*ojo|cara.*hinchad|hinchad.*cara|ojos.*cerrad|moco.*ojo/.test(p))
      return 'Con los ojos hinchados y cara inflamada, lo más probable es Coriza Infecciosa (Haemophilus paragallinarum). Características: olor muy feo, hinchazón facial que puede ser unilateral o bilateral, secreción nasal y ocular, y caída de postura del 10-40%.\n\nQué hacer ahora mismo:\n1. Aísla las aves con síntomas del resto del lote\n2. Antibiótico: eritromicina o estreptomicina en agua por 5-7 días (con veterinario)\n3. Lava los ojos afectados con suero fisiológico\n4. Refuerza la vitamina A en el agua (protege mucosas)\n5. Revisa la ventilación — el amoniaco empeora la coriza\n\n⚠️ La coriza se transmite muy rápido entre aves. Actúa hoy. ¿Cuántas aves tienen síntomas ya?';

    if(/torticolis|cuello.*torcido|vuelta.*cabeza|cabeza.*atrás|gira.*cabeza|movimiento.*cabeza/.test(p))
      return '⚠️ ALERTA ALTA — El tortícolis (cuello torcido) es el síntoma más característico de Newcastle. Llama a tu veterinario hoy mismo.\n\nMientras tanto:\n1. Aísla de inmediato todas las aves con síntomas — Newcastle se contagia por aire, heces y secreciones\n2. No muevas aves, equipo ni personas entre galpones\n3. Refuerza la desinfección de entradas\n4. Revisa el historial de vacunación — ¿cuándo fue la última vacuna de Newcastle?\n\nSi el lote NO estaba vacunado: la mortalidad puede llegar al 80-100% sin tratamiento. Solo hay manejo de soporte (vitaminas, electrolitos).\n\nSi el lote SÍ estaba vacunado: puede ser una cepa más agresiva o que la vacuna esté vencida. El veterinario puede tomar muestras para confirmar.\n\n¿Cuántas aves tienen síntomas y cuánto tiempo llevan así?';

    if(/diarrea.*sangre|sangre.*diarrea|excreta.*sangre|caca.*roja|roja.*caca/.test(p))
      return 'Diarrea con sangre en aves de postura — los diagnósticos más probables son:\n\n1. COCCIDIOSIS (más común en piso): parásito Eimeria que daña el intestino. Tratamiento: amprolium o sulfonamidas en agua 5-7 días.\n2. ENTERITIS HEMORRÁGICA: infección bacteriana. Tratamiento: antibiótico específico según cultivo.\n3. INTOXICACIÓN: por micotoxinas en alimento en mal estado.\n\nAcciones inmediatas:\n✅ Retira el alimento actual y revísalo — ¿huele diferente? ¿Está húmedo?\n✅ Da agua limpia con electrolitos\n✅ Aísla las aves más afectadas\n✅ Llama al veterinario — necesitas un diagnóstico antes de medicar\n\n¿El sistema es piso o jaula? ¿Cuántas aves muestran el síntoma y desde cuándo?';

    if(/parálisis|no.*camina|no se mueve|pata.*caída|ala.*caída|cojea|pata.*torcida/.test(p))
      return 'La parálisis o inmovilidad en aves puede tener varias causas según la edad:\n\nEn aves jóvenes (semana 4-20): probable ENFERMEDAD DE MAREK — parálisis de patas y/o alas, sin tratamiento pero sí prevención futura.\n\nEn aves adultas (postura): \n• ARTRITIS INFECCIOSA (Mycoplasmosis sinovial): articulaciones inflamadas, cojera. Tratamiento: antibióticos (lincomicina, espectinomicina)\n• GOLPE DE CALOR SEVERO: aves postradas, jadeo, sin parálisis real — mojar con agua fría y electrolitos\n• DEFICIENCIA DE RIBOFLAVINA (Vitamina B2): dedos curvados, caminar inestable\n• INTOXICACIÓN: por plantas tóxicas en pastoreo o productos químicos\n\n¿Las patas están frías o calientes? ¿Las articulaciones están inflamadas? ¿Cuántas aves están afectadas?';

    if(/come poco|no come|perdió apetito|bajó consumo|no quiere comer/.test(p))
      return 'La pérdida de apetito es el primer síntoma de casi cualquier enfermedad. Para afinar el diagnóstico necesito más datos:\n\n¿Notas alguno de estos síntomas adicionales?\n• Tos, estornudos o secreción nasal → problema respiratorio\n• Diarrea (color y consistencia) → problema digestivo o enfermedad\n• Plumas erizadas y aves agrupadas → fiebre o estrés severo\n• Reducción de agua también → muy grave, enfermedad sistémica\n• Solo bajó el alimento sin otros síntomas → revisa temperatura (calor reduce apetito), frescura del alimento y estrés\n\nMientras me cuentas más: da electrolitos en el agua (azúcar + sal) y vitaminas. No mediques sin diagnóstico. ¿Hay otros síntomas además de que no come?';

    if(/tos|estornudo|resoplido|ronquido|ruido.*respirar|respirar.*difícil|boqueo|moquillo/.test(p))
      return 'Problemas respiratorios confirmados. Las causas más frecuentes por probabilidad:\n\n1. MICOPLASMOSIS (Mycoplasma gallisepticum) — MUY COMÚN:\n   Síntomas: tos, estertores, secreción nasal, ojos húmedos, producción baja\n   Tratamiento: tilosina, enrofloxacina o doxiciclina en agua por 5-7 días\n\n2. BRONQUITIS INFECCIOSA:\n   Síntomas: tos seca, estertores, huevos deformes\n   No hay tratamiento — solo soporte y prevención con vacuna\n\n3. NEWCASTLE (forma respiratoria):\n   Síntomas: tos, caída brusca de postura, puede progresar a síntomas nerviosos\n   URGENTE — llama al veterinario\n\n4. CORIZA INFECCIOSA:\n   Síntomas: tos + hinchazón facial + MAL OLOR\n   Tratamiento: antibióticos\n\n¿Qué porcentaje del lote tiene síntomas? ¿Hay caída de postura? ¿Los huevos tienen forma normal? ¿Hay mal olor en el galpón?';

    // Si describe síntomas genéricos después de que Don Gallo preguntó
    if(/aves|gallina|lote|algunas|muchas|pocas|toda|varios/.test(p) && /síntoma|mal|enferma|rara|diferente|decaída|triste/.test(p))
      return 'Gracias por los detalles. Para darte el diagnóstico más preciso necesito que me confirmes:\n\n1. ¿Qué porcentaje del lote está afectado? (1-5 aves / 5-20% / más del 20%)\n2. ¿Cuánto tiempo llevan con síntomas? (horas / días / semanas)\n3. ¿La mortalidad ha aumentado?\n4. ¿Cambió algo recientemente? (alimento nuevo, vacuna, visita al galpón, lluvia, cambio de temperatura)\n5. ¿El alimento y el agua están normales?\n\nResponde lo que puedas y te doy mi diagnóstico.';
  }

  // FLUJO DE DIAGNÓSTICO — el usuario reporta un problema y Don Gallo hace preguntas
  if(/mi gallina.*enferma|gallina.*enferma|aves.*enfermas|lote.*enfermo|algo.*raro|se ven mal|están mal|algo.*pasa|qué.*tiene|qué le.*pasa|cómo sé.*qué|cómo.*saber.*qué|cómo.*diagnostico/.test(p)){

  }

  // RESPUESTA A "QUÉ ME RECOMIENDAS"
  if(/qué me recomiendas|que me recomiendas|qué hago|que hago|cómo mejoro|por dónde empiezo|qué es lo primero|qué debería hacer|dame un consejo|ayúdame|ayudame/.test(p)){
    var d2=calcDash();
    var recomendaciones=[];
    var prioridad='';

    // Analizar situación actual y dar recomendaciones priorizadas
    if(!historial.length){

    // Problema 1: postura baja
    if(d2.pctPostura>0 && d2.pctPostura<85){

    // Problema 2: temperatura alta
    if(temp>=30){

    // Problema 3: inventario bajo

    if(historial.length>1){

    // Vacuna pendiente
    if(granja.vacunas){

    // Si todo está bien
    if(!recomendaciones.length){
      recomendaciones.push('✅ Tu lote está en buen estado con '+d2.pctPostura+'% de postura en semana '+sem+'.');

  // CONVERSACIÓN: el usuario da más detalles después de una recomendación
  if(convActual.length>=2 && /tengo|tenemos|hay|noté|notan|vi|vemos|sí.*hay|sí.*tiene|tiene.*también|además|también/.test(p) && p.length>10){

    if(sintomas.length>0){

      if(sintomas.includes('respiratorio')&&sintomas.includes('digestivo'))
        return 'Combinación de síntomas respiratorios y digestivos — esto apunta a una enfermedad sistémica. Los sospechosos principales son Newcastle (forma mixta) o una infección bacteriana secundaria a una viral.\n\n🚨 Con síntomas en múltiples sistemas, esto es urgente. Llama a tu veterinario hoy — necesita ver las aves y posiblemente tomar muestras para laboratorio.\n\nMientras llega el veterinario: electrolitos en agua, vitaminas A y E, aísla las aves más afectadas. NO pongas antibióticos sin diagnóstico — pueden complicar el cuadro si es viral.';
      if(sintomas.includes('respiratorio')&&sintomas.includes('mortalidad'))
        return '⚠️ Síntomas respiratorios con mortalidad — combinación que requiere atención veterinaria HOY.\n\nCon '+aves.toLocaleString('es-MX')+' aves, si la mortalidad sigue subiendo las próximas 24h, puedes perder el 5-10% del lote.\n\nAcciones inmediatas:\n1. Llama al veterinario — describe exactamente lo que me describiste a mí\n2. Aísla las aves muertas y enfermas — no las deseches hasta que el veterinario las vea\n3. Cierra el galpón a visitas\n4. Toma nota de: cuántas muertes por día, qué síntomas tienen las vivas\n5. Electrolitos + vitaminas en el agua para las aves sanas\n\n¿Tienes veterinario de confianza? Si no, busca la delegación de SENASICA más cercana — pueden orientarte sobre brotes en tu zona.';
    }
  }

  // EMERGENCIAS ESPECÍFICAS
  if(/emergencia|urgente|qué hago ahora|ya mismo|de inmediato|no sé qué hacer|me urge|auxilio|ayuda.*urgente/.test(p)){

    return '¡Cálmate y actúa paso a paso! Cuéntame qué está pasando exactamente:\n\n¿Es alguna de estas situaciones?\n\n💀 MORTALIDAD MASIVA (muchas aves muriendo en horas)\n→ Aísla el galpón, llama al veterinario y a SENASICA\n\n🌡️ GOLPE DE CALOR (aves postradas, jadeando, sin moverse)\n→ Abre ventanas, moja las aves con agua fresca, electrolitos\n\n🔴 CAÍDA BRUSCA DE POSTURA (bajó más del 30% en un día)\n→ Revisa luz (¿hubo apagón?), agua y alimento\n\n⚡ CORTE DE LUZ PROLONGADO\n→ Las aves no comerán bien — normal que bajen 3-5% los próximos 2 días\n\n🤒 AVES CON SÍNTOMAS GRAVES\n→ Describe qué ves y te doy el protocolo\n\n¿Qué está pasando exactamente?';
  }

  if(convActual.length>=4 && /y qué más|qué sigue|siguiente paso|después qué|y luego|y ahora qué|funcionó|resultó|mejoró|sigue igual|empeoró/.test(p)){
    if(/funcionó|mejoró|mejor|subió.*postura|ya está bien/.test(p))
      return '¡Qué buena noticia! Me alegra que haya funcionado. Cuando hay mejoría, lo importante es:\n\n1. Completa el tratamiento aunque las aves ya se vean bien — cortar antibióticos antes puede generar resistencia\n2. Registra todo: qué síntomas tuvieron, qué usaste y cuántos días — este historial vale oro si el problema regresa\n3. Analiza la causa raíz — ¿qué generó el problema? ¿Bioseguridad, alimento, vacunación atrasada?\n4. Considera vacunar o reforzar si el problema fue viral\n\n¿Qué tratamiento usaste? Así lo anoto para futuras referencias.';

  // PREGUNTAS DE "QUÉ SIGNIFICA"
  if(/qué significa|que significa|qué quiere decir|que quiere decir|explícame|explicame|no entiendo|cómo interpreto/.test(p)){

    if(/conversión|fca|conversi/.test(p)) return 'La Conversión Alimenticia (FCA o ICA) mide cuántos kg de alimento necesitas para producir 1 kg de huevo.\n\nFórmula: kg alimento consumido ÷ kg huevo producido\n\nEn postura de huevo, cada huevo pesa ~63g. Si consumes '+d.kgDia+' kg/día y produces '+d.huevosDia+' huevos:\n• Kg huevo: '+Math.round(d.huevosDia*63/1000*10)/10+' kg/día\n• FCA estimada: '+(d.huevosDia>0?(d.kgDia/(d.huevosDia*63/1000)).toFixed(2):'—')+' kg alimento/kg huevo\n\nReferencia para '+raza+':\n• Menos de 2.0: excelente\n• 2.0-2.3: buena\n• 2.3-2.6: aceptable\n• Más de 2.6: hay desperdicio o baja eficiencia';
    if(/mortalidad/.test(p)) return 'La mortalidad es el porcentaje de aves que murieron ese día respecto al total del lote.\n\nFórmula: (aves muertas ÷ aves totales) × 100\n\nReferencia:\n• 0-0.05% diario: excelente (0-0.5 aves por cada 1,000)\n• 0.05-0.10%: normal\n• 0.10-0.20%: alerta, investigar causa\n• Más de 0.20%: urgente, puede ser enfermedad\n\nEn tu lote de '+aves.toLocaleString('es-MX')+' aves, el límite normal es '+(Math.ceil(aves*0.001))+' bajas por día. Si superas eso dos días seguidos, actúa.';
    return 'Claro, te explico. ¿Sobre qué término o concepto tienes duda? Puedo explicarte: % postura, mortalidad, conversión alimenticia, etapas del ciclo, programa de luz, o cualquier otro término avícola que no entiendas.';
  }


  // SALUDOS Y CONVERSACIÓN NATURAL CON PERSONALIDAD
  if(/^(hola|buenas|buenos días|buenas tardes|buenas noches|qué tal|qué onda|quiubo|ey|oye|oiga|hey|saludos|buen día)[\s!¡.]*$/i.test(p.trim())){
    var hora = new Date().getHours();
    var saludo = hora<12?'¡Buenos días!':hora<19?'¡Buenas tardes!':'¡Buenas noches!';

  // CÓMO ESTÁS / ESTADO DE ÁNIMO
  if(/cómo estás|como estas|cómo te va|cómo vas|qué cuentas|todo bien|cómo andas|cómo sigues/.test(p)){
    var estado2 = d.pctPostura>0?'analizando tu lote de '+aves.toLocaleString('es-MX')+' aves en semana '+sem+' con '+pct+'% de postura':'listo para ayudarte en lo que necesites con tu granja';
    return '¡Aquí andamos, '+estado2+'! En la avicultura no hay descanso — siempre hay algo que revisar, mejorar o aprender.\n\nComo dice el dicho: "El que madruga, recoge más huevos." ¿Qué te tiene pensando hoy?';
  }

  // GRACIAS / DESPEDIDA
  if(/gracias|muchas gracias|te lo agradezco|qué útil|muy útil|me ayudaste|excelente|perfecto.*gallo|bien.*gallo/.test(p)){

  }

  // CHISTES / HUMOR AVÍCOLA
  if(/chiste|broma|algo gracioso|cuéntame algo|ríe|humor|chistoso/.test(p)){

    ];
    return chistes[Math.floor(Math.random()*chistes.length)]+'\n\n¿En qué más te puedo ayudar? 😄';
  }

  // MOTIVACIÓN / ÁNIMO
  if(/desanim|cansado|difícil|no puedo|qué hago|me rindo|pérdida|perdiendo|mal día|mala semana|va mal/.test(p)){
    return 'La avicultura tiene sus días difíciles — eso es real. Pero cada productor exitoso que conozco ha pasado por pérdidas, enfermedades y precios bajos.\n\nLo que los diferencia no es que no les pase nada — es que aprenden de cada golpe y siguen adelante con más conocimiento.\n\n'+
    (d.pctPostura>0?'Tu lote hoy tiene '+pct+'% de postura en semana '+sem+'. '+(d.pctPostura>=85?'Eso no está mal — hay con qué trabajar.':'Vamos a encontrar juntos qué está pasando.')+'\n\n':'')+'Cuéntame exactamente qué está pasando y lo analizamos paso a paso. ¿Qué es lo que más te preocupa ahorita?';
  }

  // CLIMA DEL DÍA / TEMPERATURA
  if(/^(qué temperatura|cómo está el clima|hace calor|hace frío|temperatura hoy|cómo amaneció)/.test(p)){
    var nivelTemp = temp>=35?'crítico — puede causar estrés severo':temp>=30?'elevado — aumenta el consumo de agua':temp>=25?'alto — monitorea bebederos':temp>=18?'ideal para la postura':'frío — cierra cortinas en la noche';
    return 'Registras '+temp+'°C hoy. Nivel: '+nivelTemp+'.\n\nCon esta temperatura tus '+aves.toLocaleString('es-MX')+' aves necesitan '+Math.round(aves*(200+Math.max(0,temp-20)*10)/1000).toLocaleString('es-MX')+' litros de agua. '+(temp>=28?'Revisa que los bebederos estén llenos y el agua fresca.':'La temperatura está controlada — sigue así.');
  }

  // CUÁNTO PRODUZCO / CUÁNTOS HUEVOS
  if(/cuántos.*huevo|cuantos.*huevo|cuánto.*produzco|cuanto.*produzco|producción.*hoy|hoy.*producción|cuánto.*produje/.test(p)){
    if(!historial.length) return 'Aún no tienes registros del día de hoy. Registra en la sección "Registrar" y te daré el análisis completo.';
    var r0 = historial[0];
    return 'Hoy produjiste:\n\n🥚 '+r0.huevos.toLocaleString('es-MX')+' huevos ('+r0.pctPostura+'% de postura)\n📦 '+Math.floor(r0.huevos/12)+' cartones completos + '+( r0.huevos%12)+' huevos\n💰 Ingreso estimado: $'+(granja.precioHuevo>0?Math.round(r0.huevos*granja.precioHuevo).toLocaleString('es-MX'):'configura tu precio en Finanzas')+'\n\n'+(r0.pctPostura>=94?'¡Excelente día!':r0.pctPostura>=85?'Producción dentro del rango normal.':'Por debajo del estándar — revisemos qué pasó.');
  }

  // COMPARACIÓN CON AYER
  if(/ayer|comparar|cómo.*ayer|ayer.*cómo|diferencia.*ayer|mejor.*ayer|peor.*ayer/.test(p)){
    if(historial.length<2) return 'Necesito al menos 2 días de registro para comparar. Sigue registrando diariamente y pronto te daré comparativas.';

      'Huevos: '+hoy0.huevos.toLocaleString('es-MX')+' hoy vs '+ay0.huevos.toLocaleString('es-MX')+' ayer\n'+
      'Mortalidad: '+hoy0.mortalidad+'% hoy vs '+ay0.mortalidad+'% ayer\n\n'+

      'La variación de '+Math.abs(difPct)+'% está dentro del rango normal. Sigue monitoreando.');

  // SEMANA ACTUAL / CICLO
  if(/en qué semana|semana.*estoy|cuántas semanas|ciclo.*voy|cuánto.*llevo|qué etapa/.test(p)){

      (sem<18?'Aún estás en desarrollo. La postura comenzará alrededor de la semana 18-20.':
       sem<=45?'Estás en la etapa de mayor producción del ciclo. Aprovecha para maximizar la postura y llevar registros detallados.':

  // PRONÓSTICO / PROYECCIÓN
  if(/cuánto.*ganar|cuanto.*ganar|proyección|cuánto.*producir|cuanto.*producir|qué.*esperar|futuro.*lote|siguiente.*mes/.test(p)){

      'Esto asume que la postura se mantiene en '+pct+'%. En semana '+sem+', '+
      (sem<=45?'aún tienes producción estable por delante.':sem<=65?'la postura puede bajar 1-2% por mes — es normal en esta etapa.':'el ciclo se acerca al final — considera tus próximos pasos.');

  // CONSEJOS DEL DÍA PERSONALIZADOS
  if(/consejo|tip|qué.*hacer hoy|qué.*revisar|qué.*debo.*hacer|recomendación del día|cómo.*empezar.*día/.test(p)){
    var consejos = [];
    if(!d.registradoHoy) consejos.push('📋 Registra tu producción de hoy — es lo primero que debes hacer cada mañana.');

    if(d.pctPostura>0&&d.pctPostura<88) consejos.push('📉 Tu postura está en '+pct+'% — por debajo del estándar. Revisa el programa de luz y el calcio en el alimento.');
    if(historial.length>1&&(historial[1].pctPostura-d.pctPostura)>=2) consejos.push('⚠️ La postura bajó '+( historial[1].pctPostura-d.pctPostura).toFixed(1)+'% vs ayer. Busca la causa hoy mismo.');

  if(/agua|bebedero|hidratación|litros|beber/.test(p)){

    return 'Tus '+aves.toLocaleString('es-MX')+' aves necesitan hoy aproximadamente '+litrosHoy.toLocaleString('es-MX')+' litros de agua limpia y fresca.\n\nRegla básica: una gallina bebe entre 2-4 veces más agua de lo que come. Si notas que toman menos agua de lo normal, algo está mal — revisa si el agua está sucia, caliente o si hay un problema de salud en el lote.\n\nLos bebederos deben limpiarse mínimo cada 2 días. El agua estancada y tibia es caldo de cultivo para bacterias que afectan la digestión y bajan la postura.\n\nEn '+(temp>=28?'días de calor como hoy, ponles agua fresca dos veces al día.':'días de temperatura normal, un llenado por la mañana suele ser suficiente si los bebederos son adecuados.');
  }

  // CALCIO / CASCARÓN
  if(/calcio|cascarón|cascaron|huevo roto|huevo sin cascarón|concha|mineral/.test(p)){
    return 'El calcio es fundamental para la calidad del cascarón. Una gallina en postura necesita 4g de calcio diario — casi el 4% del alimento.\n\nSi ves huevos con cascarón delgado, rugoso o sin cascarón: primero revisa que el alimento de postura tenga el nivel de calcio correcto (4-4.5%). Como suplemento puedes ofrecer concha de ostión o caliza molida en comederos aparte — las gallinas toman lo que necesitan.\n\nOtro factor: la vitamina D3, necesaria para absorber el calcio. Las gallinas que no toman sol necesitan que el alimento la incluya. En sistema '+sistema+(granja.sistema==='pastoreo'?' las aves toman sol naturalmente.':', asegúrate que el alimento balanceado la incluya.')+'\n\nEl problema de calcio se agrava con calor — en verano considera aumentar el suplemento.';
  }

  // RENTABILIDAD
  if(/rentabilidad|ganancia|negocio|dinero|inversión|recuperar|utilidad|profit/.test(p)){
    var ingDia2 = granja.precioHuevo>0 ? Math.round(d.huevosDia * granja.precioHuevo) : 0;
    var utilDia = ingDia2 - d.gastoDia;
    return 'Con los datos de tu granja:\n\nIngreso estimado: $'+ingDia2.toLocaleString('es-MX')+'/día · Gasto alimento: $'+d.gastoDia.toLocaleString('es-MX')+'/día · Utilidad bruta: $'+utilDia.toLocaleString('es-MX')+'/día.\n\nEsto es solo el costo de alimento. Para la rentabilidad real debes sumar: mano de obra, luz, agua, medicamentos y depreciación del galpón.\n\nLa producción avícola es rentable cuando el precio del huevo cubre al menos 2.5 veces el costo del alimento por ave. Actualmente produces '+d.huevosDia+' huevos con un gasto de $'+d.gastoDia.toLocaleString('es-MX')+' — eso es $'+(d.huevosDia>0?(d.gastoDia/d.huevosDia).toFixed(2):'—')+' de costo por huevo antes de otros gastos.';
  }

  // EMPEZAR / PRINCIPIANTE
  if(/empezar|empezando|principiante|nuevo|primera vez|iniciar|comenzar/.test(p)){
    return '¡Bienvenido a la avicultura! Lo más importante al empezar:\n\n1. Compra pollitas de una raza probada como '+raza+' — ya las tienes.\n2. El alimento representa el 70% de tus costos. Compra alimento balanceado de marca conocida, no mezcles en casa al principio.\n3. El programa de vacunación es obligatorio — sin vacunas pierdes el lote.\n4. Registra todo desde el día 1 (por eso tienes AviGo).\n5. La postura empieza alrededor de la semana 18-20.\n\nCon '+aves.toLocaleString('es-MX')+' aves en semana '+sem+' estás bien encaminado. Lo más importante ahora es mantener constancia en el manejo diario.';
  }

  // SALUDO / GENÉRICO
  if(/hola|buenas|qué tal|cómo estás|buenos días|buenas tardes/.test(p)){
    var status = pct>0 ? 'Tu postura hoy es '+pct+'% — '+(pct>=92?'¡muy bien!':pct>=85?'dentro del rango normal.':'hay oportunidad de mejorar.') : 'Aún no has registrado el día de hoy.';
    return '¡Hola! Soy Don Gallo, tu consejero avícola. '+status+'\n\nEstoy aquí para ayudarte con cualquier duda sobre tu granja — postura, alimento, salud del lote, costos, lo que necesites. ¿Qué te preocupa hoy?';
  }

  // ENFERMEDADES ESPECÍFICAS
  if(/newcastle|marek|gumboro|bronquitis|coccidiosis|salmonela|micoplasma|enfermedad|virus|bacteria|infección|síntoma|síntomas|moquillo|coriza|tifoidea|laringotraqueitis|viruela|ojo|nariz|diarrea|diarr|mocos|tos|estornudo|respiratorio|nervioso|parálisis|tumor/.test(p)){
    if(/newcastle/.test(p)) return 'Newcastle es la enfermedad viral más peligrosa en aves de postura. Síntomas: dificultad respiratoria, diarrea verde, tortícolis (cuello torcido) y caída brusca de postura hasta cero en 2-3 días.\n\nNo tiene tratamiento — la prevención es la única defensa. El programa de vacunación es obligatorio: cepa H120 a los 7 días, refuerzo a las 4 semanas, y vacuna oleosa a las 16 semanas. Después, refuerzo cada 8-10 semanas durante la postura.\n\nSi sospechas Newcastle en tu lote: aísla las aves enfermas, no muevas aves ni equipo entre galpones, notifica al veterinario y a SENASICA si es necesario. La mortalidad puede llegar al 100% sin vacunación previa.';
    if(/marek/.test(p)) return 'La enfermedad de Marek es causada por un herpesvirus. Afecta principalmente a pollitas jóvenes (4-20 semanas). Síntomas: parálisis de patas o alas, tumores internos, pérdida de peso y muerte.\n\nLa vacuna de Marek se aplica al primer día de vida — por eso siempre debes comprar pollitas ya vacunadas. No hay tratamiento.\n\nCon '+raza+' en semana '+sem+', si tus aves ya superaron las 20 semanas sin síntomas, el riesgo de Marek activo es bajo. El daño de Marek se ve en la etapa de crecimiento, no en postura avanzada.';
    if(/gumboro|bursitis/.test(p)) return 'La enfermedad de Gumboro (Bursitis Infecciosa) afecta el sistema inmune de las pollitas entre 3-6 semanas. Síntomas: plumas erizadas, diarrea blanca acuosa, decaimiento y mortalidad súbita.\n\nVacuna a las 2-3 semanas con cepa intermedia (D78). Si el lote ya está en postura (semana '+sem+'), Gumboro ya no es el problema principal — pero un lote mal vacunado de joven quedó con defensas bajas para toda la vida.\n\nNo hay tratamiento específico — solo soporte: electrolitos en el agua, vitaminas y reducir el estrés.';
    if(/coccidiosis|cocci/.test(p)) return 'La coccidiosis es causada por parásitos (Eimeria) y afecta principalmente a aves en piso. Síntomas: diarrea con sangre, plumas erizadas, pérdida de apetito y caída de postura.\n\nEn sistema '+sistema+(granja.sistema==='jaula'?', el riesgo de coccidiosis es bajo porque las aves no tienen contacto con la cama.':' el riesgo es real porque las aves contactan sus propias heces. Mantén la cama seca y bien ventilada.')+'\n\nTratamiento: amprolium o sulfonamidas en el agua por 5-7 días, bajo prescripción veterinaria. Prevención: coccidiostáticos en el alimento de inicio y desarrollo.';
    if(/salmonela|salmonella/.test(p)) return 'La Salmonela es una bacteria que afecta la producción y la inocuidad del huevo. Las aves pueden ser portadoras sin mostrar síntomas evidentes.\n\nPrevención: bioseguridad estricta (roedores y moscas son los principales vectores), agua y alimento sin contaminar, y evitar mezclar aves de distintas edades en el mismo galpón.\n\nEn México, la NOM-012-ZOO establece los programas de control. Si sospechas Salmonela, toma muestras y manda al laboratorio — el veterinario te orientará sobre el tratamiento.';
    if(/micoplasma|micoplasmosis|respiratorio|moquillo|coriza|tos|estornudo|mocos/.test(p)) return 'Los problemas respiratorios son muy comunes en aves de postura. Las causas más frecuentes son: Micoplasmosis (tos, secreción nasal, reducción de postura), Coriza Infecciosa (hinchazón facial, mal olor) y Bronquitis Infecciosa (tos, huevos deformes).\n\nSeñales de alerta en tu lote: aves con la cabeza metida entre las alas, secreción en ojos o nariz, respiración con ruido, o caída brusca de postura sin causa aparente.\n\nTratamiento: según diagnóstico veterinario — generalmente antibióticos específicos. Nunca automedicar sin diagnóstico. En semana '+sem+' con '+pct+'% de postura, cualquier caída brusca junto con síntomas respiratorios debe atenderse en 24-48 horas.';
    // Genérico enfermedades
    return 'Los síntomas más importantes a vigilar diariamente en tu lote de '+aves.toLocaleString('es-MX')+' aves:\n\n🔴 Urgente (actúa hoy): muerte súbita masiva, tortícolis, parálisis, diarrea con sangre, hinchazón facial severa.\n🟡 Importante (veterinario en 48h): caída de postura >5% sin causa clara, tos o estornudos en más del 5% del lote, diarrea generalizada, pérdida de apetito.\n🟢 Monitorear: un par de aves con plumas erizadas, leve reducción de consumo de agua.\n\nRegla de oro: cuando el 5% o más del lote muestra síntomas, es emergencia. Con '+raza+' en semana '+sem+', cualquier signo inusual merece atención rápida.';
  }

  // TRASPATIO / RANCHO FAMILIAR
  if(/traspatio|familiar|pequeño|pocos|casa|patio|rancho|pocas aves|básico|sencillo/.test(p)){
    return 'El manejo de traspatio tiene sus propias reglas — y sus ventajas. Con lotes pequeños el control es más fácil y el costo de entrada es menor.\n\nLo esencial para traspatio:\n\n1. Alimento: aunque el lote sea pequeño, usa alimento comercial balanceado. El maíz solo no cubre los requerimientos y reduce la postura a la mitad.\n2. Agua: limpia, fresca y disponible todo el día. En traspatio el agua se contamina más rápido — cambia el bebedero diariamente.\n3. Espacio: mínimo 2-3 aves por m² en corral techado. Más espacio = menos estrés = más huevos.\n4. Vacunas básicas: al menos Newcastle y Viruela — son las que más circulan en traspatio.\n\nCon '+aves.toLocaleString('es-MX')+' aves en semana '+sem+', tu producción estimada es '+Math.round(aves*0.85)+' huevos diarios cuando estés en pico. Suficiente para autoconsumo y venta local.';
  }

  // NUTRICIÓN AVANZADA
  if(/proteína|proteina|aminoácido|aminoacido|metionina|lisina|energía|energia|kcal|megacaloría|nutrición|nutricion|formulación|balanceo|balancear|premezcla|vitamina|mineral/.test(p)){
    var protRec = sem<=17 ? '18%' : sem<=20 ? '17%' : '16-17%';
    var kcalRec = sem<=17 ? '2,850-2,900' : '2,750-2,800';
    return 'Para '+raza+' en semana '+sem+', los requerimientos nutricionales clave son:\n\n• Proteína: '+protRec+' en el alimento total\n• Energía: '+kcalRec+' kcal/kg de alimento\n• Calcio: 4.0-4.5% (crítico para cascarón)\n• Fósforo disponible: 0.35-0.40%\n• Metionina: 0.35% mínimo (aminoácido limitante en maíz-soya)\n• Lisina: 0.75-0.80%\n• Sodio: 0.15-0.18%\n\nLos aminoácidos (metionina y lisina) son los más críticos cuando el alimento tiene mucho maíz y poca soya. Una deficiencia de metionina se manifiesta como plumas de mala calidad, menor postura y cascarones delgados.\n\nSi mezclas tu propio alimento: maíz (55-60%) + pasta de soya (25-28%) + caliza (8-9%) + premezcla vitamínico-mineral (1%) es una base sólida. Pero para lotes comerciales siempre es mejor alimento certificado — te ahorra el margen de error.';
  }

  // CLIMA Y ESTACIONES
  if(/lluvia|lluvias|invierno|frío|frio|sequía|sequia|temporada|época|calor extremo|humedad|húmedo|seco/.test(p)){
    var mesActual = new Date().getMonth();
    var temporada = mesActual>=5&&mesActual<=9 ? 'lluvias' : mesActual>=11||mesActual<=1 ? 'frío' : 'transición';
    var consejoClima = '';
    if(/lluvia|lluvias|humedad|húmedo/.test(p)||temporada==='lluvias'){
      consejoClima = 'En época de lluvias los riesgos principales son: humedad excesiva en la cama (piso) que genera amoniaco, hongos en el alimento y proliferación de moscas y mosquitos que transmiten viruela aviar.\n\nAcciones: revisar el techo y canales de desagüe, cambiar la cama mojada inmediatamente, sellar boquetes por donde entre el agua, y reforzar el control de insectos.\n\nLa humedad alta también favorece la Coccidiosis y problemas respiratorios. En lluvia, monitorea más de cerca.';
    } else if(/frío|frio|invierno/.test(p)||temporada==='frío'){
      consejoClima = 'En temporada fría el consumo de alimento sube 10-15% porque las aves gastan energía para mantener la temperatura corporal. Si no ajustas el alimento, la postura baja.\n\nEn frío: aumenta ligeramente la densidad energética del alimento, cierra cortinas del galpón por las noches (sin eliminar ventilación), y verifica que el agua no esté helada temprano.\n\nLas noches bajo 10°C pueden reducir la postura hasta 8%. Con calefacción básica en el galpón esto se evita.';
    } else if(/sequía|sequia|seco/.test(p)){
      consejoClima = 'En sequía el reto principal es el agua — escasez y aumento de temperatura. Almacena reservas de agua, revisa que los bebederos no pierdan líquido, y en calor extremo enfría el agua antes de dársela a las aves.\n\nEl polvo en época seca también aumenta los problemas respiratorios. Riega los pasillos externos y mantén las cortinas semi-cerradas para reducir el polvo dentro del galpón.';
    }
    return (consejoClima || 'El clima afecta directamente la postura y la salud del lote. La temperatura ideal para postura es 18-24°C — cada grado por encima de 28°C puede costar 1-2% de postura.')+'\n\nActualmente tienes '+temp+'°C y '+pct+'% de postura. '+(temp>=28?'El calor es un factor activo que debes controlar hoy.':'La temperatura está en rango aceptable.');
  }

  // PRECIOS Y MERCADO
  if(/precio.*mercado|mercado.*precio|cómo.*vendo|a quién.*vendo|donde.*vendo|distribuidor|mayorista|caja|centro de acopio|competencia|precio.*huevo|huevo.*precio/.test(p)){
    var costoHuevo = d.huevosDia>0 && d.gastoDia>0 ? (d.gastoDia/d.huevosDia).toFixed(3) : '—';
    return 'En México el precio del huevo varía mucho por región y canal de venta:\n\n• Venta al consumidor directo: $2.50-4.00/pieza (mejor margen)\n• Venta a tiendas locales / mercado: $1.80-2.80/pieza\n• Venta a coyote / mayorista: $1.20-1.80/pieza (menor margen)\n• Precio por caja (360 piezas): $500-900 según región\n\nTu costo estimado de alimento por huevo es $'+costoHevo+'. Para ser rentable necesitas vender al menos 2.5x ese costo.\n\nEl mejor canal para productores pequeños y medianos es la venta directa: mercado local, tianguis, vecinos y redes sociales. Evita depender de un solo comprador — diversifica siempre.\n\nEl precio del huevo en México sube en noviembre-diciembre (posadas) y baja en enero-febrero. Planifica tu producción con eso en mente.'.replace('costoHevo', costoHuevo);
  }

  // REGISTROS Y ADMINISTRACIÓN
  if(/registro|anotar|control|administración|administracion|excel|cuaderno|bitácora|bitacora|historial|llevar cuenta|documentar/.test(p)){
    var diasReg = historial.length;
    return 'Llevar registros es lo que diferencia a un productor profesional de uno que "trabaja a ciegas". Con AviGo ya llevas '+diasReg+' día'+(diasReg!==1?'s':'')+' registrados — ¡bien hecho!\n\nLo mínimo que debes registrar cada día:\n• Huevos recolectados y % de postura\n• Bajas (mortalidad)\n• Consumo de alimento\n• Temperatura del galpón\n• Observaciones inusuales\n\nLo que debes revisar cada semana:\n• Promedio de postura vs semana anterior\n• Consumo total de alimento vs producción\n• Costo por huevo producido\n\nCon estos datos puedes detectar tendencias antes de que se conviertan en problemas graves. Un registro completo también es necesario si quieres acceder a créditos o apoyos de gobierno (FIRA, SAGARPA).';
  }

  // PRIMEROS AUXILIOS / SÍNTOMAS
  if(/primeros auxilios|qué hago si|qué hacer cuando|emergencia|urgente|ayuda|socorrer|tratar|electrolit|vitamina|antibiótico|antibiotico|medicar|medicina|medicamento/.test(p)){
    return 'Guía rápida de primeros auxilios para tu lote:\n\n💧 ELECTROLITOS: cuando hay diarrea, calor extremo o estrés por manejo. Diluye 1 cucharada de azúcar + 1 pizca de sal en 1 litro de agua. Dura 24h.\n\n🌿 VITAMINAS: cuando hay caída de postura sin causa clara, después de una enfermedad o vacunación. Complejo vitamínico (A, D, E, K + grupo B) en agua por 5-7 días.\n\n🚫 NUNCA: mezcles antibióticos sin diagnóstico veterinario — genera resistencia y puede contaminar el huevo.\n\n🔴 LLAMA AL VETERINARIO si: mortalidad supera 0.2% en un día, ves síntomas neurológicos (tortícolis, círculos), hinchazón facial repentina, o más del 10% del lote muestra síntomas.\n\nTen siempre en tu botiquín básico: electrolitos, complejo vitamínico, desinfectante yodado y el teléfono de tu veterinario de confianza.';
  }

  // GALLINAZA Y RESIDUOS
  if(/gallinaza|estiércol|excreta|residuos|abono|composta|compostar|olor|amoniaco|mosca|insecto|plaga|mosca/.test(p)){
    var gallinazaEst = Math.round(aves * 0.1);
    return 'Con '+aves.toLocaleString('es-MX')+' aves produces aproximadamente '+gallinazaEst+' kg de gallinaza diarios — un recurso valioso si se maneja bien.\n\nUsos de la gallinaza:\n• Abono orgánico: es uno de los mejores fertilizantes naturales (3-4% nitrógeno, fósforo y potasio). Véndela a agricultores locales o úsala en tu propia parcela.\n• Composta: mezcla gallinaza con rastrojo o paja (3:1) y deja compostar 30-45 días. El producto final vale más.\n• Biogás: en lotes grandes se usa para producir biogás como energía. Para tu escala no es económico aún.\n\nManejo correcto para evitar problemas:\n• Retira la gallinaza fresca cada semana en sistema piso — el amoniaco daña los bronquios de las aves y baja la postura hasta 10%.\n• Cubre los montones fuera del galpón para evitar proliferación de moscas.\n• Nunca dejes gallinaza húmeda acumulada — es el principal criadero de moscas y fuente de Salmonela.\n\nLas moscas son más que una molestia — transmiten enfermedades y estresan a las aves. Control: trampas pegajosas, larvicidas en la gallinaza y barreras físicas.';
  }

// ═══════════════════════════════════════════════════════════════
// DON GALLO — BASE DE CONOCIMIENTO EXTENDIDA
// Razas · Proveedores · Apoyos gobierno · Reproductoras · Incubación

  // RAZAS ESPECÍFICAS Y DATOS TÉCNICOS
  if(/raza|hy.?line|lohmann|isa brown|babcock|bovans|novogen|shaver|dekalb|leghorn|rhode|plymouth|tetra|nick chick|cuál.*raza|mejor.*raza|raza.*mejor|recomienda.*raza|elegir.*raza/.test(p)){
    if(/hy.?line|hyland/.test(p)) return 'La Hy-Line Brown es la raza más popular en México y una de las mejores del mundo. Sus datos técnicos:\n\n• Pico de postura: 94-96% entre sem 25-35\n• Producción ciclo completo: 355-365 huevos por ave\n• Peso del huevo: 63-65g en pico\n• Consumo de alimento: 108-112g/ave/día en postura\n• Conversión alimenticia: 2.0-2.1 kg alimento/kg huevo\n• Mortalidad esperada: 3-5% por ciclo\n• Inicio de postura: semana 17-18\n• Color cascarón: marrón oscuro uniforme\n\nEs resistente al calor, dócil y de excelente postura sostenida. Ideal para todos los sistemas de producción en México.';
    if(/lohmann/.test(p)) return 'La Lohmann Brown Classic es la raza preferida en Europa y muy popular en el norte de México:\n\n• Pico de postura: 93-95% entre sem 26-36\n• Producción ciclo: 350-360 huevos\n• Peso del huevo: 64-66g\n• Consumo: 110-114g/ave/día\n• Inicio postura: semana 18-19\n• Fortaleza: excelente calidad de cascarón, aguanta bien el calor\n• Debilidad: más sensible al estrés por manejo que Hy-Line\n\nMuy buena opción para climas cálidos del centro y sur de México.';
    if(/isa brown/.test(p)) return 'ISA Brown, desarrollada en Francia, es muy productiva y adaptable:\n\n• Pico de postura: 92-95%\n• Producción ciclo: 345-355 huevos\n• Peso del huevo: 62-64g\n• Consumo: 108-112g/ave/día\n• Inicio postura: semana 17-18\n• Fortaleza: muy buena conversión alimenticia, huevo de buen tamaño desde el inicio\n• Ideal para climas frescos de altitud media-alta (como el centro de México)';
    if(/babcock/.test(p)) return 'Babcock Brown es una raza robusta, popular en traspatio y producción semiintensiva:\n\n• Pico de postura: 91-93%\n• Producción ciclo: 340-350 huevos\n• Peso del huevo: 62-64g\n• Consumo: 110-115g/ave/día\n• Inicio postura: semana 18-19\n• Fortaleza: muy resistente a enfermedades, buena en piso y pastoreo\n• Ideal para productores que no tienen control total del ambiente';
    if(/leghorn|blanca|huevo blanco/.test(p)) return 'La Leghorn White es la campeona de producción de huevo blanco:\n\n• Pico de postura: 92-96%\n• Producción ciclo: 355-370 huevos (¡más que las marrones!)\n• Peso del huevo: 60-62g\n• Consumo: 100-105g/ave/día (come MENOS que las marrones)\n• Inicio postura: semana 17\n• Fortaleza: máxima eficiencia alimenticia, produce más huevos comiendo menos\n• Debilidad: más nerviosa, susceptible al estrés, cascarón más delgado\n\nEl huevo blanco tiene menor precio en el mercado mexicano pero el costo de producción también es menor.';
    if(/cuál|mejor|recomienda|elegir|escoger/.test(p)){
      var razaActual = granja.raza ? granja.raza.n : 'tu raza actual';
      return 'Para elegir la raza correcta considera:\n\n1. CLIMA: Hy-Line Brown y Lohmann aguantan mejor el calor. ISA Brown es mejor en altitudes frescas.\n2. SISTEMA: En jaula cualquier raza comercial funciona. En piso y pastoreo, razas más rústicas como Babcock o Rhode Island.\n3. MERCADO: En México el 85% del mercado prefiere huevo marrón. Solo vale la pena producir blanco si tienes cliente específico.\n4. EXPERIENCIA: Para principiantes, Hy-Line Brown es la más "perdonadora" — produce bien incluso con manejo imperfecto.\n\nActualmente tienes '+razaActual+'. Si está funcionando bien, no hay razón para cambiar — el estrés del cambio de raza tarda 2-3 ciclos en compensarse.';
    }
    return 'Las razas más usadas en México para postura:\n\n🥇 Hy-Line Brown: la más popular, 355+ huevos/ciclo, 94-96% pico\n🥈 Lohmann Brown: excelente calidad de cascarón, 350-360 huevos\n🥉 ISA Brown: muy eficiente, 345-355 huevos\n🏅 Babcock Brown: más rústica, ideal para traspatio\n🏅 Leghorn White: máxima producción (370 huevos) pero huevo blanco\n\nTu '+raza+' en semana '+sem+' tiene un potencial de '+(granja.raza&&granja.raza.pico?granja.raza.pico:'90-95%')+' de postura. ¿Quieres saber más de alguna raza específica?';

  return donGalloComprende(pregunta, p, d, raza, sem, aves, pct, temp, sistema, altitud, diasInv, historial, granja);

// ─── FORMATEADOR DE RESPUESTAS DE DON GALLO ──────────────────
function formatDG(texto){
  if(!texto) return '';

  // Dividir en párrafos por \n\n o \n
  var parrafos = texto.split(/\n\n+/);

  var html = parrafos.map(function(parrafo){
    var lineas = parrafo.split('\n');

    // Detectar si es una lista de items (empieza con •, -, *, número o emoji+texto)
    var esLista = lineas.length > 1 && lineas.every(function(l){
      return /^[•\-\*\d]|^[\u{1F300}-\u{1FFFF}]|^[A-Z]{2,}:/u.test(l.trim()) || l.trim() === '';
    });

    if(esLista){
      var items = lineas.filter(function(l){ return l.trim(); }).map(function(linea){
        var l = linea.trim();

        // Detectar tipo de ítem
        var esSeccion = /^[A-ZÁÉÍÓÚ\u{1F300}-\u{1FFFF}].{2,}:/u.test(l) && !l.startsWith('•');
        var esTitulo  = /^\d+\./.test(l);

        if(esSeccion){
          // Sección con título: "MORTALIDAD: texto"
          var partes = l.split(':');
          var titulo = partes[0].trim();
          var resto  = partes.slice(1).join(':').trim();
          return '<div style="margin-bottom:6px">'
            +'<span style="font-size:11px;font-weight:800;color:#16A34A;display:block;margin-bottom:2px">'+titulo+(resto?':':'')+'</span>'
            +(resto?'<span style="color:#374151">'+resto+'</span>':'')
            +'</div>';
        } else if(esTitulo){
          // Lista numerada
          var num = l.match(/^(\d+)\.\s*/)[1];
          var contenido = l.replace(/^\d+\.\s*/, '');
          return '<div style="display:flex;gap:8px;margin-bottom:5px;align-items:flex-start">'
            +'<span style="min-width:18px;height:18px;background:#16A34A;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:#fff;flex-shrink:0;margin-top:1px">'+num+'</span>'
            +'<span style="flex:1;color:#374151">'+formatInline(contenido)+'</span>'
            +'</div>';
        } else {
          // Bullet normal
          var contenido2 = l.replace(/^[•\-\*]\s*/, '');
          // Detectar emoji al inicio
          var emojiMatch = contenido2.match(/^([\u{1F300}-\u{1FFFF}\u{2600}-\u{27BF}][\uFE0F\u20E3]?\s)/u);
          var emoji = emojiMatch ? emojiMatch[1].trim() : '•';
          var texto2  = emojiMatch ? contenido2.slice(emojiMatch[0].length) : contenido2;
          return '<div style="display:flex;gap:7px;margin-bottom:5px;align-items:flex-start">'
            +'<span style="font-size:12px;flex-shrink:0;margin-top:1px">'+emoji+'</span>'
            +'<span style="flex:1;color:#374151">'+formatInline(texto2)+'</span>'
            +'</div>';
        }
      });
      return '<div style="margin-bottom:8px">'+items.join('')+'</div>';
    }

    // Párrafo normal — una sola línea o texto corrido
    var textoParrafo = lineas.join(' ');

    // Detectar si empieza con emoji grande (separador de sección)
    var secMatch = textoParrafo.match(/^([\u{1F300}-\u{1FFFF}\u{2600}-\u{27BF}\u{26A0}\u{2705}\u{274C}][\uFE0F\u20E3]?\s[A-ZÁÉÍÓÚ][^:]+:)/u);
    if(secMatch){
      var titulo2 = secMatch[1];
      var resto2  = textoParrafo.slice(titulo2.length).trim();
      return '<div style="margin-bottom:8px">'
        +'<div style="font-size:11px;font-weight:800;color:#16A34A;margin-bottom:3px">'+titulo2+'</div>'
        +(resto2?'<div style="color:#374151">'+formatInline(resto2)+'</div>':'')
        +'</div>';
    }

    // Párrafo normal
    return '<div style="margin-bottom:8px;color:#374151">'+formatInline(textoParrafo)+'</div>';
  }).join('');

  return html;
}

// Formatea texto inline: negrita para texto entre ** o texto en MAYÚSCULAS corto
function formatInline(texto){
  if(!texto) return '';
  // Negrita para palabras en MAYÚSCULAS (3+ chars) que sean técnicas
  return texto
    .replace(/\b(URGENTE|ALERTA|IMPORTANTE|NOTA|OJO|NUNCA|SIEMPRE|HOY MISMO)\b/g,
      '<strong style="color:#DC2626;font-weight:800">$1</strong>')
    .replace(/\b(Newcastle|Marek|Gumboro|Coccidiosis|Salmonela|Coriza|Micoplasmosis|Bronquitis)\b/g,
      '<em style="font-weight:700;color:#7C3AED">$1</em>');
}

// CLIMA AUTOMÁTICO — Open-Meteo (gratuito, sin API key)
// Usa GPS del dispositivo + coordenadas de la granja
// ═══════════════════════════════════════════════════════════════
var _climaCache = { temp: null, fecha: null, lat: null, lon: null };

function obtenerTemperaturaAuto(callback){
  // Cache válido por 30 minutos — no por día completo
  var ahora = Date.now();
  var cacheValido = _climaCache.temp !== null && 
                    _climaCache.ts && 
                    (ahora - _climaCache.ts) < 30 * 60 * 1000;
  if(cacheValido){
    if(callback) callback(_climaCache.temp, _climaCache.lat, _climaCache.lon);
    return;
  }

  // Intentar obtener GPS actual primero (silencioso, sin pedir permiso extra)
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      function(pos){
        var lat = pos.coords.latitude;
        var lon = pos.coords.longitude;
        // Actualizar coords guardadas
        granja.climaLat = lat;
        granja.climaLon = lon;
        fetchTemperatura(lat, lon, callback);
      },
      function(){
        // GPS falló — usar coords guardadas o default Tehuacán
        var lat = granja.climaLat || _climaCache.lat || 18.4613;
        var lon = granja.climaLon || _climaCache.lon || -97.3939;
        fetchTemperatura(lat, lon, callback);
      },
      { timeout: 5000, enableHighAccuracy: false, maximumAge: 300000 }
    );
  } else {
    var lat = granja.climaLat || _climaCache.lat || 18.4613;
    var lon = granja.climaLon || _climaCache.lon || -97.3939;
    fetchTemperatura(lat, lon, callback);
  }
}

function fetchTemperatura(lat, lon, callback){
  var url = 'https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon
    +'&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code'
    +'&timezone=auto&forecast_days=1';

  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data && data.current && data.current.temperature_2m !== undefined){
        var temp = Math.round(data.current.temperature_2m * 10) / 10;
        var hoy  = new Date().toISOString().split('T')[0];
        // Guardar con timestamp para cache de 30 min
        _climaCache = { temp: temp, fecha: hoy, lat: lat, lon: lon, ts: Date.now() };
        granja.tempHoy = temp;
        granja.climaLat = lat;
        granja.climaLon = lon;
        guardarEnStorage();
        if(callback) callback(temp, lat, lon);
        actualizarClimaEnDash(temp, data.current.weather_code);
      }
    })
    .catch(function(){
      // Sin internet — usar tempHoy guardado y mostrarlo
      if(granja.tempHoy){
        if(callback) callback(granja.tempHoy, lat, lon);
        actualizarClimaEnDash(granja.tempHoy, undefined);
      }
    });
}

function actualizarClimaEnDash(temp, wcode){
  var el = document.getElementById('clima-dash');
  if(!el) return;
  var icono, color, sub;
  if(temp >= 35){      icono='🔥'; color='#EF4444'; sub='golpe de calor — baja hasta 15%'; }
  else if(temp >= 30){ icono='☀️'; color='#EF4444'; sub='calor alto — baja 5-10%'; }
  else if(temp >= 28){ icono='⚠️'; color='#D97706'; sub='calor moderado — baja 2-5%'; }
  else if(temp >= 18){ icono='✅'; color='#16A34A'; sub='temperatura ideal'; }
  else if(temp >= 12){ icono='🌤️'; color='#D97706'; sub='frío — aumenta consumo 10%'; }
  else {               icono='🥶'; color='#EF4444'; sub='frío crítico — cierra cortinas'; }

  // Descripción del clima por código WMO
  var desc = '';
  if(wcode !== undefined){
    if(wcode === 0) desc = 'Despejado';
    else if(wcode <= 3) desc = 'Parcialmente nublado';
    else if(wcode <= 48) desc = 'Nublado/neblina';
    else if(wcode <= 67) desc = 'Lluvia';
    else if(wcode <= 77) desc = 'Nieve';
    else if(wcode <= 82) desc = 'Lluvia intensa';
    else desc = 'Tormenta';
  }

  el.innerHTML = '<div style="font-size:9px;font-weight:700;color:#9CA3AF;margin-bottom:3px">🌡️ Temperatura hoy</div>'
    +'<div style="font-size:14px;font-weight:900;color:'+color+'">'+icono+' '+temp+'°C'+(desc?' · '+desc:'')+'</div>'
    +'<div style="font-size:8px;color:#C4C4C4;margin-top:2px">'+sub+'</div>';
}

function bindRecordatorios(){

  var _btnMap = {
    'btn-reiniciar':  function(){ resetApp(); },
    'btn-reiniciar2': function(){ resetApp(); },
    'btn-exportar-hist': function(){ exportarReporte(); },
    'btn-backup':     function(){ backupDatos(); },
    'btn-demo':       function(){ cargarDemoV2(); },
    'btn-nuevo-lote': function(){ nav('nuevo_lote'); },
  };
  Object.keys(_btnMap).forEach(function(id){
    var el = document.getElementById(id);
    if(el) el.onclick = _btnMap[id];
  });

  var recIds=['rec-alim','rec-huevo','rec-bebedero','rec-comedero','rec-cama','rec-galpon'];
  var FREC_IDS=['diario','cada2','semanal','quincenal'];
  recIds.forEach(function(rid){

    var tog = document.getElementById('tog-'+rid);

    FREC_IDS.forEach(function(fid){
      var fbt = document.getElementById('fbt-'+rid+'-'+fid);
      if(fbt){ fbt.onclick = (function(r,f){ return function(){ setFrecRec(r,f); }; })(rid,fid); }
    });
    // Botones de días de la semana (0=L...6=D)
    for(var di=0;di<7;di++){
      var dbt = document.getElementById('dbt-'+rid+'-'+di);
      if(dbt){ dbt.onclick = (function(r,d){ return function(){ toggleDiaRec(r,d); }; })(rid,di); }
    }
    // Horarios existentes
    var data = granja.recordatorios && granja.recordatorios[rid];
    if(data && data.horas) _bindListaListeners(rid, data.horas);

}

function _bindListaListeners(id, horas){
  horas.forEach(function(h,hi){
    var inp = document.getElementById('hora-'+id+'-'+hi);

    var del = document.getElementById('del-hora-'+id+'-'+hi);
    if(del){ del.onclick = (function(r,i){ return function(){ quitarHoraRec(r,i); }; })(id,hi); }
  });
}

function _getRecData(id){
  if(!granja.recordatorios) granja.recordatorios = {};
  if(!granja.recordatorios[id]) granja.recordatorios[id] = {activo:id==='rec-alim'||id==='rec-huevo', horas:[], frec:'diario', dias:[]};
  var d = granja.recordatorios[id];
  if(!d.frec) d.frec = 'diario';
  if(!d.dias) d.dias = [];
  return d;
}

  // Sincronizar con backend

    var tipoMap = { 'rec-alim':'alimentacion','rec-huevo':'recoleccion','rec-bebedero':'bebederos','rec-comedero':'comederos','rec-cama':'cama','rec-galpon':'galpon' };
    var tipo = tipoMap[id] || id;
    var todosRecs = granja.recordatorios || {};
    var recsArray = Object.keys(tipoMap).map(function(k) {

    });
    fetch(AVIGO_API + '/push/recordatorios', {
      method: 'POST',
      headers: avigoHeaders(),
      body: JSON.stringify({ recordatorios: recsArray })
    }).catch(function() {});

  showToast(data.activo ? 'Recordatorio activado' : 'Recordatorio desactivado');
