<script>
var AVIGO_API = 'https://avigo-backend-production.up.railway.app';
var GOOGLE_CLIENT_ID = '656598071921-ditio8pdi3mfeed3ijjpd4vaf1j7t39g.apps.googleusercontent.com';

var VAPID_PUBLIC_KEY = 'BJset3wFyv_go1jDHfZIptkmdz2UydJ4Q8A-2WmGODLbRyeJsebz4IcfzzpYx3k0Xbf2KU9RFgUVZxRAnhxg_QA';
var _pushSuscripcion = null;

// âââ REPORTE GLOBAL DE ERRORES âââââââââââââââââââââââââââââââ
// Sin esto, un fallo en el dispositivo del usuario es invisible: no hay toast,
// no hay log, no hay nada. Se define aquĂ­ arriba a propĂłsito, para cubrir
// tambiĂŠn los errores de arranque.
var _avigoErroresEnviados = 0;
function _avigoReportarError(tipo, msg, stack) {
  try {
    if (_avigoErroresEnviados >= 10) return;  // tope por sesiĂłn: no inundar
    _avigoErroresEnviados++;
    var payload = {
      tipo:     tipo,
      msg:      String(msg == null ? '' : msg).slice(0, 300),
      stack:    String(stack == null ? '' : stack).slice(0, 800),
      pantalla: (typeof _lastScreen !== 'undefined') ? _lastScreen : null,
      ruta:     location.pathname + location.search,
      twa:      typeof window.ReactNativeWebView !== 'undefined',
      ua:       (navigator.userAgent || '').slice(0, 200),
      ts:       new Date().toISOString()
    };
    try { console.error('[AviGo][error]', payload); } catch(e) {}
    // text/plain evita el preflight CORS y sobrevive al unload.
    // Si la ruta aĂşn no existe en el backend, el beacon falla en silencio.
    if (navigator.sendBeacon) {
      navigator.sendBeacon(AVIGO_API + '/errores',
        new Blob([JSON.stringify(payload)], { type: 'text/plain' }));
    }
  } catch(e) {}
}
window.addEventListener('error', function(ev) {
  _avigoReportarError('error', ev && ev.message, ev && ev.error && ev.error.stack);
});
window.addEventListener('unhandledrejection', function(ev) {
  var r = ev && ev.reason;
  _avigoReportarError('rejection', (r && r.message) || r, r && r.stack);
});

function urlBase64ToUint8Array(base64String) {
  var padding = '='.repeat((4 - base64String.length % 4) % 4);
  var base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  var rawData = window.atob(base64);
  var outputArray = new Uint8Array(rawData.length);
  for (var i = 0; i < rawData.length; ++i) {
    outputArray[i] = rawData.charCodeAt(i);
  }
  return outputArray;
}

function inicializarPush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    return;
  }
  navigator.serviceWorker.register('sw.js')
  .then(function(reg) {
    return reg.pushManager.getSubscription();
  })
  .then(function(sub) {
    if (sub) {
      _pushSuscripcion = sub;
      if (avigoTieneSession()) {
        sincronizarSuscripcion(sub);
      }
    }
  })
  .catch(function(err) {
  });
}

function suscribirPush(callback) {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    if (callback) callback(false, 'No soportado');
    return;
  }
  navigator.serviceWorker.ready.then(function(reg) {
    return reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
  })
  .then(function(sub) {
    _pushSuscripcion = sub;
    sincronizarSuscripcion(sub);
    if (callback) callback(true);
  })
  .catch(function(err) {
    if (callback) callback(false, err.message);
  });
}

function sincronizarSuscripcion(sub) {
  if (!avigoTieneSession() || !sub) return;
  var subJson = sub.toJSON();
  fetch(AVIGO_API + '/push/suscribir', {
    method: 'POST',
    headers: avigoHeaders(),
    body: JSON.stringify({
      endpoint:    subJson.endpoint,
      p256dh:      subJson.keys.p256dh,
      auth:        subJson.keys.auth,
      dispositivo: navigator.userAgent.substring(0, 100),
      sistema:     granja.sistema || 'jaula'
    })
  }).catch(function() {});
}

function desuscribirPush(callback) {
  if (!_pushSuscripcion) { if (callback) callback(true); return; }
  var endpoint = _pushSuscripcion.endpoint;
  _pushSuscripcion.unsubscribe()
  .then(function() {
    _pushSuscripcion = null;
    if (avigoTieneSession()) {
      fetch(AVIGO_API + '/push/suscripcion', {
        method: 'DELETE',
        headers: avigoHeaders(),
        body: JSON.stringify({ endpoint })
      }).catch(function() {});
    }
    if (callback) callback(true);
  })
  .catch(function() { if (callback) callback(false); });
}

function estaSuscritoPush() {
  return !!_pushSuscripcion;
}

function probarNotificacion() {
  if (!_pushSuscripcion || !avigoTieneSession()) {
    showToast('Activa las notificaciones primero');
    return;
  }
  fetch(AVIGO_API + '/push/test', {
    method: 'POST',
    headers: avigoHeaders(),
    body: JSON.stringify({ endpoint: _pushSuscripcion.endpoint })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    showToast(d.ok ? 'Notificacion de prueba enviada' : 'Error al enviar');
  })
  .catch(function() { showToast('Sin conexion'); });
}

function _getPlanData() {
  try {
    var d = localStorage.getItem('avigo_plan_data');
    return d ? JSON.parse(d) : {};
  } catch(e) { return {}; }
}

function _setPlanData(data) {
  try { localStorage.setItem('avigo_plan_data', JSON.stringify(data)); } catch(e) {}
}

// ââ VERDAD DEL PLAN: el servidor (/auth/me â planInfo) âââââââ
// 'avigo_plan_info' en localStorage es solo CACHĂ para operar
// offline con el Ăşltimo valor conocido.

function _getPlanInfo() {
  try { return JSON.parse(localStorage.getItem('avigo_plan_info') || 'null'); } catch(e) { return null; }
}

function _setPlanInfo(info) {
  try { localStorage.setItem('avigo_plan_info', JSON.stringify(info)); } catch(e) {}
}

function avigoRefrescarPlanInfo(cb) {
  if (!avigoTieneSession()) { if (cb) cb(null); return; }
  fetch(AVIGO_API + '/auth/me', { headers: avigoHeaders() })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data && data.planInfo) _setPlanInfo(data.planInfo);
    if (data && !data.error) _setBorradoPendiente(data.borradoPendiente || null);
    if (cb) cb((data && data.planInfo) || null);
  })
  .catch(function() { if (cb) cb(null); }); // offline: se conserva el cachĂŠ
}

function esPro() {
  var info = _getPlanInfo();
  if (!info || info.plan !== 'pro') return false;
  if (info.expira && new Date(info.expira) < new Date()) return false;
  return true;
}

function estaEnPrueba() {
  var info = _getPlanInfo();
  if (!info || !info.enTrial) return false;
  if (info.expira && new Date(info.expira) < new Date()) return false;
  return true;
}

function diasRestantesPrueba() {
  var info = _getPlanInfo();
  if (!info || !info.enTrial) return 0;
  if (info.expira) {
    var restantes = Math.ceil((new Date(info.expira) - Date.now()) / (1000 * 60 * 60 * 24));
    return restantes > 0 ? restantes : 0;
  }
  return info.trialDiasRestantes || 0;
}

function tienePlanPagado() {
  var info = _getPlanInfo();
  return !!(info && info.plan === 'pro' && !info.enTrial);
}

  try {
    var f = new Date(iso).toLocaleDateString('es-MX', { day: 'numeric', month: 'long', year: 'numeric' });

  } catch(e) {}
  return String(iso).slice(0, 10);
}

function _ejecutarBorrado(modo) {
  var inp = document.getElementById('borrado-input');
  var errEl = document.getElementById('borrado-err');
  var btn = document.getElementById('btn-borrado-ejecutar');
  var val = inp ? inp.value : '';
  function fallo(msg) {
    if (errEl) { errEl.style.display = 'block'; errEl.textContent = msg; }
    if (btn) { btn.disabled = false; btn.textContent = 'Eliminar mi cuenta definitivamente'; }
  }
  if (!val) return fallo(modo === 'password' ? 'Escribe tu contraseĂąa' : 'Escribe ELIMINAR para confirmar');
  if (modo === 'confirmacion' && val.trim() !== 'ELIMINAR') return fallo('Debes escribir exactamente ELIMINAR');
  if (btn) { btn.disabled = true; btn.textContent = 'Eliminando...'; }
  var body = modo === 'password' ? { password: val } : { confirmacion: 'ELIMINAR' };
  fetch(AVIGO_API + '/auth/cuenta', { method: 'DELETE', headers: avigoHeaders(), body: JSON.stringify(body) })
  .then(function(r) { return r.json().then(function(d) { return { status: r.status, data: d }; }); })
  .then(function(res) {
    if (res.status === 200) {
      _setBorradoPendiente({ fechaLimite: res.data.fechaBorrado, solicitadoEn: res.data.borradoSolicitadoEn });
      _mostrarDespedidaBorrado(res.data);
      return;
    }
    var err = (res.data && res.data.error) || 'No se pudo procesar la solicitud';
    // El backend puede pedir el otro mĂŠtodo (p. ej. la cuenta sĂ­/no tiene password).
    if (res.status === 400 && modo === 'password' && err.indexOf('ELIMINAR') >= 0) return _renderPaso2Borrado('confirmacion', null);
    if (res.status === 400 && modo === 'confirmacion' && err.toLowerCase().indexOf('contrasena') >= 0) return _renderPaso2Borrado('password', null);
    fallo(err);
  })
  .catch(function() { fallo('Sin conexiĂłn. Intenta de nuevo.'); });
}

function avigoLogout() {
  // Guardar el ID del Ăşltimo usuario para que LS_KEY lo use al recargar
  try {
    if (_avigoSession && _avigoSession.usuario && _avigoSession.usuario.id) {
      LS_KEY = 'avigo_v1_' + _avigoSession.usuario.id;
      // Guardar datos actuales con la clave correcta antes de cerrar
      guardarEnStorage();
    }
  } catch(e) {}
  _avigoSession = null;
  try { localStorage.removeItem('avigo_session'); } catch(e) {}
  try {
    if(typeof window.ReactNativeWebView !== 'undefined'){
      window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'CLEAR_SESSION' }));
    }
  } catch(e) {}
  if (typeof google !== 'undefined' && google.accounts) {
    google.accounts.id.disableAutoSelect();
  }
  showToast('Sesion cerrada');
  try { nav('splash'); } catch(e) { window.location.reload(); }
}

function avigoTieneSession() {
  return _avigoSession && _avigoSession.token;
}

function avigoRenovarTokenSiNecesario() {
  if (!avigoTieneSession()) return;
  try {
    var parts = _avigoSession.token.split('.');
    if (parts.length !== 3) return;
    var payload = JSON.parse(atob(parts[1]));
    var ahora = Math.floor(Date.now() / 1000);
    var diasRestantes = (payload.exp - ahora) / 86400;
    if (diasRestantes < 30) {
      fetch(AVIGO_API + '/auth/refresh', {
        method: 'POST',
        headers: avigoHeaders()
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.token) {
          _avigoSession.token = data.token;
          try { localStorage.setItem('avigo_session', JSON.stringify(_avigoSession)); } catch(e) {}
        }
      })
      .catch(function() { /* silencioso */ });
    }
  } catch(e) { /* silencioso */ }
}

function avigoHeaders() {
  return {
    'Content-Type': 'application/json',
    'Authorization': 'Bearer ' + (_avigoSession ? _avigoSession.token : '')
  };
}

  if (!avigoTieneSession()) return;
  try {
    var cola = JSON.parse(localStorage.getItem('avigo_sync_cola') || '[]');
    if (!cola.length) return;
    var pendientes = cola.slice();
    localStorage.removeItem('avigo_sync_cola');
    pendientes.forEach(function(item) {
      if (item.tipo === 'registro' && item.granjaId) {
        fetch(AVIGO_API + '/registros/' + item.granjaId, {
          method: 'POST',
          headers: avigoHeaders(),
          body: JSON.stringify(item.data)
        }).catch(function() {
          try {
            var c2 = JSON.parse(localStorage.getItem('avigo_sync_cola') || '[]');
            c2.push(item);
            localStorage.setItem('avigo_sync_cola', JSON.stringify(c2));
          } catch(e) {}
        });
      }
    });
  } catch(e) {}
}

window.addEventListener('online', function() {
  setTimeout(avigoFlushSyncCola, 1500);
  setTimeout(function() {
    if (avigoTieneSession()) avigoSyncGranja(granja);
  }, 3000);
});

var _limitePlanAvisado = false;
function _avisarLimitePlan() {
  // El backend rechazĂł crear una granja nueva por lĂ­mite del plan.
  // Aviso una sola vez por sesiĂłn con el modal de upgrade existente.
  if (_limitePlanAvisado) return;
  _limitePlanAvisado = true;
  if (typeof mostrarBloqueoProLote === 'function') mostrarBloqueoProLote();
}

function avigoSyncGranja(granjaData) {
  if (!avigoTieneSession()) return;
  fetch(AVIGO_API + '/sync', {
    method: 'POST',
    headers: avigoHeaders(),
    body: JSON.stringify({
      lotes: granja.lotes && granja.lotes.length > 0 ? granja.lotes : [],
      loteActivo: granja.loteActivo || 0
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data && data.resultados && granja.lotes && granja.lotes.length > 0) {
      var huboCambio = false;
      data.resultados.forEach(function(res) {
        if (res && res.status === 'limite') { _avisarLimitePlan(); return; }
        if (!res || res.status !== 'ok' || !res.granjaId) return;
        granja.lotes.forEach(function(l) {
          // Match por nombre: resultados[] no es paralelo a lotes[] (el
          // backend salta lotes sin nombre) y el nombre es la llave
          // natural Ăşnica por usuario en el backend
          if (l && l.granjaData && l.granjaData.nombre === res.granja) {
            if (l.syncId !== res.granjaId || l.granjaData._backendId !== res.granjaId) {
              l.syncId = res.granjaId;
              l.granjaData._backendId = res.granjaId;
              huboCambio = true;
            }
          }
        });
      });
      if (huboCambio && typeof guardarEnStorage === 'function') guardarEnStorage();
    }
  })
  .catch(function() { /* silencioso en offline */ });
}

function avigoCargarDatos() {
  if (!avigoTieneSession()) { nav('splash'); return; }

  var yaHayDatosLocal = granja.lotes && granja.lotes.length > 0 &&
    granja.lotes[0] && granja.lotes[0].granjaData &&
    granja.lotes[0].granjaData.numAves > 0;

  if (yaHayDatosLocal) {
    nav('dash');
    setTimeout(function() {
      fetch(AVIGO_API + '/sync/status', { headers: avigoHeaders() })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.granjas === 0) avigoSyncGranja(granja);
        avigoFlushSyncCola();
      })
      .catch(function() {});
    }, 2000);
    return;
  }

  fetch(AVIGO_API + '/sync/status', { headers: avigoHeaders() })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.granjas > 0) {
      return fetch(AVIGO_API + '/sync', { headers: avigoHeaders() })
        .then(function(r) { return r.json(); })
        .then(function(syncData) {
          if (syncData && syncData.lotes && syncData.lotes.length > 0) {
            granja.lotes = syncData.lotes;
            granja.loteActivo = syncData.loteActivo || 0;
            if (syncData.notifActiva !== undefined) granja.notifActiva = syncData.notifActiva;
            if (syncData.recordatorios) granja.recordatorios = syncData.recordatorios;
            if (typeof _aplicarLote === 'function') _aplicarLote(granja.loteActivo);
            if (typeof guardarEnStorage === 'function') guardarEnStorage();
          }
          nav('dash');
        })
        .catch(function() { nav('dash'); });
    } else {
      nav('ob1');
    }
  })
  .catch(function() {
    showToast('Sin conexiĂłn â activa internet para cargar tus datos');
    nav('splash');
  });
}

window.addEventListener('message', function(event) {
  if (event.data && event.data.type === 'AVIGO_GOOGLE_TOKEN') {
    avigoLoginGoogle(event.data.credential);
  }
});

document.addEventListener('DOMContentLoaded', function() {
  // Retorno del login de Google (same-tab redirect): Google regresa a la
  // app con #id_token=... en el fragment. Se extrae, se limpia la URL y
  // se hace el login normal; la firma/audiencia la valida el backend.
  var _hashGoogle = window.location.hash || '';
  if (_hashGoogle.indexOf('id_token=') >= 0) {
    var _idToken = null;
    _hashGoogle.replace(/^#/, '').split('&').forEach(function(p) {
      if (p.indexOf('id_token=') === 0) _idToken = decodeURIComponent(p.slice(9));
    });
    try { history.replaceState(null, '', window.location.pathname + window.location.search); } catch(e) {}
    // Anti-replay: si guardamos nonce al iniciar, debe coincidir con el del token.
    try {
      var _nonceGuardado = sessionStorage.getItem('avigo_google_nonce');
      sessionStorage.removeItem('avigo_google_nonce');
      if (_idToken && _nonceGuardado) {
        var _payload = JSON.parse(atob(_idToken.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
        if (_payload.nonce && _payload.nonce !== _nonceGuardado) _idToken = null;
      }
    } catch(e) { /* si el payload no parsea, el backend rechazarĂĄ el token */ }
    if (_idToken) {
      showToast('Verificando cuenta de Google...');
      avigoLoginGoogle(_idToken);
    }
  }
  var urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('reset')) {
    _navDiferido('reset', 500);
  }
  setTimeout(avigoRenovarTokenSiNecesario, 3000);
  setTimeout(avigoRefrescarPlanInfo, 1500);
  setTimeout(function() {
    if (navigator.onLine && typeof avigoFlushSyncCola === 'function') {
      avigoFlushSyncCola();
    }
  }, 4000);
});
</script>

var _calcDashCache = null;
var _calcDashLoteActivo = -1;
var _calcDashHistLen = -1;
function calcDash(){
  var loteActual = granja.loteActivo || 0;
  var histLen = historial ? historial.length : 0;
  if (_calcDashCache && _calcDashLoteActivo === loteActual && _calcDashHistLen === histLen) {
    return _calcDashCache;
  }
  _calcDashLoteActivo = loteActual;
  _calcDashHistLen = histLen;
  var _result = _calcDashImpl();
  _calcDashCache = _result;
  return _result;
}
function _invalidarCacheCalcDash(){ _calcDashCache = null; }
function _calcDashImpl(){
  const g = granja;
  const raza  = g.raza || RAZAS[0];
  const etapa = g.etapa || ETAPAS_DATA[3];
  const aves  = (g.avesVivas>0) ? g.avesVivas : (g.numAves>0 ? g.numAves : 5000);
  const sem   = (g.semanaVida>0) ? g.semanaVida : 1;
  const precio= (g.precioKgAl>0) ? g.precioKgAl : 0;

  const gAveDia   = (g.raza && g.raza.consumo) ? g.raza.consumo : (etapa.consumo || 112);
  const kgDia     = parseFloat((aves * gAveDia / 1000).toFixed(1));
  const gastoDia  = Math.round(kgDia * precio);
  const gastoCiclo= Math.round(gastoDia * sem * 7);

  const pctPostura = (sem >= 21 && sem <= 70) ? (etapa.id==='p1'?94.2:91.5) : 0;
  const huevosDia  = Math.round(aves * pctPostura / 100);

  const aguaRangeStr = (raza && raza.ag) ? raza.ag : '200-210 ml/dĂ­a';
  const aguaMatch = aguaRangeStr.match(/(\d+)/);
  const aguaLtDia = aguaMatch ? Math.round(aves * parseInt(aguaMatch[1]) / 1000) : 0;

  const semRestantes = Math.max(0, 80 - sem);

  const diasEnPostura = (sem >= 21) ? (sem - 20) * 7 : 0;

  const etapaNom = etapa.nombre || 'Postura';
  const etapaCol = etapa.color || '#16A34A';

  return { kgDia, gastoDia, gastoCiclo, pctPostura, huevosDia,
           aguaLtDia, semRestantes, diasEnPostura, sem, aves,
           raza, etapa, etapaNom, etapaCol, precio,
           sistema: g.sistema, granjaNombre: g.nombre || 'Mi Granja',
             registradoHoy: (historial.length>0 && historial[0] && historial[0].fecha===new Date().toISOString().split('T')[0]) ? true : false,
  };
}

  var el = document.getElementById('toast');
  if(!el) return;
  el.textContent = msg;
  el.style.opacity = '1';
  el.style.transform = 'translateY(0)';
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(function(){

function pedirGPSsiNoHayCoords(){
  if(!navigator.geolocation) return;             // dispositivo sin GPS
  navigator.geolocation.getCurrentPosition(
    function(pos){
      var lat = pos.coords.latitude;
      var lon = pos.coords.longitude;
      granja.climaLat = lat;
      granja.climaLon = lon;
      guardarEnStorage();
      fetchTemperatura(lat, lon, function(temp){
        var inp = document.getElementById('inp-temp');
        if(inp && (!inp.value || inp.value == '22')){ inp.value = temp; }
        actualizarClimaEnDash(temp, null);
      });
    },
    function(){ /* usuario denegĂł â silencioso, no molestar */ },
    { timeout: 10000, enableHighAccuracy: false, maximumAge: 600000 }
  );
}

function detectarGPS(){
  const btn = document.getElementById('gps-btn');
  const msg = document.getElementById('gps-msg');
  if(!navigator.geolocation){ showToast('GPS no disponible en este dispositivo'); return; }
  if(msg){ msg.style.display='block'; msg.textContent='đ Detectando ubicaciĂłn...'; }
  if(btn){ btn.style.opacity='.6'; btn.style.pointerEvents='none'; }
  navigator.geolocation.getCurrentPosition(
    function(pos){
      var lat = pos.coords.latitude, lon = pos.coords.longitude;
      granja.climaLat = lat;
      granja.climaLon = lon;
      guardarEnStorage();
      fetchTemperatura(lat, lon, null);
      if(msg){ msg.textContent='â UbicaciĂłn detectada Âˇ '+lat.toFixed(3)+', '+lon.toFixed(3); }
      if(btn){ btn.style.opacity='1'; btn.style.pointerEvents='auto'; btn.textContent='â GPS activo'; }
      var selEstado = document.getElementById('sel-estado');
      if(selEstado && lat > 17 && lat < 22 && lon > -100 && lon < -96){
        selEstado.value = 'PUE';
        cargarMunicipios('PUE');
        setTimeout(function(){
          var selMun = document.getElementById('sel-municipio');
          if(selMun){ selMun.value=''; if(selMun.options[0]) selMun.options[0].text='-- Confirma tu municipio --'; }
        }, 100);
      }
      showToast('â UbicaciĂłn detectada correctamente');
    },
    function(err){
      if(msg){ msg.style.display='none'; }
      if(btn){ btn.style.opacity='1'; btn.style.pointerEvents='auto'; }
      var errMsgs={1:'Permiso denegado â elige manualmente',2:'GPS no disponible',3:'Tiempo agotado â elige manualmente'};
      showToast(errMsgs[err.code] || 'No se pudo obtener el GPS â elige manualmente');
    },
    { timeout: 8000, enableHighAccuracy: true }
  );
}

function cargarMunicipios(estadoId){
  var sel = document.getElementById('sel-municipio');
  var altInp = document.getElementById('inp-altitud');
  var altBadge = document.getElementById('alt-badge');
  if(!sel) return;
  var estEl = document.getElementById('sel-estado');
  if(estEl && estEl.selectedIndex >= 0){
    var opt = estEl.options[estEl.selectedIndex];
    granja.estado = opt ? opt.text : estadoId;
  }
  sel.disabled = false;
  sel.innerHTML = '<option value="">-- Selecciona tu municipio --</option>';
  var muns = getMunicipios(estadoId);
  muns.forEach(function(m){
    var opt = document.createElement('option');
    opt.value = m.alt; opt.textContent = m.n;
    sel.appendChild(opt);
  });
  if(altInp){ altInp.value=''; altInp.placeholder='Selecciona municipio primero'; }
  if(altBadge){ altBadge.style.display='none'; }
}

function setAltitud(alt, munNombre){
  var inp = document.getElementById('inp-altitud');
  var badge = document.getElementById('alt-badge');
  if(inp && alt){
    inp.value = alt;
    if(badge){ badge.style.display='flex'; }
  }
  if(munNombre && munNombre !== '-- Selecciona tu municipio --'){
    granja.municipio = munNombre;
  }
  if(alt) granja.altitud = parseInt(alt) || 0;
}

function calcPostura(val, totalAves){
  const h = parseInt(val) || 0;
  const pct = totalAves > 0 ? (h/totalAves*100).toFixed(1) : 0;
  const el = document.getElementById('daily-pct');
  if(el){ el.textContent = pct+'%'; el.style.color = pct>=90?'#16A34A':pct>=80?'#D97706':'#EF4444'; }
}
function calcMortalidad(val, totalAves){
  const b = parseInt(val) || 0;
  const pct = totalAves > 0 ? (b/totalAves*100).toFixed(2) : 0;
  const el = document.getElementById('daily-mort-pct');
  if(el){ el.textContent = pct+'%'; el.style.color = pct<0.1?'#16A34A':pct<0.3?'#D97706':'#EF4444'; }
}
function calcGAve(val, totalAves){
  const kg = parseFloat(val) || 0;
  const gAve = totalAves > 0 ? Math.round(kg*1000/totalAves) : 0;
  const disp = document.getElementById('g-ave-display');
  if(disp){ disp.textContent = gAve || 'â'; }
  const precio = granja.precioKgAl || 0;
  const costoEl = document.getElementById('costo-dia-display');
  const costoVal = document.getElementById('costo-dia-val');
  if(kg > 0 && precio > 0 && costoEl && costoVal){
    costoEl.style.display = 'block';
    costoVal.textContent = '$' + Math.round(kg*precio).toLocaleString('es-MX') + ' MXN';
  } else if(costoEl){
    costoEl.style.display = 'none';
  }
}

  if(header){ header.style.background=e.bg; header.style.borderBottomColor=e.border; }
  if(alNombre){ alNombre.textContent=e.nombre; alNombre.style.color=e.color; }
  if(alRango){ alRango.textContent='Semana '+e.min+' â '+e.max+' Âˇ '+e.sub; }

function calcAlimento(){
  const aves = parseInt(document.getElementById('ob4-aves')?.value) || 0;
  const precio = parseFloat(document.getElementById('inp-precio')?.value) || 0;
  const resultado = document.getElementById('calc-resultado');
  const resKg = document.getElementById('res-kg');
  const resCosto = document.getElementById('res-costo');
  const resMes = document.getElementById('res-mes');

  if(!currentAlimento || aves <= 0 || precio <= 0){
    if(resultado) resultado.style.display='none';
    return;
  }
  const kgDia = (aves * currentAlimento.consumo / 1000);
  const costoDia = kgDia * precio;
  const costoMes = costoDia * 30;

  if(resultado) resultado.style.display='block';
  if(resKg) resKg.textContent = kgDia.toFixed(1)+' kg';
  if(resCosto) resCosto.textContent = '$'+Math.round(costoDia).toLocaleString('es-MX');
  if(resMes) resMes.textContent = '$'+Math.round(costoMes).toLocaleString('es-MX');
}

    if(display) display.textContent = pct+'%';

}

      nombre:      granja.nombre,
      estado:      granja.estado,
      municipio:   granja.municipio,
      altitud:     granja.altitud,
      galpones:    granja.galpones,

      fInicio:     granja.fechaInicio,

      tempHoy:     granja.tempHoy || 22,
      climaLat:    granja.climaLat || null,
      climaLon:    granja.climaLon || null,
    };

    var _idxSync = granja.loteActivo || 0;
    if(granja.lotes[_idxSync]){
      granja.lotes[_idxSync].clientesJaula = (granja.clientesJaula||[]).filter(function(c){return c&&c.nombre&&c.cantidad>0;});
      granja.lotes[_idxSync].traspatio     = granja.traspatio || {};
    }

    localStorage.setItem(LS_KEY, JSON.stringify({
      v:           2,
      loteActivo:  granja.loteActivo || 0,
      notifActiva:  granja.notifActiva || false,
      notifHora:    granja.notifHora   || '07:00',
      recordatorios: granja.recordatorios || {},
      lotes:       granja.lotes.map(function(l){
        return {
          id:           l.id || Date.now(),

function _normCliente(c){
  if(!c || !c.nombre) return null;
  var q = parseInt(c.cantidad) || parseInt(c.docenas) || 0;
  var u = ['pieza','docena','cono','caja180','caja360'].indexOf(c.unidad)>=0 ? c.unidad : 'docena';
  if(q<=0) return null;
  return {nombre:String(c.nombre).trim(), unidad:u, cantidad:q};
}

function _limpiarClientesCorruptos(){
  if(granja.clientesJaula){
    granja.clientesJaula = granja.clientesJaula
      .map(_normCliente).filter(Boolean);
  }
  if(granja.traspatio && granja.traspatio.clientes){
    granja.traspatio.clientes = granja.traspatio.clientes
      .map(_normCliente).filter(Boolean);
  }
  try{ guardarEnStorage(); } catch(e){}
}

function cargarDeStorage(){
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);

    if(data.v === 2){
      granja.lotes      = data.lotes || [];
      granja.loteActivo = data.loteActivo || 0;
      if(data.notifActiva !== undefined) granja.notifActiva = data.notifActiva;
      if(data.notifHora)    granja.notifHora    = data.notifHora;
      if(data.recordatorios && Object.keys(data.recordatorios).length > 0){
        granja.recordatorios = data.recordatorios;
      }
      _aplicarLote(granja.loteActivo);
      _limpiarClientesCorruptos();
    } else {
      granja.lotes = [];
      var lote0 = {
        id:           Date.now(),
        nombre:       (data.g && data.g.nombre) || 'Lote principal',
        historial:    data.historial || [],
        alertas:      data.alertas   || [],
        vacunas:      data.vacunas   || [],
        recordatorios:data.recordatorios || {},
        granjaData:   data.g || {},
      };
      if(data.lotes && data.lotes.length > 0){
        data.lotes.forEach(function(l, li){
          if(li === 0){
            lote0.historial = l.historial || lote0.historial;
          } else {
            granja.lotes.push({
              id:           l.id || Date.now()+li,
              nombre:       l.nombre || 'Lote '+(li+1),
              historial:    l.historial || [],
              alertas:      [],
              vacunas:      JSON.parse(JSON.stringify(VAC_SCHEDULE)),
              recordatorios:{},
              granjaData: {
                razaId:    l.razaId,
                sistema:   l.sistema,
                numAves:   l.numAves,
                avesVivas: l.avesVivas,
                semVida:   l.semanaVida,
                etapaId:   l.etapaId,
                fInicio:   l.fechaInicio,
                precioKg:  l.precioKgAl,
                nombre:    l.nombre,
                precioH:   0,
              },
            });
          }
        });
      }
      granja.lotes.unshift(lote0);
      granja.loteActivo = data.loteActivo || 0;
      _aplicarLote(granja.loteActivo);
      setTimeout(guardarEnStorage, 500);
    }
    return true;
  } catch(e){ console.error('cargarDeStorage error:', e); return false; }
}

function _aplicarLote(idx){
  if(!granja.lotes || granja.lotes.length === 0) return;
  if(idx < 0) idx = 0;
  if(idx >= granja.lotes.length) idx = granja.lotes.length - 1;
  granja.loteActivo = idx;
  var l = granja.lotes[idx];
  var g = l.granjaData || {};

  granja.nombre      = l.nombre || g.nombre || 'Mi Granja';
  granja.estado      = g.estado      || '';
  granja.municipio   = g.municipio   || '';
  granja.altitud     = g.altitud     || 0;
  granja.galpones    = g.galpones    || 1;
  granja.raza        = RAZAS.find(function(r){ return r.id===g.razaId; }) || RAZAS[0];
  granja.sistema     = g.sistema     || 'jaula';
  granja.numAves     = g.numAves     || 0;
  granja.semanaVida  = g.semVida     || 0;
  granja.etapa       = ETAPAS_DATA.find(function(e){ return e.id===g.etapaId; }) || null;
  granja.fechaInicio = g.fInicio     || null;
  granja.precioKgAl  = g.precioKg    || 0;
  granja.avesVivas   = g.avesVivas   || g.numAves || 0;
  granja.precioHuevo = g.precioH     || 0;
  granja.kgBulto     = g.kgBulto     || 40;
  granja.inventarioKg= g.inventarioKg|| 0;
  granja.bultosCompra= g.bultosCompra|| 0;
  granja.tempHoy     = g.tempHoy     || 22;
  granja.climaLat    = g.climaLat    || null;
  granja.climaLon    = g.climaLon    || null;
  currentAlimento    = granja.etapa;

  historial          = (l.historial  || []).slice();
  alertas            = (l.alertas    || []).slice();
  granja.vacunas     = l.vacunas     || JSON.parse(JSON.stringify(VAC_SCHEDULE));
  if(!granja.recordatorios || Object.keys(granja.recordatorios).length === 0){
    granja.recordatorios = l.recordatorios || {};
  }
  function _fixCliente(c){
    if(!c||!c.nombre||!c.nombre.trim()) return null;
    var q = c.cantidad!==undefined ? parseInt(c.cantidad) : c.docenas!==undefined ? parseInt(c.docenas) : -1;
    if(isNaN(q)||q<=0) return null;
    var u = ['pieza','docena','cono','caja180','caja360'].indexOf(c.unidad)>=0 ? c.unidad : 'docena';
    return {nombre:c.nombre.trim(), unidad:u, cantidad:q};
  }
  var rawCJ = l.clientesJaula || (l.granjaData && l.granjaData.clientesJaula) || [];
  granja.clientesJaula = rawCJ.map(_fixCliente).filter(Boolean);
  var rawTP = l.traspatio || (l.granjaData && l.granjaData.traspatio) || {};
  if(rawTP.clientes) rawTP.clientes = rawTP.clientes.map(_fixCliente).filter(Boolean);
  granja.traspatio = rawTP;
  granja.registradoHoy = historial.length>0 && historial[0] &&
    historial[0].fecha === new Date().toISOString().split('T')[0];
}


function agregarAlHistorial(h, b, kg){
  const d    = calcDash();
  const hoy  = new Date().toISOString().split('T')[0];
  historial  = historial.filter(r=>r.fecha !== hoy);
  const pPost  = d.aves>0 && h>0 ? parseFloat((h/d.aves*100).toFixed(2)) : 0;
  const pMort  = d.aves>0 && b>0 ? parseFloat((b/d.aves*100).toFixed(3)) : 0;
  const gasto  = parseFloat((kg*(granja.precioKgAl||0)).toFixed(2));
  const ingreso= granja.precioHuevo>0 ? parseFloat((h*granja.precioHuevo).toFixed(2)) : 0;
  historial.unshift({fecha:hoy, huevos:h, bajas:b, kg, pctPostura:pPost, mortalidad:pMort, gastoDia:gasto, ingresoDia:ingreso});
  if(historial.length>90) historial = historial.slice(0,90);
  chkAlertas(pPost, pMort);
}

function updPrecio(tipo, val){
  var v = parseFloat(val) || 0;
  var pieza = tipo==='p' ? v : tipo==='d' ? v/12 : tipo==='k' ? v/16 : tipo==='c' ? v/360 : 0;
  if(pieza > 0){
    granja.precioHuevo = pieza;
    guardarEnStorage();
    var pp = document.getElementById('pr-pieza');
    var pd = document.getElementById('pr-doc');
    var pk = document.getElementById('pr-kg');
    var pc = document.getElementById('pr-caja');
    if(pp && tipo!=='p') pp.value = pieza.toFixed(2);
    if(pd && tipo!=='d') pd.value = (pieza*12).toFixed(1);
    if(pk && tipo!=='k') pk.value = (pieza*16).toFixed(1);
    if(pc && tipo!=='c') pc.value = Math.round(pieza*360);
    var d = calcDash();
    var ingDia = Math.round(d.huevosDia * pieza);
    var ganDia = ingDia - d.gastoDia;
    var margen = ingDia>0 ? ((ganDia/ingDia)*100).toFixed(1) : 0;
    var cg = function(n){ return n>=0?'#16A34A':'#EF4444'; };
    var bg = function(n){ return n>=0?'#F0FDF4':'#FEF2F2'; };
    var ri = document.getElementById('r-ing');
    var rg = document.getElementById('r-gan');
    var rb = document.getElementById('r-gan-box');
    var rm = document.getElementById('r-margen');
    if(ri) ri.textContent = '$'+Math.round(ingDia).toLocaleString('es-MX');
    if(rg){ rg.textContent = (ganDia>=0?'+':'')+Math.round(ganDia).toLocaleString('es-MX'); rg.style.color=cg(ganDia); }
    if(rb) rb.style.background = bg(ganDia);
    if(rm){ rm.textContent = 'Margen neto: '+margen+'%'; rm.style.color = cg(ganDia); }
  }
}

function activarNotificacionesPush() {
  var esNativo = (typeof window.AVIGO_NATIVE !== 'undefined' && window.AVIGO_NATIVE);

  if (esNativo) {
    if (typeof window.ReactNativeWebView !== 'undefined') {
      showToast('Activando notificaciones...');
      window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'REGISTER_PUSH' }));
      var _attempts = 0;
      var _timer = setInterval(function() {
        _attempts++;
        if (window.AVIGO_PUSH_TOKEN) {
          clearInterval(_timer);
          showToast('Notificaciones activadas');
          _recargarBannerPush();
        } else if (_attempts >= 60) {
          clearInterval(_timer);
          showToast('Ve a Ajustes > AviGo > Notificaciones y activalas');
        }
      }, 300);
    } else {
      showToast('Error: ReactNativeWebView no disponible');
    }
    return;
  }

  if (!('Notification' in window)) {
    showToast('Tu navegador no soporta notificaciones');
    return;
  }
  Notification.requestPermission().then(function(permiso) {
    if (permiso === 'granted') {
      suscribirPush(function(ok, err) {
        if (ok) {
          _recargarBannerPush();
        } else {
          showToast('Error al activar: ' + (err || 'desconocido'));
        }
      });
    } else if (permiso === 'denied') {
      showToast('Permiso denegado. Activalo desde Configuracion del navegador');
    }
  });
}

function avigoResetPassword() {
  var pass  = (document.getElementById('reset-pass')  || {}).value || '';
  var pass2 = (document.getElementById('reset-pass2') || {}).value || '';
  var msgEl = document.getElementById('reset-msg');
  var btn   = document.getElementById('reset-btn');

  if (pass.length < 6) {
    if (msgEl) { msgEl.style.display='block'; msgEl.style.background='#FEF2F2'; msgEl.style.color='#DC2626'; msgEl.textContent='La contrasena debe tener minimo 6 caracteres'; }
    return;
  }
  if (pass !== pass2) {
    if (msgEl) { msgEl.style.display='block'; msgEl.style.background='#FEF2F2'; msgEl.style.color='#DC2626'; msgEl.textContent='Las contrasenas no coinciden'; }
    return;
  }

  var urlParams = new URLSearchParams(window.location.search);
  var token = urlParams.get('reset');
  if (!token) {
    if (msgEl) { msgEl.style.display='block'; msgEl.style.background='#FEF2F2'; msgEl.style.color='#DC2626'; msgEl.textContent='Enlace invalido. Solicita uno nuevo.'; }
    return;
  }

  if (btn) { btn.disabled=true; btn.textContent='Guardando...'; }
  if (msgEl) msgEl.style.display='none';

  fetch(AVIGO_API + '/auth/reset-password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token: token, password: pass })
  })
  .then(function(r) { return r.json().then(function(d){ return { ok: r.ok, data: d }; }); })
  .then(function(res) {
    if (btn) { btn.disabled=false; btn.textContent='Guardar nueva contrasena'; }
    if (res.ok) {
      if (msgEl) { msgEl.style.display='block'; msgEl.style.background='#F0FDF4'; msgEl.style.color='#166534'; msgEl.textContent='Contrasena actualizada. Ahora puedes iniciar sesion.'; }
      setTimeout(function() {
        history.replaceState({}, document.title, window.location.pathname);
        nav('login');
      }, 2000);
    } else {
      if (msgEl) { msgEl.style.display='block'; msgEl.style.background='#FEF2F2'; msgEl.style.color='#DC2626'; msgEl.textContent = res.data.error || 'Error al actualizar contrasena'; }
    }
  })
  .catch(function() {
    if (btn) { btn.disabled=false; btn.textContent='Guardar nueva contrasena'; }
    if (msgEl) { msgEl.style.display='block'; msgEl.style.background='#FEF2F2'; msgEl.style.color='#DC2626'; msgEl.textContent='Sin conexion. Verifica tu internet.'; }
  });
}

function avigoRegistrarEmail() {
  var nombre = (document.getElementById('reg-nombre') || {}).value || '';
  var email  = (document.getElementById('reg-email')  || {}).value || '';
  var tel    = (document.getElementById('reg-tel')    || {}).value || '';
  var pass   = (document.getElementById('reg-pass')   || {}).value || '';
  var pass2  = (document.getElementById('reg-pass2')  || {}).value || '';
  var terms  = document.getElementById('terms-check');
  var errEl  = document.getElementById('reg-error');
  var btn    = document.getElementById('reg-btn');

  nombre = nombre.trim();
  email  = email.trim();

  if (!nombre || !email || !pass) {
    if (errEl) { errEl.style.display='block'; errEl.textContent='Nombre, correo y contrasena son obligatorios'; }
    return;
  }
  if (pass.length < 6) {
    if (errEl) { errEl.style.display='block'; errEl.textContent='La contrasena debe tener minimo 6 caracteres'; }
    return;
  }
  if (pass !== pass2) {
    if (errEl) { errEl.style.display='block'; errEl.textContent='Las contrasenas no coinciden'; }
    return;
  }
  if (terms && !terms.checked) {
    if (errEl) { errEl.style.display='block'; errEl.textContent='Debes aceptar los terminos de uso'; }
    return;
  }

  if (btn) { btn.disabled=true; btn.textContent='Creando cuenta...'; }
  if (errEl) errEl.style.display='none';

  fetch(AVIGO_API + '/auth/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ nombre: nombre, email: email, telefono: tel || null, password: pass })
  })
  .then(function(r) { return r.json().then(function(d){ return { ok: r.ok, data: d }; }); })
  .then(function(res) {
    if (btn) { btn.disabled=false; btn.textContent='Crear mi cuenta'; }
    if (res.ok && res.data.token) {
      _avigoSession = { token: res.data.token, usuario: res.data.usuario };
      try { localStorage.setItem('avigo_session', JSON.stringify(_avigoSession)); } catch(e) {}
      showToast('Cuenta creada! Bienvenido, ' + (res.data.usuario.nombre || email) + '!');
      nav('ob1'); // Nuevo usuario siempre al onboarding
    } else {
      if (errEl) { errEl.style.display='block'; errEl.textContent = res.data.error || 'Error al crear la cuenta'; }
    }
  })
  .catch(function() {
    if (btn) { btn.disabled=false; btn.textContent='Crear mi cuenta'; }
    if (errEl) { errEl.style.display='block'; errEl.textContent='Sin conexion. Verifica tu internet.'; }
  });
}

function avigoIniciarGoogle() {
  var esNativo = (typeof window.AVIGO_NATIVE !== 'undefined' && window.AVIGO_NATIVE)
    || (typeof window.ReactNativeWebView !== 'undefined');

  var nonce = Math.random().toString(36).slice(2);

  if (esNativo) {
    showToast('Abriendo cuenta de Google...');
    window.ReactNativeWebView.postMessage(JSON.stringify({
      type:   'GOOGLE_LOGIN',
      nonce:  nonce,
      client: GOOGLE_CLIENT_ID
    }));
    function _onGoogleDone() {
      window.removeEventListener('avigo_google_done', _onGoogleDone);
      var token = window.AVIGO_GOOGLE_CREDENTIAL;
      window.AVIGO_GOOGLE_CREDENTIAL = null;
      if (token) {
        avigoLoginGoogle(token);
      } else {
        showToast('Inicio con Google cancelado');
      }
    }
    window.addEventListener('avigo_google_done', _onGoogleDone);
    return;
  }

  // Web (incluida la TWA): redirect en la MISMA pestaĂąa. El popup anterior
  // morĂ­a en oauth-callback.html sin entregar jamĂĄs el token al opener, y
  // en TWA los popups ni siquiera conservan la relaciĂłn con la app.
  // Google regresa a la app misma con #id_token en el fragment; el arranque
  // lo detecta y hace login. El redirect_uri debe estar registrado en la
  // consola de Google (con barra final incluida).
  try { sessionStorage.setItem('avigo_google_nonce', nonce); } catch(e) {}
  var redirectUri = encodeURIComponent(window.location.origin + window.location.pathname);
  var url = 'https://accounts.google.com/o/oauth2/v2/auth'
    + '?client_id=' + GOOGLE_CLIENT_ID
    + '&redirect_uri=' + redirectUri
    + '&response_type=id_token'
    + '&scope=openid%20email%20profile'
    + '&nonce=' + nonce
    + '&prompt=select_account';
  window.location.assign(url);
}

function calcAguaAjustada(avesVivas, raza, tempAmbiente){
  var aguaBase = avesVivas * (parseInt((raza&&raza.ag?raza.ag:'200').match(/\d+/)[0])||200);
  var temp     = parseFloat(tempAmbiente)||22;
  var factor   = temp>20 ? 1 + (temp-20)*0.05 : 1;
  return Math.round(aguaBase * factor / 1000); // litros
}

function marcarVacuna(idx){

function programarNotificacion(){
  if(!granja.notifActiva || Notification.permission!=='granted') return;

  var urgente = generarMensajeInteligente();
  if(urgente && urgente.p >= 8){
    enviarNotif(urgente.titulo, urgente.body, urgente.tag);
  }

  var partes   = (granja.notifHora||'07:00').split(':');
  var ahora    = new Date();
  var objetivo = new Date();
  objetivo.setHours(parseInt(partes[0])||7, parseInt(partes[1])||0, 0, 0);
  var diff = objetivo - ahora;
  if(diff < 0) diff += 86400000;

  setTimeout(function(){
    if(Notification.permission==='granted' && granja.notifActiva){
      var msg = generarMensajeInteligente();
      if(msg){
        enviarNotif(msg.titulo, msg.body, msg.tag);
      } else {
        enviarNotif('AviGo â Buenos dĂ­as đ', 'Empieza el dĂ­a registrando '+granja.nombre+'. Toca para abrir la app.', 'buenos-dias');
      }
    }
    var tarde = new Date();
    tarde.setHours(17, 0, 0, 0);
    var diffTarde = tarde - new Date();
    if(diffTarde > 0){
      setTimeout(function(){
        if(Notification.permission==='granted' && granja.notifActiva){
          var hoyStr = new Date().toISOString().split('T')[0];
          var yaReg  = historial.length>0 && historial[0].fecha===hoyStr;
          if(!yaReg){
            enviarNotif('đ AĂşn no registraste hoy â '+granja.nombre, 'Son las 5pm. Registra postura, mortalidad y alimento antes de que termine el dĂ­a.', 'recordatorio-tarde');
          }
        }
      }, diffTarde);
    }
    if(granja.notifActiva) programarNotificacion();
  }, Math.min(diff, 86400000));
}

function calcAguaPorTemp(aves, raza, tempC){
  var t    = parseFloat(tempC) || 22;
  var base = parseInt(((raza && raza.ag) ? raza.ag : '200').match(/\d+/)[0]) || 200;
  var factor, aguaRazon;
  if(t < 12)      { factor = 0.70; aguaRazon = 'FrĂ­o extremo â aves rechazan agua muy frĂ­a'; }
  else if(t < 18) { factor = 0.85; aguaRazon = 'Temperatura baja â menor consumo de agua'; }
  else if(t < 25) { factor = 1.00; aguaRazon = 'Temperatura ideal â consumo normal'; }
  else if(t < 28) { factor = 1.15; aguaRazon = 'Temperatura alta â mayor necesidad de agua'; }
  else if(t < 31) { factor = 1.30; aguaRazon = 'Calor elevado â aumenta frecuencia de llenado'; }
  else if(t < 34) { factor = 1.55; aguaRazon = 'Calor alto â riesgo de deshidrataciĂłn'; }
  else if(t < 36) { factor = 1.80; aguaRazon = 'Calor extremo â bebederos siempre llenos'; }
  else            { factor = 2.00; aguaRazon = 'CRĂTICO â doble de agua, ventila de inmediato'; }
  var mlAve  = Math.round(base * factor);
  var litros = Math.round(aves * mlAve / 1000);
  var nivel  = t >= 35 ? 'critico' : t >= 28 ? 'alto' : t >= 18 ? 'normal' : 'bajo';
  var factorAl, alRazon, alIcono;
  if(t < 12)      { factorAl = 1.08; alRazon = 'FrĂ­o extremo â las gallinas gastan mĂĄs energĂ­a en calentarse. Dale 8% mĂĄs de alimento para compensar.'; alIcono = 'âď¸'; }
  else if(t < 18) { factorAl = 1.04; alRazon = 'Temperatura frĂ­a â consume mĂĄs alimento para mantener el calor corporal. Se sugiere 4% extra.'; alIcono = 'đ¤ď¸'; }
  else if(t < 25) { factorAl = 1.00; alRazon = 'Temperatura ideal (18-24Â°C) â consumo de alimento normal segĂşn tu raza.'; alIcono = 'â'; }
  else if(t < 28) { factorAl = 0.97; alRazon = 'Temperatura algo elevada â las gallinas reducen ligeramente el alimento. -3% del normal.'; alIcono = 'â ď¸'; }
  else if(t < 31) { factorAl = 0.93; alRazon = 'Calor moderado â menor apetito. Se recomienda dar 7% menos para evitar desperdicio.'; alIcono = 'âď¸'; }
  else if(t < 34) { factorAl = 0.88; alRazon = 'Calor alto â las gallinas comen poco. Da 12% menos. Prioriza agua fresca sobre alimento.'; alIcono = 'đĽ'; }
  else            { factorAl = 0.82; alRazon = 'CALOR CRĂTICO â come muy poco. Reduce 18%. La prioridad es agua frĂ­a y ventilaciĂłn urgente.'; alIcono = 'đ¨'; }
  return { mlAve: mlAve, litros: litros, factor: factor, nivel: nivel, temp: t,
           aguaRazon: aguaRazon, factorAl: factorAl, alRazon: alRazon, alIcono: alIcono };
}

screens.tendencia = function(){

  var d    = calcDash();
  var raza = granja.raza || RAZAS[0];

  function pctEstandar(sem){
    if(sem < 18) return 0;
    if(sem === 18) return 30;
    if(sem === 19) return 60;
    if(sem === 20) return 82;
    if(sem <= 25)  return 90 + (sem-20)*0.8;
    if(sem <= 45)  return 94;
    if(sem <= 55)  return 94 - (sem-45)*0.3;
    if(sem <= 65)  return 91 - (sem-55)*0.4;
    if(sem <= 75)  return 87 - (sem-65)*0.5;
    return 82 - (sem-75)*1.0;
  }

  var histSem = granja.histSemanal || [];

      if(!mapaSem[sem]) mapaSem[sem] = {total:0,cnt:0};
      mapaSem[sem].total += r.pctPostura;
      mapaSem[sem].cnt++;
    });
    Object.keys(mapaSem).forEach(function(s){
      histSem.push({sem:parseInt(s), pct: parseFloat((mapaSem[s].total/mapaSem[s].cnt).toFixed(1))});
    });
  }

  var semInicio = 18;
  var semFin    = Math.max(semActual + 6, 35);
  var semTotal  = semFin - semInicio + 1;

  var maxPct = 100, minPct = 60;
  var w_bar  = Math.floor(260 / semTotal); // ancho de cada columna en px

function calcPosturaTraspatio(){
  var nido  = parseInt(document.getElementById('inp-huevos').value)||0;
  var suelo = parseInt(document.getElementById('inp-huevos-suelo')?.value)||0;
  var total = nido + suelo;
  var aves  = calcDash().aves;
  var pct   = aves>0 ? Math.round(total/aves*1000)/10 : 0;
  var el    = document.getElementById('daily-pct');
  if(el) el.textContent = pct+'%';
  var col   = pct>=75?'#16A34A':pct>=60?'#D97706':'#EF4444';
  if(el) el.style.color = col;
}

function guardarRegistroTraspatio(){

  var fuentes = ['balanceado','alfalfa','forraje','maiz','desperdicios','insectos','pasto'];

  fuentes.forEach(function(f){

  var huevosSuelo = parseInt(document.getElementById('inp-huevos-suelo')?.value)||0;
  var totalHuevos = huevosNido + huevosSuelo;
  var bajas       = parseInt(document.getElementById('inp-bajas')?.value)||0;
  var temp        = parseFloat(document.getElementById('inp-temp')?.value)||22;
  var zona        = document.getElementById('inp-zona')?.value||'A';
  var pasto       = document.getElementById('inp-pasto')?.value||'bueno';

  var autoconsumo = parseInt(document.getElementById('inp-autoconsumo')?.value)||0;
  var causaBaja   = document.getElementById('inp-causa-baja')?.value||'';
  var aguaFuente  = document.getElementById('inp-agua-fuente')?.value||'suministrada';
  var obs         = document.getElementById('inp-obs')?.value||'';

  var tp0b = _getTraspatio();
  var precios = {
    balanceado:  granja.precioKgAl   || 7,
    alfalfa:     tp0b.precioAlfalfa  || 4,
    maiz:        tp0b.precioMaiz     || 5.5,
    forraje:     0.8,   // producciĂłn propia, muy barato
    desperdicios:0,     // gratis
    insectos:    0,     // gratis
    pasto:       0,     // libre acceso gratis
  };
  var desglose = {};
  var gasto = 0;
  Object.keys(alimentos).forEach(function(f){
    var kg = parseFloat(alimentos[f])||0;
    if(kg>0 && precios[f]!==undefined){
      var costo = Math.round(kg * precios[f]);
      desglose[f] = {kg:kg, precio:precios[f], costo:costo};
      gasto += costo;
    }
  });
  var kgBal = parseFloat(alimentos['balanceado']||0);
  var d2 = calcDash();
  var costoSiBalanceado = Math.round(d2.kgDia * (granja.precioKgAl||7));
  var ahorroAlimentacion = Math.max(0, costoSiBalanceado - gasto);
  var hoyTemp = new Date().toISOString().split('T')[0];
  var tp0 = _getTraspatio();
  var ventasReales = (tp0.historialVentas||[]).filter(function(v){return v.fecha===hoyTemp;});
  var ingresoVentas = ventasReales.reduce(function(s,v){return s+(v.ingreso||0);},0);
  var ingreso = ingresoVentas > 0 ? ingresoVentas : Math.round(totalHuevos * (granja.precioHuevo||3.5));
  var pct   = d.aves>0 ? Math.round(totalHuevos/d.aves*1000)/10 : 0;
  var mort  = d.aves>0 ? Math.round(bajas/d.aves*10000)/100 : 0;

  var hoy = new Date().toISOString().split('T')[0];
  var registro = {
    fecha:      hoy,
    huevos:     totalHuevos,
    huevosNido: huevosNido,
    huevosSuelo:huevosSuelo,
    bajas:      bajas,
    causaBaja:  causaBaja,
    kg:         kgBal,
    alimentos:  alimentos,
    pctPostura: pct,
    mortalidad: mort,
    gastoDia:       gasto,
    gastoDesglose:  desglose,
    costoSiBalanceado: costoSiBalanceado,
    ahorroAlimentacion: ahorroAlimentacion,
    ingresoDia:     ingreso,
    temp:       temp,
    zona:       zona,
    pasto:      pasto,
    comportamiento: comportamiento,
    plumaje:    plumaje,
    vendidos:   vendidos,
    autoconsumo:autoconsumo,
    aguaFuente: aguaFuente,
    obs:        obs,
    sistema:    'pastoreo',
  };

  if(historial.length>0 && historial[0].fecha===hoy){
    historial[0] = registro;
  } else {
    historial.unshift(registro);
  }

  granja.avesVivas   = Math.max(0, d.aves - bajas);
  granja.tempHoy     = temp;
  granja.zonaActual  = zona;
  granja.aguaFuenteTraspatio = aguaFuente;
  granja.alimentosTraspatio  = alimentos;
  granja.registradoHoy = true;

  guardarEnStorage();
  var btnTp = document.querySelector('button[onclick="guardarRegistroTraspatio()"]');
  if(btnTp){
    btnTp.textContent = 'â Guardado';
    btnTp.style.background = '#15803D';
    btnTp.disabled = true;
  }
  showToast('â Registro guardado correctamente');
  _navDiferido('dash', 1000);
}

function getBioHoy(){
  var hoy = new Date().toISOString().split('T')[0];
  if(!granja.bioHistorial) granja.bioHistorial = {};
  if(!granja.bioHistorial[hoy]){
    granja.bioHistorial[hoy] = {
      fecha: hoy,
      items: BIO_ITEMS_FULL.map(function(b){ return Object.assign({}, b, {done:false}); }),
      pct: 0,
      obs: '',
    };
  }
  return granja.bioHistorial[hoy];
}

function calcPctBio(items){
  var alta = items.filter(function(i){ return i.prioridad==='alta'; });
  var doneAlta = alta.filter(function(i){ return i.done; }).length;
  var doneAll  = items.filter(function(i){ return i.done; }).length;
  var pctAlta  = alta.length > 0 ? doneAlta/alta.length*70 : 70;
  var resto    = items.length - alta.length;
  var doneRest = doneAll - doneAlta;
  var pctRest  = resto > 0 ? doneRest/resto*30 : 30;
  return Math.round(pctAlta + pctRest);
}

function toggleBioNuevo(itemId){

        granja.lotes      = data.lotes;

        var idx = granja.loteActivo;
        if(idx>=granja.lotes.length) idx=0;

        granja.nombre        = l.nombre        || g.nombre       || 'Mi Granja';
        granja.estado        = g.estado        || '';

        function fixC(c){

        var rawTP = l.traspatio || g.traspatio || {};
        if(rawTP.clientes) rawTP.clientes = rawTP.clientes.map(fixC).filter(Boolean);
        granja.traspatio     = rawTP;
        granja.loteActivo    = idx;
        granja.registradoHoy = historial.length>0 && historial[0] &&
          historial[0].fecha===new Date().toISOString().split('T')[0];
        return true;
      }
      if(!data.g) return false;

      granja.nombre       = g.nombre      || 'Mi Granja';
      granja.estado       = g.estado      || '';
      granja.municipio    = g.municipio   || '';
      granja.altitud      = g.altitud     || 0;
      granja.galpones     = g.galpones    || 1;
      granja.raza         = RAZAS.find(function(r){ return r.id===g.razaId; }) || RAZAS[0];
      granja.sistema      = g.sistema     || 'jaula';
      granja.numAves      = g.numAves     || 0;
      granja.semanaVida   = g.semVida     || 0;
      granja.etapa        = ETAPAS_DATA.find(function(e){ return e.id===g.etapaId; }) || null;
      granja.fechaInicio  = g.fInicio     || null;
      granja.precioKgAl   = g.precioKg    || 0;
      granja.avesVivas    = g.avesVivas   || g.numAves || 0;
      granja.precioHuevo  = g.precioH     || 0;
      granja.kgBulto        = g.kgBulto    || 40;
      granja.frecuenciaCompra=g.frecCompra  || 'semanal';
      granja.inventarioKg = g.invKg       || 0;
      granja.tempHoy      = g.tempHoy     || 22;
      granja.notifActiva  = g.notifActiva || false;
      granja.notifHora    = g.notifHora   || '07:00';
      currentAlimento     = granja.etapa;
      if(data.historial)    historial            = data.historial;
      if(data.alertas)      alertas              = data.alertas;
      if(data.vacunas)      granja.vacunas       = data.vacunas;
      if(data.lotes)        granja.lotes         = data.lotes;
      if(data.loteActivo !== undefined) granja.loteActivo = data.loteActivo;
      if(data.histSemanal)  granja.histSemanal   = data.histSemanal;
      if(data.bioHistorial) granja.bioHistorial  = data.bioHistorial;
      return true;
    } catch(e){ return false; }

    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + _avigoSession.token },

  .then(function(r) { return r.json(); })

      if (typeof window.ReactNativeWebView !== 'undefined') {

// vuelve sin sesiĂłn), el pago queda sin verificar y no hay forma de recuperarlo.
function _limpiarSenalPago() {
  try {
    if (window.location.search.indexOf('pago=') >= 0) {
      window.history.replaceState({}, '', window.location.pathname);
    }
  } catch(e) {}

// reintentos: cuĂĄntas veces volver a preguntar si el webhook de Stripe todavĂ­a
// no aterrizĂł. Solo el retorno del checkout los pide; el resto llama sin ellos.
function verificarPago(reintentos) {
  if (!avigoTieneSession()) return;
  var eraPro = esPro();
  var quedan = (typeof reintentos === 'number') ? reintentos : 0;
  avigoRefrescarPlanInfo(function(info) {
    if (info && info.plan === 'pro' && !info.enTrial) {
      _limpiarSenalPago();
      _cerrarUpgradeOverlay();   // si el arranque alcanzĂł a pintar el lock, quitarlo
      if (!eraPro) _mostrarBienvenidaPro();
      return;
    }
    if (quedan > 0) {
      setTimeout(function() { verificarPago(quedan - 1); }, 2500);
      return;
    }
    // Se agotaron los intentos y venĂ­amos de un checkout: no dejar la seĂąal
    // pegada para siempre, pero avisar en vez de fallar en silencio.
    if (_haySenalPago()) {
      _limpiarSenalPago();
      showToast('Tu pago sigue procesĂĄndose. Si no ves Pro en unos minutos, escrĂ­benos.');
    }
  });
}

// âââ NAVEGACIĂN DIFERIDA âââââââââââââââââââââââââââââââââââââ
// Varios flujos muestran "â Guardado" y navegan un segundo despuĂŠs. La navBar
// sigue viva durante esa espera: si el usuario toca otra pantalla, el timer
// pendiente lo arrancaba de donde acababa de entrar ("la app se sale de lo que
// estaba"). nav() cancela el diferido pendiente al entrar, asĂ­ que gana
// siempre lo Ăşltimo que tocĂł el usuario.
var _navTimerDiferido = null;
function _navDiferido(name, ms){
  clearTimeout(_navTimerDiferido);
  _navTimerDiferido = setTimeout(function(){
    _navTimerDiferido = null;
    nav(name);
  }, ms);
}

(function(){
  var _navOrig = nav;
  var _navTimerRender = null;
  nav = function(name){
    // Cancelar la navegaciĂłn diferida pendiente: manda el usuario.
    clearTimeout(_navTimerDiferido);
    _navTimerDiferido = null;
    // Cancelar un render en vuelo: dos nav() dentro de la ventana de 80ms
    // pintaban las dos pantallas (flash) y corrĂ­an afterRender de la primera
    // contra el DOM de la segunda, dejando sus handlers sin conectar.
    clearTimeout(_navTimerRender);
    var rutasProtegidas = ['dash','daily','historial','ia','tendencia','renta','bio','vac','perfil','planes','nuevo_lote',
      'parvada','alimentacion_natural','salud_natural','economia_traspatio','clientes_traspatio','ventas_traspatio','clientes_jaula'];
    if(rutasProtegidas.indexOf(name) >= 0 && !avigoTieneSession()){
      name = 'splash';
    }
    var fn = screens[name];
    if(!fn){ console.warn('nav: pantalla no encontrada:', name); return; }
    var sc = document.getElementById('screen');
    if(!sc) return;

    var fromIdx = NAV_ORDER.indexOf(_lastScreen);
    var toIdx   = NAV_ORDER.indexOf(name);
    var animClass = 'screen-enter';
    if(name === _lastScreen){
      animClass = 'screen-fade';
    } else if(name === 'dash' || name === 'splash' || name === 'login'){
      animClass = 'screen-fade';
    } else if(toIdx > fromIdx){
      animClass = 'screen-enter';
    } else if(toIdx < fromIdx){
      animClass = 'screen-enter-left';
    } else {
      animClass = 'screen-pop';
    }

    sc.style.opacity = '0';
    sc.style.transition = 'opacity .08s ease';

    _navTimerRender = setTimeout(function(){
      _navTimerRender = null;
      sc.innerHTML   = fn();
      sc.className   = 'screen ' + animClass;
      sc.style.opacity = '';
      sc.style.transition = '';
      _lastScreen = name;
      _inyectarBannerBorrado(sc, name);
      if(afterRender && afterRender[name]) afterRender[name]();
      if(name === 'perfil'){ setTimeout(bindRecordatorios, 200); setTimeout(bindLotes, 200); }
      if(name === 'daily' && granja.sistema === 'pastoreo') setTimeout(_bindFuentesTraspatio, 100);
    }, 80);
  };
})();

  }

  if(d.sem >= 21 && d.pctPostura > 0 && d.pctPostura < 88){

      return /^[â˘\-\*\d]|^[\u{1F300}-\u{1FFFF}]|^[A-Z]{2,}:/u.test(l.trim()) || l.trim() === '';
    });

    if(esLista){
      var items = lineas.filter(function(l){ return l.trim(); }).map(function(linea){
        var l = linea.trim();

        var esSeccion = /^[A-ZĂĂĂĂĂ\u{1F300}-\u{1FFFF}].{2,}:/u.test(l) && !l.startsWith('â˘');
        var esTitulo  = /^\d+\./.test(l);

        if(esSeccion){
          var partes = l.split(':');
          var titulo = partes[0].trim();
          var resto  = partes.slice(1).join(':').trim();
          return '<div style="margin-bottom:6px">'
            +'<span style="font-size:11px;font-weight:800;color:#16A34A;display:block;margin-bottom:2px">'+titulo+(resto?':':'')+'</span>'
            +(resto?'<span style="color:#374151">'+resto+'</span>':'')
            +'</div>';
        } else if(esTitulo){
          var num = l.match(/^(\d+)\.\s*/)[1];
          var contenido = l.replace(/^\d+\.\s*/, '');
          return '<div style="display:flex;gap:8px;margin-bottom:5px;align-items:flex-start">'
            +'<span style="min-width:18px;height:18px;background:#16A34A;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:#fff;flex-shrink:0;margin-top:1px">'+num+'</span>'
            +'<span style="flex:1;color:#374151">'+formatInline(contenido)+'</span>'
            +'</div>';
        } else {
          var contenido2 = l.replace(/^[â˘\-\*]\s*/, '');
          var emojiMatch = contenido2.match(/^([\u{1F300}-\u{1FFFF}\u{2600}-\u{27BF}][\uFE0F\u20E3]?\s)/u);
          var emoji = emojiMatch ? emojiMatch[1].trim() : 'â˘';
          var texto2  = emojiMatch ? contenido2.slice(emojiMatch[0].length) : contenido2;
          return '<div style="display:flex;gap:7px;margin-bottom:5px;align-items:flex-start">'
            +'<span style="font-size:12px;flex-shrink:0;margin-top:1px">'+emoji+'</span>'
            +'<span style="flex:1;color:#374151">'+formatInline(texto2)+'</span>'
            +'</div>';
        }
      });
      return '<div style="margin-bottom:8px">'+items.join('')+'</div>';
    }

    var textoParrafo = lineas.join(' ');

    var secMatch = textoParrafo.match(/^([\u{1F300}-\u{1FFFF}\u{2600}-\u{27BF}\u{26A0}\u{2705}\u{274C}][\uFE0F\u20E3]?\s[A-ZĂĂĂĂĂ][^:]+:)/u);
    if(secMatch){
      var titulo2 = secMatch[1];
      var resto2  = textoParrafo.slice(titulo2.length).trim();
      return '<div style="margin-bottom:8px">'
        +'<div style="font-size:11px;font-weight:800;color:#16A34A;margin-bottom:3px">'+titulo2+'</div>'
        +(resto2?'<div style="color:#374151">'+formatInline(resto2)+'</div>':'')
        +'</div>';
    }

    return '<div style="margin-bottom:8px;color:#374151">'+formatInline(textoParrafo)+'</div>';
  }).join('');

  return html;
}

function formatInline(texto){
  if(!texto) return '';
  return texto
    .replace(/\b(URGENTE|ALERTA|IMPORTANTE|NOTA|OJO|NUNCA|SIEMPRE|HOY MISMO)\b/g,
      '<strong style="color:#DC2626;font-weight:800">$1</strong>')
    .replace(/\b(Newcastle|Marek|Gumboro|Coccidiosis|Salmonela|Coriza|Micoplasmosis|Bronquitis)\b/g,
      '<em style="font-weight:700;color:#7C3AED">$1</em>');
}

function obtenerTemperaturaAuto(callback){
  var ahora = Date.now();
  var cacheValido = _climaCache.temp !== null && 
                    _climaCache.ts && 
                    (ahora - _climaCache.ts) < 30 * 60 * 1000;
  if(cacheValido){
    if(callback) callback(_climaCache.temp, _climaCache.lat, _climaCache.lon);
    return;
  }

  if(navigator.geolocation){

    fetchTemperatura(lat, lon, callback);
  }
}

function fetchTemperatura(lat, lon, callback){
  var url = 'https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon
    +'&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code'
    +'&timezone=auto&forecast_days=1';

  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data && data.current && data.current.temperature_2m !== undefined){
        var temp = Math.round(data.current.temperature_2m * 10) / 10;
        var hoy  = new Date().toISOString().split('T')[0];
        _climaCache = { temp: temp, fecha: hoy, lat: lat, lon: lon, ts: Date.now() };
        granja.tempHoy = temp;
        granja.climaLat = lat;
        granja.climaLon = lon;
        guardarEnStorage();
        if(callback) callback(temp, lat, lon);
        actualizarClimaEnDash(temp, data.current.weather_code);
      }
    })
    .catch(function(){
      if(granja.tempHoy){
        if(callback) callback(granja.tempHoy, lat, lon);
        actualizarClimaEnDash(granja.tempHoy, undefined);
      }
    });
}

function backupDatos(){

    if(granja.lotes && granja.lotes[granja.loteActivo||0]){
      granja.lotes[granja.loteActivo||0].historial = historial.slice();
    }
    var raw = localStorage.getItem('avigo_v1');
    if(!raw){ showToast('Sin datos para respaldar'); return; }
    var fecha = new Date().toISOString().split('T')[0];
    var nombre = 'avigo-backup-'+granja.nombre.replace(/[^a-zA-Z0-9]/g,'-')+'-'+fecha+'.json';
    var blob = new Blob([raw], {type:'application/json'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = nombre;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    showToast('â Respaldo descargado: '+nombre);
  } catch(e){ showToast('Error al crear respaldo: '+e.message); }
}

function restaurarDatos(input){
  var file = input.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    try {
      var datos = JSON.parse(e.target.result);
      if(!datos.g || !datos.g.nombre){ showToast('â  Archivo no vĂĄlido'); return; }
      if(!confirm('ÂżRestaurar datos de "'+datos.g.nombre+'"?\nSe reemplazarĂĄn los datos actuales.')) return;
      localStorage.setItem('avigo_v1', e.target.result);
      showToast('â Datos restaurados. Reiniciando...');
      setTimeout(function(){ location.reload(); }, 1000);
    } catch(e){ showToast('Error al restaurar: '+e.message); }
  };
  reader.readAsText(file);
  input.value = '';
}

function _calcForraje(m2, aves, precioKg){
  var m2n = parseFloat(m2)||0;
  var prod = Math.round(m2n * 3.125 * 10)/10;
  var kgNec = aves * 0.108 * 0.4;
  var pct = kgNec>0 ? Math.min(100, Math.round(prod/kgNec*100)) : 0;
  var col = pct>=80?'#16A34A':pct>=40?'#D97706':'#EF4444';
  var el1 = document.getElementById('pct-forraje');
  var el2 = document.getElementById('bar-forraje');
  var el3 = document.getElementById('ahorro-forraje');
  if(el1){ el1.textContent=pct+'%'; el1.style.color=col; }
  if(el2){ el2.style.width=pct+'%'; el2.style.background=col; }
  if(el3){ var ahorro=Math.round(prod*30*precioKg*0.85); el3.textContent='$'+ahorro.toLocaleString('es-MX'); }
}

function _toggleHuerto(id){
  var tp = _getTraspatio();
  if(!tp.huerto) tp.huerto=[];
  var idx = tp.huerto.indexOf(id);
  if(idx>=0) tp.huerto.splice(idx,1); else tp.huerto.push(id);
  granja.traspatio = tp;
  var btn = document.getElementById('hbtn-'+id);
  var tiene = tp.huerto.indexOf(id)>=0;
  if(btn){
    btn.style.borderColor = tiene?'#16A34A':'#E5E7EB';
    btn.style.background  = tiene?'#F0FDF4':'#fff';
    btn.textContent = tiene?'â':'+ ';
  }
}

function _rentaTraspatio(){
  var tp  = _getTraspatio();
  var d   = calcDash();
  var hoy = new Date().toISOString().split('T')[0];
  var today = new Date();
  var mesAct = hoy.substring(0,7);

  var ingMes=0, costMes=0, huevosMes=0, ahorroCiclo=0;

  var historialVentasAll = tp.historialVentas || [];
  ingMes = historialVentasAll
    .filter(function(v){ return v.fecha && v.fecha.substring(0,7)===mesAct; })
    .reduce(function(s,v){ return s+(v.ingreso||0); }, 0);

  historial.forEach(function(r){
    if(r.fecha&&r.fecha.substring(0,7)===mesAct){
      costMes  += (r.gastoDia||0);
      huevosMes+= (r.huevos||0);
    }
    var kb=parseFloat((r.alimentos&&r.alimentos.balanceado)||r.kg||0);
    ahorroCiclo+=Math.max(0,Math.round((d.kgDia-kb)*(granja.precioKgAl||7)));
  });

  if(ingMes===0 && huevosMes>0){
    ingMes = Math.round(huevosMes * (granja.precioHuevo||3.5));

function _limpiarYRedirigir(screen){
  if(granja.clientesJaula){
    granja.clientesJaula = granja.clientesJaula.filter(function(c){
      return c && c.nombre && c.nombre.trim().length>0 && parseInt(c.cantidad||c.docenas||0)>0;
    }).map(function(c){
      return {nombre:c.nombre.trim(), unidad:c.unidad||'docena', cantidad:parseInt(c.cantidad||c.docenas)};
    });
  }
  if(granja.traspatio && granja.traspatio.clientes){
    granja.traspatio.clientes = granja.traspatio.clientes.filter(function(c){
      return c && c.nombre && c.nombre.trim().length>0 && parseInt(c.cantidad||c.docenas||0)>0;
    }).map(function(c){
      return {nombre:c.nombre.trim(), unidad:c.unidad||'docena', cantidad:parseInt(c.cantidad||c.docenas)};
    });
  }
  guardarEnStorage();
  showToast('Listo, clientes corruptos eliminados');
  nav(screen);
}

function _toggleFormClienteJaula(){
  var el=document.getElementById('form-cliente-jaula');
  var btn=document.getElementById('btn-toggle-cliente-jaula');
  if(!el) return;
  var oculto = el.getAttribute('data-oculto')!=='false';
  if(oculto){
    el.setAttribute('data-oculto','false');
    el.style.display='block';
    el.style.marginTop='14px';
    if(btn){ btn.textContent='â Cancelar'; btn.style.background='#6B7280'; }
  } else {
    el.setAttribute('data-oculto','true');
    el.style.display='none';
    if(btn){ btn.textContent='Agregar â'; btn.style.background='#0284C7'; }
  }
}

function _calcCJIngreso(){
  var unidad   = document.getElementById('inp-cj-unidad')?.value||'docena';
  var cantidad = parseInt(document.getElementById('inp-cj-cantidad')?.value)||0;
  var UNIDADES = {pieza:1,docena:12,cono:30,caja180:180,caja360:360};
  var precio   = granja.precioHuevo||0;
  var ing      = Math.round(cantidad * precio * (UNIDADES[unidad]||12));
  var huevos   = cantidad*(UNIDADES[unidad]||12);
  var el=document.getElementById('cj-preview');
  if(el) el.innerHTML='<div style="font-size:22px;font-weight:900;color:#0284C7">$'+ing.toLocaleString('es-MX')+'</div><div style="font-size:10px;color:#075985;margin-top:1px">'+huevos+' huevos/semana</div>';
}

function _agregarClienteJaula(){
  var elNombre  = document.getElementById('inp-cj-nombre');
  var elUnidad  = document.getElementById('inp-cj-unidad');
  var elCantidad= document.getElementById('inp-cj-cantidad');
  var nombre    = elNombre   ? elNombre.value.trim()          : '';
  var unidad    = elUnidad   ? (elUnidad.value||'docena')     : 'docena';
  var cantidad  = elCantidad ? parseInt(elCantidad.value)||0  : 0;
  if(!nombre)  { showToast('Escribe el nombre del cliente'); return; }
  if(!cantidad){ showToast('Escribe la cantidad'); return; }
  if(!['pieza','docena','cono','caja180','caja360'].includes(unidad)) unidad='docena';
  if(!granja.clientesJaula) granja.clientesJaula=[];
  granja.clientesJaula.push({nombre:nombre, unidad:unidad, cantidad:cantidad});
  guardarEnStorage();
  showToast('â '+nombre+' guardado ('+cantidad+' '+unidad+')');
  nav('clientes_jaula');
}

function _quitarClienteJaula(idx){
  if(!granja.clientesJaula) return;
  granja.clientesJaula.splice(idx,1);
  guardarEnStorage();
  nav('clientes_jaula');
}
