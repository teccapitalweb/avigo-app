// Obtener items del d├нa actual (fresco o desde storage)
function getBioHoy(){
  var hoy = new Date().toISOString().split('T')[0];
  if(!granja.bioHistorial) granja.bioHistorial = {};
  if(!granja.bioHistorial[hoy]){
    // Nuevo d├нa тЖТ items frescos (todos en false)
    granja.bioHistorial[hoy] = {
      fecha: hoy,
      items: BIO_ITEMS_FULL.map(function(b){ return Object.assign({}, b, {done:false}); }),
      pct: 0,
      obs: '',
    };
  }
  return granja.bioHistorial[hoy];
}

function calcPctBio(items){
  var alta = items.filter(function(i){ return i.prioridad==='alta'; });
  var doneAlta = alta.filter(function(i){ return i.done; }).length;
  var doneAll  = items.filter(function(i){ return i.done; }).length;
  // Peso: items de alta prioridad valen 70%, el resto 30%
  var pctAlta  = alta.length > 0 ? doneAlta/alta.length*70 : 70;
  var resto    = items.length - alta.length;
  var doneRest = doneAll - doneAlta;
  var pctRest  = resto > 0 ? doneRest/resto*30 : 30;
  return Math.round(pctAlta + pctRest);
}

// тФАтФАтФА TOGGLE BIO NUEVO (sin re-render completo) тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function toggleBioNuevo(itemId){
  var hoyData = getBioHoy();
  var item    = hoyData.items.find(function(i){ return i.id===itemId; });
  if(!item) return;

  item.done = !item.done;
  hoyData.pct = calcPctBio(hoyData.items);

  // Actualizar DOM sin re-render
  var cb   = document.getElementById('bio-cb-'+itemId);
  var txt  = document.getElementById('bio-t-'+itemId);
  var row  = document.getElementById('bio-row-'+itemId);
  var prog = document.getElementById('bioProg');

  if(cb){
    cb.style.background   = item.done ? '#16A34A' : '#F9FAFB';
    cb.style.borderColor  = item.done ? '#16A34A' : '#E5E7EB';
    cb.innerHTML = item.done
      ? '<svg width="14" height="12" viewBox="0 0 14 12" fill="none"><path d="M1 6l4 5L13 1" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      : '';
  }
  if(txt){
    txt.style.color          = item.done ? '#9CA3AF' : '#111827';
    txt.style.textDecoration = item.done ? 'line-through' : 'none';
  }
  if(row){
    var isAlta = item.prioridad === 'alta';
    row.style.borderColor = item.done ? '#BBF7D0' : isAlta ? '#FECACA' : '#F3F4F6';
  }
  if(prog){
    var pctColor = hoyData.pct===100?'#16A34A':hoyData.pct>=75?'#0369A1':hoyData.pct>=50?'#D97706':'#EF4444';
    prog.style.width      = hoyData.pct + '%';
    prog.style.background = pctColor;
  }

  // Confetti suave si se completa al 100%
  if(hoyData.pct === 100) showToast('ЁЯОЙ ┬бBioseguridad del d├нa completa!');

  guardarEnStorage();
}

function guardarObsBio(val){
  var hoyData = getBioHoy();
  hoyData.obs = val;
  guardarEnStorage();
}

        granja.vacunas       = l.vacunas       || [];
        granja.recordatorios = l.recordatorios || {};
        // Clientes тАФ normalizar
        function fixC(c){
          if(!c||!c.nombre||!c.nombre.trim()) return null;
          var q=parseInt(c.cantidad)||parseInt(c.docenas)||0;
          if(q<=0) return null;
          var u=['pieza','docena','cono','caja180','caja360'].indexOf(c.unidad)>=0?c.unidad:'docena';

        }
        granja.clientesJaula = (l.clientesJaula||g.clientesJaula||[]).map(fixC).filter(Boolean);
        var rawTP = l.traspatio || g.traspatio || {};

          historial[0].fecha===new Date().toISOString().split('T')[0];

      if(!data.g) return false;

      return true;
    } catch(e){ return false; }
  };

function iniciarPago(tipo) {
  if (!avigoTieneSession()) { nav('splash'); return; }
  var plan = _MP_PRECIOS[tipo];
  if (!plan) return;

  showToast('Preparando pago seguro...');

  fetch(AVIGO_API + '/pagos/crear-preferencia', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + _avigoSession.token },
    body: JSON.stringify({ tipo: tipo, monto: plan.monto, descripcion: plan.label })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.sandbox_init_point || data.init_point) {
      var url = data.sandbox_init_point || data.init_point;
      // Enviar al App.js para abrir dentro de la app con WebBrowser
      if (typeof window.ReactNativeWebView !== 'undefined') {
        window.ReactNativeWebView.postMessage(JSON.stringify({
          type: 'ABRIR_PAGO',
          url: url,
          tipo: tipo
        }));
      } else {
        // En web тАФ abrir en nueva pesta├▒a
        window.open(url, '_blank');
      }
    } else {
      showToast('Error al crear el pago. Intenta de nuevo.');
    }
  })
  .catch(function() {
    showToast('Sin conexi├│n. Verifica tu internet.');
  });
}

  function _iniciarBrick() {
    var mp = new MercadoPago(_MP_PUBLIC_KEY_TEST, { locale: 'es-MX' });
    var bricksBuilder = mp.bricks();
    bricksBuilder.create('cardPayment', 'mp-brick-container', {
      initialization: {
        amount: plan.monto
      },
      customization: {
        visual: {
          style: {
            theme: 'default',
            customVariables: {
              baseColor: '#16A34A',
              baseColorFirstVariant: '#15803D',
              baseColorSecondVariant: '#14532D'
            }
          }
        },
        paymentMethods: { minInstallments: 1, maxInstallments: 1 }
      },
      callbacks: {
        onReady: function() {
          // Ocultar spinner cuando el brick est├й listo
          var spinner = document.getElementById('mp-loading');
          if (spinner) spinner.style.display = 'none';
        },
        onSubmit: function(cardFormData) {
          showToast('Procesando pago...');
          // Enviar el pago al backend
          return fetch(AVIGO_API + '/pagos/procesar', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + _avigoSession.token
            },
            body: JSON.stringify({
              tipo: tipo,
              monto: plan.monto,
              descripcion: plan.label,
              formData: cardFormData
            })
          })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data.status === 'approved') {
              // Cerrar el overlay
              var ov = document.getElementById('mp-checkout-overlay');
              if (ov) document.body.removeChild(ov);
              actualizarPlan('pro');
              showToast('ЁЯОЙ ┬бPlan Pro activado! Bienvenido.');
              nav('dash');
            } else if (data.status === 'in_process' || data.status === 'pending') {
              var ov = document.getElementById('mp-checkout-overlay');
              if (ov) document.body.removeChild(ov);
              showToast('тП│ Pago en proceso. Te avisaremos cuando se confirme.');
            } else {
              showToast('Pago rechazado. Verifica tu tarjeta e intenta de nuevo.');
            }
          })
          .catch(function() {
            showToast('Error al procesar el pago. Intenta de nuevo.');
          });
        },
        onError: function(error) {
          console.error('MP Brick error:', error);
        }
      }
    });
  }

  if (typeof MercadoPago !== 'undefined') {
    _iniciarBrick();
  } else {
    var script = document.createElement('script');
    script.src = 'https://sdk.mercadopago.com/js/v2';
    script.onload = _iniciarBrick;
    document.head.appendChild(script);
  }
}

    var sc = document.getElementById('screen');
    if(!sc) return;

    // Determinar direcci├│n de animaci├│n
    var fromIdx = NAV_ORDER.indexOf(_lastScreen);
    var toIdx   = NAV_ORDER.indexOf(name);
    var animClass = 'screen-enter';
    if(name === _lastScreen){
      animClass = 'screen-fade';

      animClass = 'screen-fade';
    } else if(toIdx > fromIdx){
      animClass = 'screen-enter';

      animClass = 'screen-enter-left';
    } else {
      animClass = 'screen-pop';
    }

    sc.style.opacity = '0';

    setTimeout(function(){
      sc.innerHTML   = fn();

      sc.style.opacity = '';

// тФАтФАтФА TIPS R├БPIDOS AUTOM├БTICOS (sin IA) тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function generarTipsRapidos(d, ultReg, ayer, diasInv){
  var tips = [];

  if(ultReg && ayer && ayer.pctPostura>0){
    var caida = ayer.pctPostura - ultReg.pctPostura;
    if(caida >= 2){
      tips.push({color:'#EF4444', titulo:'тмЗ Postura cay├│ '+caida.toFixed(1)+'%', texto:'Una ca├нda repentina puede deberse a estr├йs, cambio de alimento, calor excesivo o problemas de agua. Revisa bebederos, ventilaci├│n y si hubo alg├║n cambio reciente.'});
    }
    if(ultReg.mortalidad >= 0.1){
      tips.push({color:'#EF4444', titulo:'тЪа Mortalidad fuera del rango normal', texto:'M├бs de 0.1% diario requiere atenci├│n. Retira las aves muertas de inmediato, revisa si hay s├нntomas en el lote y consulta al veterinario si contin├║a.'});
    }
  }

  if(diasInv !== null && diasInv <= 5){
    tips.push({color:'#D97706', titulo:'ЁЯУж Stock de alimento bajo тАФ '+diasInv+' d├нas', texto:'Programa tu compra hoy. Con tu consumo actual de '+d.kgDia+' kg/d├нa necesitas al menos '+(d.kgDia*14).toFixed(0)+' kg para 2 semanas de reserva.'});
  }

  var temp = granja.tempHoy || 22;
  if(temp >= 28){
    tips.push({color:'#D97706', titulo:'ЁЯМб Calor elevado тАФ revisa agua', texto:'A '+temp+'┬░C las aves beben '+(Math.round((temp-20)*5))+'% m├бs agua. Verifica que los bebederos est├йn llenos y el agua est├й fresca. El calor reduce la postura si no se controla.'});
  }

  if(d.sem >= 21 && d.pctPostura > 0 && d.pctPostura < 88){
    tips.push({color:'#7C3AED', titulo:'ЁЯУК Postura bajo el est├бndar para Sem '+d.sem, texto:'En postura fase 1 se espera 90-95%. Una postura baja puede indicar deficiencia de calcio, problemas de luz o densidad excesiva de aves. Revisa el programa de luz y el nivel de calcio en el alimento.'});
  }

  if(historial.length === 0){

// тФАтФАтФА FORMATEADOR DE RESPUESTAS DE DON GALLO тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function formatDG(texto){
  if(!texto) return '';

  // Dividir en p├бrrafos por \n\n o \n
  var parrafos = texto.split(/\n\n+/);

  var html = parrafos.map(function(parrafo){
    var lineas = parrafo.split('\n');

    // Detectar si es una lista de items (empieza con тАв, -, *, n├║mero o emoji+texto)
    var esLista = lineas.length > 1 && lineas.every(function(l){
      return /^[тАв\-\*\d]|^[\u{1F300}-\u{1FFFF}]|^[A-Z]{2,}:/u.test(l.trim()) || l.trim() === '';
    });

    if(esLista){
      var items = lineas.filter(function(l){ return l.trim(); }).map(function(linea){
        var l = linea.trim();

        // Detectar tipo de ├нtem
        var esSeccion = /^[A-Z├Б├Й├Н├У├Ъ\u{1F300}-\u{1FFFF}].{2,}:/u.test(l) && !l.startsWith('тАв');
        var esTitulo  = /^\d+\./.test(l);

        if(esSeccion){
          // Secci├│n con t├нtulo: "MORTALIDAD: texto"
          var partes = l.split(':');
          var titulo = partes[0].trim();
          var resto  = partes.slice(1).join(':').trim();
          return '<div style="margin-bottom:6px">'
            +'<span style="font-size:11px;font-weight:800;color:#16A34A;display:block;margin-bottom:2px">'+titulo+(resto?':':'')+'</span>'
            +(resto?'<span style="color:#374151">'+resto+'</span>':'')
            +'</div>';
        } else if(esTitulo){
          // Lista numerada
          var num = l.match(/^(\d+)\.\s*/)[1];
          var contenido = l.replace(/^\d+\.\s*/, '');
          return '<div style="display:flex;gap:8px;margin-bottom:5px;align-items:flex-start">'
            +'<span style="min-width:18px;height:18px;background:#16A34A;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:#fff;flex-shrink:0;margin-top:1px">'+num+'</span>'
            +'<span style="flex:1;color:#374151">'+formatInline(contenido)+'</span>'
            +'</div>';
        } else {
          // Bullet normal
          var contenido2 = l.replace(/^[тАв\-\*]\s*/, '');
          // Detectar emoji al inicio
          var emojiMatch = contenido2.match(/^([\u{1F300}-\u{1FFFF}\u{2600}-\u{27BF}][\uFE0F\u20E3]?\s)/u);
          var emoji = emojiMatch ? emojiMatch[1].trim() : 'тАв';
          var texto2  = emojiMatch ? contenido2.slice(emojiMatch[0].length) : contenido2;
          return '<div style="display:flex;gap:7px;margin-bottom:5px;align-items:flex-start">'
            +'<span style="font-size:12px;flex-shrink:0;margin-top:1px">'+emoji+'</span>'
            +'<span style="flex:1;color:#374151">'+formatInline(texto2)+'</span>'
            +'</div>';
        }
      });
      return '<div style="margin-bottom:8px">'+items.join('')+'</div>';
    }

    // P├бrrafo normal тАФ una sola l├нnea o texto corrido
    var textoParrafo = lineas.join(' ');

    // Detectar si empieza con emoji grande (separador de secci├│n)
    var secMatch = textoParrafo.match(/^([\u{1F300}-\u{1FFFF}\u{2600}-\u{27BF}\u{26A0}\u{2705}\u{274C}][\uFE0F\u20E3]?\s[A-Z├Б├Й├Н├У├Ъ][^:]+:)/u);
    if(secMatch){
      var titulo2 = secMatch[1];
      var resto2  = textoParrafo.slice(titulo2.length).trim();
      return '<div style="margin-bottom:8px">'
        +'<div style="font-size:11px;font-weight:800;color:#16A34A;margin-bottom:3px">'+titulo2+'</div>'
        +(resto2?'<div style="color:#374151">'+formatInline(resto2)+'</div>':'')
        +'</div>';
    }

    // P├бrrafo normal
    return '<div style="margin-bottom:8px;color:#374151">'+formatInline(textoParrafo)+'</div>';
  }).join('');

  return html;
}

// Formatea texto inline: negrita para texto entre ** o texto en MAY├ЪSCULAS corto
function formatInline(texto){
  if(!texto) return '';
  // Negrita para palabras en MAY├ЪSCULAS (3+ chars) que sean t├йcnicas
  return texto
    .replace(/\b(URGENTE|ALERTA|IMPORTANTE|NOTA|OJO|NUNCA|SIEMPRE|HOY MISMO)\b/g,
      '<strong style="color:#DC2626;font-weight:800">$1</strong>')
    .replace(/\b(Newcastle|Marek|Gumboro|Coccidiosis|Salmonela|Coriza|Micoplasmosis|Bronquitis)\b/g,
      '<em style="font-weight:700;color:#7C3AED">$1</em>');
}

var _climaCache = { temp: null, fecha: null, lat: null, lon: null };

function obtenerTemperaturaAuto(callback){
  // Cache v├бlido por 30 minutos тАФ no por d├нa completo
  var ahora = Date.now();
  var cacheValido = _climaCache.temp !== null && 
                    _climaCache.ts && 
                    (ahora - _climaCache.ts) < 30 * 60 * 1000;
  if(cacheValido){
    if(callback) callback(_climaCache.temp, _climaCache.lat, _climaCache.lon);
    return;
  }

  // Intentar obtener GPS actual primero (silencioso, sin pedir permiso extra)
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      function(pos){
        var lat = pos.coords.latitude;
        var lon = pos.coords.longitude;
        // Actualizar coords guardadas
        granja.climaLat = lat;
        granja.climaLon = lon;
        fetchTemperatura(lat, lon, callback);
      },
      function(){
        // GPS fall├│ тАФ usar coords guardadas o default Tehuac├бn
        var lat = granja.climaLat || _climaCache.lat || 18.4613;
        var lon = granja.climaLon || _climaCache.lon || -97.3939;
        fetchTemperatura(lat, lon, callback);
      },
      { timeout: 5000, enableHighAccuracy: false, maximumAge: 300000 }
    );
  } else {
    var lat = granja.climaLat || _climaCache.lat || 18.4613;
    var lon = granja.climaLon || _climaCache.lon || -97.3939;
    fetchTemperatura(lat, lon, callback);
  }
}

function fetchTemperatura(lat, lon, callback){
  var url = 'https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon
    +'&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code'
    +'&timezone=auto&forecast_days=1';

  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data && data.current && data.current.temperature_2m !== undefined){
        var temp = Math.round(data.current.temperature_2m * 10) / 10;
        var hoy  = new Date().toISOString().split('T')[0];
        // Guardar con timestamp para cache de 30 min
        _climaCache = { temp: temp, fecha: hoy, lat: lat, lon: lon, ts: Date.now() };
        granja.tempHoy = temp;
        granja.climaLat = lat;
        granja.climaLon = lon;
        guardarEnStorage();
        if(callback) callback(temp, lat, lon);
        actualizarClimaEnDash(temp, data.current.weather_code);
      }
    })
    .catch(function(){
      // Sin internet тАФ usar tempHoy guardado y mostrarlo
      if(granja.tempHoy){
        if(callback) callback(granja.tempHoy, lat, lon);
        actualizarClimaEnDash(granja.tempHoy, undefined);
      }
    });
}

function actualizarClimaEnDash(temp, wcode){
  var el = document.getElementById('clima-dash');
  if(!el) return;
  var icono, color, sub;
  if(temp >= 35){      icono='ЁЯФе'; color='#EF4444'; sub='golpe de calor тАФ baja hasta 15%'; }
  else if(temp >= 30){ icono='тШАя╕П'; color='#EF4444'; sub='calor alto тАФ baja 5-10%'; }
  else if(temp >= 28){ icono='тЪая╕П'; color='#D97706'; sub='calor moderado тАФ baja 2-5%'; }
  else if(temp >= 18){ icono='тЬЕ'; color='#16A34A'; sub='temperatura ideal'; }
  else if(temp >= 12){ icono='ЁЯМдя╕П'; color='#D97706'; sub='fr├нo тАФ aumenta consumo 10%'; }
  else {               icono='ЁЯе╢'; color='#EF4444'; sub='fr├нo cr├нtico тАФ cierra cortinas'; }

  // Descripci├│n del clima por c├│digo WMO
  var desc = '';
  if(wcode !== undefined){
    if(wcode === 0) desc = 'Despejado';
    else if(wcode <= 3) desc = 'Parcialmente nublado';
    else if(wcode <= 48) desc = 'Nublado/neblina';
    else if(wcode <= 67) desc = 'Lluvia';
    else if(wcode <= 77) desc = 'Nieve';
    else if(wcode <= 82) desc = 'Lluvia intensa';
    else desc = 'Tormenta';
  }

  el.innerHTML = '<div style="font-size:9px;font-weight:700;color:#9CA3AF;margin-bottom:3px">ЁЯМбя╕П Temperatura hoy</div>'
    +'<div style="font-size:14px;font-weight:900;color:'+color+'">'+icono+' '+temp+'┬░C'+(desc?' ┬╖ '+desc:'')+'</div>'
    +'<div style="font-size:8px;color:#C4C4C4;margin-top:2px">'+sub+'</div>';
}

function setFrecRec(id, frec){
  var data = _getRecData(id);
  data.frec = frec;
  guardarEnStorage();
  // Actualizar estilos de botones de frecuencia
  var FREC_IDS=['diario','cada2','semanal','quincenal'];
  FREC_IDS.forEach(function(fid){
    var btn = document.getElementById('fbt-'+id+'-'+fid);
    if(!btn) return;
    var sel = fid===frec;
    btn.style.borderColor = sel?'#16A34A':'#E5E7EB';
    btn.style.background  = sel?'#F0FDF4':'#fff';
    btn.style.color       = sel?'#16A34A':'#6B7280';
  });
  // Mostrar/ocultar selector de d├нas
  var diasDiv = document.getElementById('dias-'+id);
  if(diasDiv) diasDiv.style.display = frec==='semanal'?'block':'none';
}

function toggleDiaRec(id, di){
  var data = _getRecData(id);
  if(!data.dias) data.dias = [];
  var idx = data.dias.indexOf(di);
  if(idx>=0){ data.dias.splice(idx,1); } else { data.dias.push(di); data.dias.sort(); }
  guardarEnStorage();
  // Actualizar estilo del bot├│n
  var btn = document.getElementById('dbt-'+id+'-'+di);
  if(!btn) return;
  var sel = data.dias.indexOf(di)>=0;
  btn.style.borderColor = sel?'#16A34A':'#E5E7EB';
  btn.style.background  = sel?'#16A34A':'#fff';
  btn.style.color       = sel?'#fff':'#6B7280';
}

function bindRecordatorios(){
  // Atar botones de acci├│n del perfil
  var _btnMap = {
    'btn-reiniciar':  function(){ resetApp(); },
    'btn-reiniciar2': function(){ resetApp(); },
    'btn-exportar-hist': function(){ exportarReporte(); },
    'btn-backup':     function(){ backupDatos(); },
    'btn-demo':       function(){ cargarDemoV2(); },
    'btn-nuevo-lote': function(){ nav('nuevo_lote'); },
  };
  Object.keys(_btnMap).forEach(function(id){
    var el = document.getElementById(id);
    if(el) el.onclick = _btnMap[id];
  });

  var recIds=['rec-alim','rec-huevo','rec-bebedero','rec-comedero','rec-cama','rec-galpon'];
  var FREC_IDS=['diario','cada2','semanal','quincenal'];
  recIds.forEach(function(rid){
    // Toggle ON/OFF
    var tog = document.getElementById('tog-'+rid);
    if(tog){ tog.onclick = (function(r){ return function(){ toggleRec2(r); }; })(rid); }
    // Bot├│n agregar horario
    var btnAdd = document.getElementById('btn-add-'+rid);
    if(btnAdd){ btnAdd.onclick = (function(r){ return function(){ agregarHoraRec(r); }; })(rid); }
    // Botones de frecuencia
    FREC_IDS.forEach(function(fid){
      var fbt = document.getElementById('fbt-'+rid+'-'+fid);
      if(fbt){ fbt.onclick = (function(r,f){ return function(){ setFrecRec(r,f); }; })(rid,fid); }
    });
    // Botones de d├нas de la semana (0=L...6=D)
    for(var di=0;di<7;di++){
      var dbt = document.getElementById('dbt-'+rid+'-'+di);
      if(dbt){ dbt.onclick = (function(r,d){ return function(){ toggleDiaRec(r,d); }; })(rid,di); }
    }
    // Horarios existentes
    var data = granja.recordatorios && granja.recordatorios[rid];
    if(data && data.horas) _bindListaListeners(rid, data.horas);
  });
}

function _bindListaListeners(id, horas){
  horas.forEach(function(h,hi){
    var inp = document.getElementById('hora-'+id+'-'+hi);
    if(inp){ inp.onchange = (function(r,i){ return function(){ cambiarHoraRec(r,i,this.value); }; })(id,hi); }
    var del = document.getElementById('del-hora-'+id+'-'+hi);
    if(del){ del.onclick = (function(r,i){ return function(){ quitarHoraRec(r,i); }; })(id,hi); }
  });
}

function _bindHorasListeners(){
  var recIds = ['rec-alim','rec-huevo','rec-bebedero','rec-comedero','rec-cama','rec-galpon'];
  recIds.forEach(function(rid){
    var data = granja.recordatorios && granja.recordatorios[rid];
    var horas = data && data.horas ? data.horas : [];
    horas.forEach(function(h,hi){
      var inp = document.getElementById('hora-'+rid+'-'+hi);
      if(inp){ (function(r,i){ inp.addEventListener('change', function(){ cambiarHoraRec(r,i,this.value); }); })(rid,hi); }
      var del = document.getElementById('del-hora-'+rid+'-'+hi);
      if(del){ (function(r,i){ del.addEventListener('click', function(){ quitarHoraRec(r,i); }); })(rid,hi); }
    });
  });
}

function exportarPDF(dias){
  var datos = historial.slice(0, dias||30);
  if(!datos.length){ showToast('Sin datos para exportar'); return; }

  showToast('тП│ Generando reporte...');

  var fmx = function(n){ return (n||0).toLocaleString('es-MX'); };
  var avgP  = (datos.reduce(function(s,r){return s+r.pctPostura;},0)/datos.length).toFixed(1);
  var totH  = datos.reduce(function(s,r){return s+r.huevos;},0);
  var totG  = datos.reduce(function(s,r){return s+r.gastoDia;},0);
  var totI  = datos.reduce(function(s,r){return s+r.ingresoDia;},0);
  var gan   = totI - totG;
  var maxP  = Math.max.apply(null, datos.map(function(r){return r.pctPostura;}));
  var minP  = Math.min.apply(null, datos.map(function(r){return r.pctPostura;}));
  var mejorDia = datos.find(function(r){return r.pctPostura===maxP;});
  var peorDia  = datos.find(function(r){return r.pctPostura===minP;});
  var fechaMejor = mejorDia ? new Date(mejorDia.fecha+'T12:00:00').toLocaleDateString('es-MX',{day:'numeric',month:'short'}) : 'тАФ';
  var fechaPeor  = peorDia  ? new Date(peorDia.fecha+'T12:00:00').toLocaleDateString('es-MX',{day:'numeric',month:'short'}) : 'тАФ';
  var razaNom = granja.raza ? granja.raza.n : 'тАФ';
  var sistNom = granja.sistema==='jaula'?'Jaula en bater├нa':granja.sistema==='piso'?'Piso con cama':'Pastoreo';
  var fechaRep = new Date().toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'});
  var periodoInicio = datos.length>0 ? new Date(datos[datos.length-1].fecha+'T12:00:00').toLocaleDateString('es-MX',{day:'numeric',month:'short',year:'numeric'}) : '';
  var periodoFin    = datos.length>0 ? new Date(datos[0].fecha+'T12:00:00').toLocaleDateString('es-MX',{day:'numeric',month:'short',year:'numeric'}) : '';

  // Construir filas de tabla
  var filas = datos.map(function(r){
    var fecha = new Date(r.fecha+'T12:00:00').toLocaleDateString('es-MX',{weekday:'short',day:'numeric',month:'short'});
    var pcol  = r.pctPostura>=92?'#16A34A':r.pctPostura>=85?'#D97706':'#dc2626';
    var mcol  = r.mortalidad>=0.1?'#dc2626':r.mortalidad>=0.05?'#D97706':'#16A34A';
    return '<tr>'
      +'<td>'+fecha+'</td>'
      +'<td style="text-align:center;font-weight:700;color:'+pcol+'">'+r.pctPostura+'%</td>'

// Sincronizar todos los recordatorios al backend
function sincronizarRecordatorios() {
  if (!avigoTieneSession()) return;
  var tipoMap = { 'rec-alim':'alimentacion','rec-huevo':'recoleccion','rec-bebedero':'bebederos','rec-comedero':'comederos','rec-cama':'cama','rec-galpon':'galpon' };
  var todosRecs = granja.recordatorios || {};
  var recsArray = Object.keys(tipoMap).map(function(k) {
    var r = todosRecs[k] || {};
    var hora = (r.horas && r.horas.length > 0) ? r.horas[0] : '07:00';
    return { tipo: tipoMap[k], activo: r.activo || false, hora: hora, frecuencia: r.frec || 'diario' };
  });
  fetch(AVIGO_API + '/push/recordatorios', {
    method: 'POST',
    headers: avigoHeaders(),
    body: JSON.stringify({ recordatorios: recsArray })
  }).then(function() {
    console.log('[PUSH] Recordatorios sincronizados');
  }).catch(function() {});
}

function backupDatos(){
  try {
    // Sincronizar historial del lote activo antes de guardar
    if(granja.lotes && granja.lotes[granja.loteActivo||0]){
      granja.lotes[granja.loteActivo||0].historial = historial.slice();
    }
    var raw = localStorage.getItem('avigo_v1');
    if(!raw){ showToast('Sin datos para respaldar'); return; }
    var fecha = new Date().toISOString().split('T')[0];
    var nombre = 'avigo-backup-'+granja.nombre.replace(/[^a-zA-Z0-9]/g,'-')+'-'+fecha+'.json';
    var blob = new Blob([raw], {type:'application/json'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = nombre;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    showToast('тЬУ Respaldo descargado: '+nombre);
  } catch(e){ showToast('Error al crear respaldo: '+e.message); }
}

function restaurarDatos(input){
  var file = input.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    try {
      var datos = JSON.parse(e.target.result);
      // Verificar que es un backup v├бlido de AviGo
      if(!datos.g || !datos.g.nombre){ showToast('тЪа Archivo no v├бlido'); return; }
      if(!confirm('┬┐Restaurar datos de "'+datos.g.nombre+'"?\nSe reemplazar├бn los datos actuales.')) return;
      localStorage.setItem('avigo_v1', e.target.result);
      showToast('тЬУ Datos restaurados. Reiniciando...');
      setTimeout(function(){ location.reload(); }, 1000);
    } catch(e){ showToast('Error al restaurar: '+e.message); }
  };
  reader.readAsText(file);
  // Limpiar el input para poder restaurar el mismo archivo de nuevo
  input.value = '';
}

// Auto-backup cada vez que se guarda (en memoria, no descarga)
var _lastAutoBackup = null;
function autoBackupCheck(){
  try {
    var now = new Date().toISOString().split('T')[0];
    if(_lastAutoBackup !== now && historial.length > 0){
      _lastAutoBackup = now;
      // Guardar copia en sessionStorage como red de seguridad
      var raw = localStorage.getItem('avigo_v1');
      if(raw) sessionStorage.setItem('avigo_autobackup_'+now, raw);
    }
  } catch(e){}
}

function _calcForraje(m2, aves, precioKg){
  var m2n = parseFloat(m2)||0;
  var prod = Math.round(m2n * 3.125 * 10)/10;
  var kgNec = aves * 0.108 * 0.4;
  var pct = kgNec>0 ? Math.min(100, Math.round(prod/kgNec*100)) : 0;
  var col = pct>=80?'#16A34A':pct>=40?'#D97706':'#EF4444';
  var el1 = document.getElementById('pct-forraje');
  var el2 = document.getElementById('bar-forraje');
  var el3 = document.getElementById('ahorro-forraje');
  if(el1){ el1.textContent=pct+'%'; el1.style.color=col; }
  if(el2){ el2.style.width=pct+'%'; el2.style.background=col; }
  if(el3){ var ahorro=Math.round(prod*30*precioKg*0.85); el3.textContent='$'+ahorro.toLocaleString('es-MX'); }
}

function _toggleHuerto(id){
  var tp = _getTraspatio();
  if(!tp.huerto) tp.huerto=[];
  var idx = tp.huerto.indexOf(id);
  if(idx>=0) tp.huerto.splice(idx,1); else tp.huerto.push(id);
  granja.traspatio = tp;
  var btn = document.getElementById('hbtn-'+id);
  var tiene = tp.huerto.indexOf(id)>=0;
  if(btn){
    btn.style.borderColor = tiene?'#16A34A':'#E5E7EB';
    btn.style.background  = tiene?'#F0FDF4':'#fff';
    btn.textContent = tiene?'тЬУ':'+ ';
  }
}

function _agregarCliente(){
  var elNombre  = document.getElementById('inp-cliente-nombre');
  var elUnidad  = document.getElementById('inp-cj-tp-unidad');
  var elCantidad= document.getElementById('inp-cliente-docenas');
  var nombre    = elNombre   ? elNombre.value.trim()         : '';
  var unidad    = elUnidad   ? (elUnidad.value||'docena')    : 'docena';
  var cantidad  = elCantidad ? parseInt(elCantidad.value)||0 : 0;
  if(!nombre)  { showToast('Escribe el nombre del cliente'); return; }
  if(!cantidad){ showToast('Escribe la cantidad'); return; }
  if(!['pieza','docena','cono','caja180','caja360'].includes(unidad)) unidad='docena';
  var tp = _getTraspatio();
  if(!tp.clientes) tp.clientes=[];
  tp.clientes.push({nombre:nombre, unidad:unidad, cantidad:cantidad});
  granja.traspatio = tp;
  guardarEnStorage();
  showToast('тЬУ '+nombre+' guardado ('+cantidad+' '+unidad+')');
  nav('clientes_traspatio');
}

function _guardarEconomia(){
  var tp = _getTraspatio();
  tp.precioCrello = parseFloat(document.getElementById('inp-precio-criollo')?.value)||3.5;
  tp.precioGall   = parseFloat(document.getElementById('inp-precio-gallinaza')?.value)||15;

  nav('dash');
}

// Agregar venta al historial del d├нa
function _agregarVenta(){
  var unidad = document.getElementById('vta-unidad')?.value||'pieza';
  var cant   = parseInt(document.getElementById('vta-cant')?.value)||1;
  var precio = parseFloat(document.getElementById('vta-precio')?.value)||0;
  var canal  = document.getElementById('vta-canal')?.value||'directo';
  var unidades={pieza:1,docena:12,cono:30,caja:360,kg:18};
  var huevos = cant*(unidades[unidad]||1);
  var ingreso= Math.round(precio*cant*100)/100;
  if(!precio||!cant){ showToast('Ingresa cantidad y precio'); return; }
  var tp=_getTraspatio();
  if(!tp.ventasHoy) tp.ventasHoy=[];
  tp.ventasHoy.push({unidad:unidad,cant:cant,precio:precio,canal:canal,huevos:huevos,ingreso:ingreso});
  // Actualizar ingresoDia en historial si existe registro de hoy
  var hoy=new Date().toISOString().split('T')[0];
  if(historial.length>0&&historial[0].fecha===hoy){
    var totalVentas=tp.ventasHoy.reduce(function(s,v){return s+(v.ingreso||0);},0);
    historial[0].ingresoVenta=totalVentas;
    historial[0].ingresoDia=totalVentas;
  }
  granja.traspatio=tp;
  guardarEnStorage();
  showToast('тЬУ Venta registrada');
  nav('ventas_traspatio');
}

// Quitar venta
function _quitarVenta(idx){
  var tp=_getTraspatio();
  if(!tp.ventasHoy) return;
  tp.ventasHoy.splice(idx,1);
  var hoy=new Date().toISOString().split('T')[0];
  if(historial.length>0&&historial[0].fecha===hoy){
    var totalVentas=tp.ventasHoy.reduce(function(s,v){return s+(v.ingreso||0);},0);
    historial[0].ingresoVenta=totalVentas;
    historial[0].ingresoDia=totalVentas;
  }
  granja.traspatio=tp;
  guardarEnStorage();
  nav('ventas_traspatio');
}

// Quitar cliente
function _quitarCliente(idx){
  var tp=_getTraspatio();
  if(!tp.clientes) return;
  tp.clientes.splice(idx,1);
  granja.traspatio=tp;
  guardarEnStorage();
  nav('clientes_traspatio');
}

              c.docenas!==undefined  ? parseInt(c.docenas)  : -1;
      return !isNaN(q) && q > 0;
    }).map(function(c){
      var q = c.cantidad!==undefined ? parseInt(c.cantidad) : parseInt(c.docenas);

function _limpiarYRedirigir(screen){
  if(granja.clientesJaula){
    granja.clientesJaula = granja.clientesJaula.filter(function(c){
      return c && c.nombre && c.nombre.trim().length>0 && parseInt(c.cantidad||c.docenas||0)>0;
    }).map(function(c){
      return {nombre:c.nombre.trim(), unidad:c.unidad||'docena', cantidad:parseInt(c.cantidad||c.docenas)};
    });
  }
  if(granja.traspatio && granja.traspatio.clientes){
    granja.traspatio.clientes = granja.traspatio.clientes.filter(function(c){
      return c && c.nombre && c.nombre.trim().length>0 && parseInt(c.cantidad||c.docenas||0)>0;
    }).map(function(c){
      return {nombre:c.nombre.trim(), unidad:c.unidad||'docena', cantidad:parseInt(c.cantidad||c.docenas)};
    });
  }
  guardarEnStorage();
  showToast('Listo, clientes corruptos eliminados');
  nav(screen);
}

function _toggleFormClienteJaula(){
  var el=document.getElementById('form-cliente-jaula');
  var btn=document.getElementById('btn-toggle-cliente-jaula');
  if(!el) return;
  var oculto = el.getAttribute('data-oculto')!=='false';
  if(oculto){
    el.setAttribute('data-oculto','false');
    el.style.display='block';
    el.style.marginTop='14px';
    if(btn){ btn.textContent='тАФ Cancelar'; btn.style.background='#6B7280'; }
  } else {
    el.setAttribute('data-oculto','true');
    el.style.display='none';
    if(btn){ btn.textContent='Agregar тЖТ'; btn.style.background='#0284C7'; }
  }
}

function _calcCJIngreso(){
  var unidad   = document.getElementById('inp-cj-unidad')?.value||'docena';
  var cantidad = parseInt(document.getElementById('inp-cj-cantidad')?.value)||0;
  var UNIDADES = {pieza:1,docena:12,cono:30,caja180:180,caja360:360};
  var precio   = granja.precioHuevo||0;
  var ing      = Math.round(cantidad * precio * (UNIDADES[unidad]||12));
  var huevos   = cantidad*(UNIDADES[unidad]||12);
  var el=document.getElementById('cj-preview');
  if(el) el.innerHTML='<div style="font-size:22px;font-weight:900;color:#0284C7">$'+ing.toLocaleString('es-MX')+'</div><div style="font-size:10px;color:#075985;margin-top:1px">'+huevos+' huevos/semana</div>';
}

function _agregarClienteJaula(){
  var elNombre  = document.getElementById('inp-cj-nombre');
  var elUnidad  = document.getElementById('inp-cj-unidad');
  var elCantidad= document.getElementById('inp-cj-cantidad');
  var nombre    = elNombre   ? elNombre.value.trim()          : '';
  var unidad    = elUnidad   ? (elUnidad.value||'docena')     : 'docena';
  var cantidad  = elCantidad ? parseInt(elCantidad.value)||0  : 0;
  if(!nombre)  { showToast('Escribe el nombre del cliente'); return; }
  if(!cantidad){ showToast('Escribe la cantidad'); return; }
  if(!['pieza','docena','cono','caja180','caja360'].includes(unidad)) unidad='docena';
  if(!granja.clientesJaula) granja.clientesJaula=[];
  granja.clientesJaula.push({nombre:nombre, unidad:unidad, cantidad:cantidad});
  guardarEnStorage();
  showToast('тЬУ '+nombre+' guardado ('+cantidad+' '+unidad+')');
  nav('clientes_jaula');
}

function _quitarClienteJaula(idx){
  if(!granja.clientesJaula) return;
  granja.clientesJaula.splice(idx,1);
  guardarEnStorage();
  nav('clientes_jaula');
}

</script>
