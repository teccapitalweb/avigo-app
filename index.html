  if(/emergencia|urgente|quГ© hago ahora|ya mismo|de inmediato|no sГ© quГ© hacer|me urge|auxilio|ayuda.*urgente/.test(p)){
    var d3=calcDash();
    return 'ВЎCГЎlmate y actГәa paso a paso! CuГ©ntame quГ© estГЎ pasando exactamente:\n\nВҝEs alguna de estas situaciones?\n\nрҹ’Җ MORTALIDAD MASIVA (muchas aves muriendo en horas)\nвҶ’ AГӯsla el galpГіn, llama al veterinario y a SENASICA\n\nрҹҢЎпёҸ GOLPE DE CALOR (aves postradas, jadeando, sin moverse)\nвҶ’ Abre ventanas, moja las aves con agua fresca, electrolitos\n\nрҹ”ҙ CAГҚDA BRUSCA DE POSTURA (bajГі mГЎs del 30% en un dГӯa)\nвҶ’ Revisa luz (Вҝhubo apagГіn?), agua y alimento\n\nвҡЎ CORTE DE LUZ PROLONGADO\nвҶ’ Las aves no comerГЎn bien вҖ” normal que bajen 3-5% los prГіximos 2 dГӯas\n\nрҹӨ’ AVES CON SГҚNTOMAS GRAVES\nвҶ’ Describe quГ© ves y te doy el protocolo\n\nВҝQuГ© estГЎ pasando exactamente?';
  }

  if(convActual.length>=4 && /y quГ© mГЎs|quГ© sigue|siguiente paso|despuГ©s quГ©|y luego|y ahora quГ©|funcionГі|resultГі|mejorГі|sigue igual|empeorГі/.test(p)){
    if(/funcionГі|mejorГі|mejor|subiГі.*postura|ya estГЎ bien/.test(p))
      return 'ВЎQuГ© buena noticia! Me alegra que haya funcionado. Cuando hay mejorГӯa, lo importante es:\n\n1. Completa el tratamiento aunque las aves ya se vean bien вҖ” cortar antibiГіticos antes puede generar resistencia\n2. Registra todo: quГ© sГӯntomas tuvieron, quГ© usaste y cuГЎntos dГӯas вҖ” este historial vale oro si el problema regresa\n3. Analiza la causa raГӯz вҖ” ВҝquГ© generГі el problema? ВҝBioseguridad, alimento, vacunaciГіn atrasada?\n4. Considera vacunar o reforzar si el problema fue viral\n\nВҝQuГ© tratamiento usaste? AsГӯ lo anoto para futuras referencias.';

    if(/empeorГі|sigue igual|no mejora|igual|no funciona|peor/.test(p))
      return 'Si en 48 horas no hay mejora con el tratamiento, hay varias posibilidades:\n\n1. El diagnГіstico puede ser incorrecto вҖ” necesitas cultivo o diagnГіstico de laboratorio\n2. El antibiГіtico no es el correcto para esa bacteria\n3. Hay resistencia al antibiГіtico\n4. Es una enfermedad viral donde los antibiГіticos no funcionan\n\nрҹҡЁ Con '+aves.toLocaleString('es-MX')+' aves en juego, si en 48h no hay mejora necesitas un veterinario presencial. El diagnГіstico sin ver las aves siempre tiene limitaciones.\n\nMientras tanto: electrolitos + vitaminas A, D, E en agua. No cambies de antibiГіtico sin orientaciГіn profesional вҖ” puede hacer las cosas peores.\n\nВҝEl veterinario ha ido al galpГіn a revisarlas?';
  }

  if(/^(hola|buenas|buenos dГӯas|buenas tardes|buenas noches|quГ© tal|quГ© onda|quiubo|ey|oye|oiga|hey|saludos|buen dГӯa)[\s!ВЎ.]*$/i.test(p.trim())){

      +(utilNeta>5000

        :'рҹ”ҙ CON ESTOS PRECIOS EL NEGOCIO NO ES RENTABLE вҖ” el costo del alimento supera el ingreso. Revisa el precio de venta o busca reducir costos de alimento.')+'\n\n'
      +'рҹ’Ў Los precios que usГ© son los de tu granja ($'+precioHuevo+'/huevo y $'+precioKg+'/kg alimento). ВҝQuieres que ajuste con otros precios?';
  }

  if(esComparaciГіn){

      return 'Comparativa de sistemas de producciГіn:\n\n'
        +'рҹҸӯ JAULA EN BATERГҚA:\n'
        +'вҖў Postura: mГЎs alta (92-96%) вҖ” control total del ambiente\n'
        +'вҖў Costo instalaciГіn: mayor ($120-180/ave)\n'
        +'вҖў Mano de obra: menor (1 persona por 5,000 aves)\n'
        +'вҖў Bioseguridad: excelente\n'
        +'вҖў Bienestar animal: cuestionado (tendencia mundial a eliminarlo)\n'
        +'вҖў Mejor para: lotes grandes, producciГіn comercial intensiva\n\n'
        +'рҹҢҫ PISO CON CAMA:\n'
        +'вҖў Postura: buena (88-93%)\n'
        +'вҖў Costo instalaciГіn: medio ($80-120/ave)\n'
        +'вҖў Mano de obra: media\n'
        +'вҖў Riesgo: coccidiosis, humedad en cama\n'
        +'вҖў Mejor para: lotes medianos, productores en transiciГіn\n\n'
        +'рҹҢҝ PASTOREO:\n'
        +'вҖў Postura: menor (80-88%) pero precio premium del huevo\n'
        +'вҖў Costo instalaciГіn: menor ($40-80/ave)\n'
        +'вҖў Mano de obra: mayor\n'
        +'вҖў Valor agregado: huevo de libre pastoreo vale 30-50% mГЎs\n'

        +'Tu sistema actual es '+sistema+'. '
        +(granja.sistema==='jaula'?'Maximiza la producciГіn con el programa de luz y nutriciГіn correctos.':granja.sistema==='piso'?'Controla bien la cama para evitar enfermedades.':'Aprovecha el diferencial de precio del huevo de pastoreo para maximizar ingresos.')+'\n\nВҝEstГЎs pensando en cambiar de sistema?';
    }

    if(/hy.?line.*lohmann|lohmann.*hy.?line|isa.*hy|hy.*isa|babcock.*lohmann|quГ©.*raza.*mejor/.test(p)){
      return 'Comparativa de razas principales:\n\n'
        +'рҹ“Ҡ PRODUCCIГ“N (huevos/ciclo 80 sem):\n'

    if(/muda|segundo ciclo|renovar/.test(p)){

          :'Semana '+sem+' вҖ” es momento de decidir:\n\nрҹ“Ҡ ANГҒLISIS RГҒPIDO:\nвҖў Postura actual: '+pct+'%\nвҖў Costo alimento/dГӯa: $'+d.gastoDia.toLocaleString('es-MX')+'\nвҖў '+(pct>75?'Postura todavГӯa aceptable вҖ” muda podrГӯa darte otro ciclo productivo.':'Postura baja вҖ” evalГәa si la muda es rentable vs renovar el lote.')+'\n\nCon la muda recuperas el 80-85% de tu pico actual por 40-50 semanas mГЎs. El costo de la muda es bajo vs comprar pollitas nuevas. Generalmente SГҚ conviene si la postura puede recuperarse.')

  if(esPrecio && !/alimento|feed/.test(p)){

        +'рҹ’Ў PARA SER RENTABLE necesitas vender a mГӯnimo '+(costoHuevoP>0?'$'+(costoHuevoP*2.5).toFixed(2)+'/huevo (2.5x tu costo de alimento)':'al menos 2.5x tu costo de alimento por huevo')+'\n\n'

  if(esTiempo){
    if(/posturas?|poner|huevo|producir/.test(p)){
      var semFaltantes = Math.max(0,18-sem);
      return (sem>=18
        ?'Tu lote ya estГЎ en postura (semana '+sem+'). '+(pct>0?'Actualmente produces '+pct+'% de postura.':'Registra hoy para ver tu % de postura actual.')
        :'Tu lote comenzarГЎ a poner huevos alrededor de la semana 18-20.\n\nFaltan aproximadamente '+semFaltantes+' semanas para la primera postura.'
        +'\n\nрҹ“Ӣ CГ“MO PREPARARTE:\n'
        +'вҖў Semana 15-16: cambia al alimento de pre-postura (2% calcio)\n'
        +'вҖў Semana 16-17: aplica la vacuna oleosa Newcastle+Bronquitis\n'
        +'вҖў Semana 17: aumenta la luz a 12 horas\n'
        +'вҖў Semana 17-18: cambia al alimento de postura (4% calcio)\n'
        +'вҖў Semana 17-20: instala o revisa nidales si es sistema piso\n\n'
        +'Los primeros huevos serГЎn pequeГұos вҖ” normal. El tamaГұo aumenta semana a semana hasta estabilizarse alrededor de la semana 25-28.');
    }
    if(/vacuna|vacunar/.test(p)){
      var proxV = granja.vacunas?granja.vacunas.find(function(v){return !v.ok;}):null;
      return proxV
        ?'Tu prГіxima vacuna pendiente es '+proxV.n+' ('+proxV.via+'). AplГӯcala lo antes posible вҖ” no hay razГіn para esperarla mГЎs.\n\nRevisa el historial completo en la secciГіn de VacunaciГіn de la app.'
        :'Todas tus vacunas registradas estГЎn al dГӯa. Recuerda el refuerzo de Newcastle cada 8-10 semanas durante la postura.';
    }
  }

  if(/mejorar|optimizar|aumentar|maximizar|quГ©.*cambiarГӯa|cГіmo.*hacerlo.*mejor/.test(p)){
    var mejoras=[];
    if(pct>0&&pct<90) mejoras.push('рҹ“Ҳ Revisando el programa de luz вҖ” debe ser 16 horas exactas y sin interrupciones');
    if(granja.precioKgAl>8.5) mejoras.push('рҹ’° Cotizando con 2-3 proveedores de alimento вҖ” tu precio actual de $'+granja.precioKgAl+'/kg estГЎ alto');
    if(!historial.length||historial.length<7) mejoras.push('рҹ“Ӣ Registrando diariamente вҖ” sin datos no puedo darte anГЎlisis precisos');
    if(temp>28) mejoras.push('рҹҢЎпёҸ Controlando la temperatura вҖ” '+temp+'В°C estГЎ afectando la postura');
    if(diasInv!==null&&diasInv<10) mejoras.push('рҹ“Ұ Aumentando el inventario de alimento вҖ” solo '+diasInv+' dГӯas es muy poco margen');
    if(!mejoras.length) mejoras.push('вң… Tu operaciГіn estГЎ bien. El siguiente nivel es: negociar mejor precio del huevo, reducir desperdicios de alimento y revisar uniformidad del lote');
    return 'Para mejorar tu operaciГіn con '+aves.toLocaleString('es-MX')+' aves en semana '+sem+', lo mГЎs impactante serГӯa:\n\n'+mejoras.join('\n')+'\n\nВҝQuieres que profundice en alguno de estos puntos?';
  }

  var resumen = 'ВҝMe puedes dar un poco mГЎs de contexto sobre lo que necesitas?\n\n';
  resumen += 'Tu granja actualmente: '+aves.toLocaleString('es-MX')+' aves de '+raza+', semana '+sem+', '+(pct>0?pct+'% de postura':'sin registro de postura hoy')+'.\n\n';
  resumen += 'Puedo ayudarte con:\n';
  resumen += 'вҖў Rentabilidad y finanzas\n';

  resumen += 'вҖў Comparativas y decisiones\n\n';
  resumen += 'ВҝQuГ© es lo que mГЎs te preocupa hoy?';
  return resumen;
}

function formatDG(texto){
  if(!texto) return '';

  var parrafos = texto.split(/\n\n+/);

  var html = parrafos.map(function(parrafo){
    var lineas = parrafo.split('\n');

    var esLista = lineas.length > 1 && lineas.every(function(l){
      return /^[вҖў\-\*\d]|^[\u{1F300}-\u{1FFFF}]|^[A-Z]{2,}:/u.test(l.trim()) || l.trim() === '';
    });

    if(esLista){
      var items = lineas.filter(function(l){ return l.trim(); }).map(function(linea){
        var l = linea.trim();

        var esSeccion = /^[A-ZГҒГүГҚГ“Гҡ\u{1F300}-\u{1FFFF}].{2,}:/u.test(l) && !l.startsWith('вҖў');
        var esTitulo  = /^\d+\./.test(l);

        if(esSeccion){
          var partes = l.split(':');
          var titulo = partes[0].trim();
          var resto  = partes.slice(1).join(':').trim();
          return '<div style="margin-bottom:6px">'
            +'<span style="font-size:11px;font-weight:800;color:#16A34A;display:block;margin-bottom:2px">'+titulo+(resto?':':'')+'</span>'
            +(resto?'<span style="color:#374151">'+resto+'</span>':'')
            +'</div>';
        } else if(esTitulo){
          var num = l.match(/^(\d+)\.\s*/)[1];
          var contenido = l.replace(/^\d+\.\s*/, '');
          return '<div style="display:flex;gap:8px;margin-bottom:5px;align-items:flex-start">'
            +'<span style="min-width:18px;height:18px;background:#16A34A;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:#fff;flex-shrink:0;margin-top:1px">'+num+'</span>'
            +'<span style="flex:1;color:#374151">'+formatInline(contenido)+'</span>'
            +'</div>';
        } else {
          var contenido2 = l.replace(/^[вҖў\-\*]\s*/, '');
          var emojiMatch = contenido2.match(/^([\u{1F300}-\u{1FFFF}\u{2600}-\u{27BF}][\uFE0F\u20E3]?\s)/u);
          var emoji = emojiMatch ? emojiMatch[1].trim() : 'вҖў';
          var texto2  = emojiMatch ? contenido2.slice(emojiMatch[0].length) : contenido2;
          return '<div style="display:flex;gap:7px;margin-bottom:5px;align-items:flex-start">'
            +'<span style="font-size:12px;flex-shrink:0;margin-top:1px">'+emoji+'</span>'
            +'<span style="flex:1;color:#374151">'+formatInline(texto2)+'</span>'
            +'</div>';
        }
      });
      return '<div style="margin-bottom:8px">'+items.join('')+'</div>';
    }

    var textoParrafo = lineas.join(' ');

    var secMatch = textoParrafo.match(/^([\u{1F300}-\u{1FFFF}\u{2600}-\u{27BF}\u{26A0}\u{2705}\u{274C}][\uFE0F\u20E3]?\s[A-ZГҒГүГҚГ“Гҡ][^:]+:)/u);
    if(secMatch){
      var titulo2 = secMatch[1];
      var resto2  = textoParrafo.slice(titulo2.length).trim();
      return '<div style="margin-bottom:8px">'
        +'<div style="font-size:11px;font-weight:800;color:#16A34A;margin-bottom:3px">'+titulo2+'</div>'
        +(resto2?'<div style="color:#374151">'+formatInline(resto2)+'</div>':'')
        +'</div>';
    }

    return '<div style="margin-bottom:8px;color:#374151">'+formatInline(textoParrafo)+'</div>';
  }).join('');

  return html;
}

function formatInline(texto){
  if(!texto) return '';
  return texto
    .replace(/\b(URGENTE|ALERTA|IMPORTANTE|NOTA|OJO|NUNCA|SIEMPRE|HOY MISMO)\b/g,
      '<strong style="color:#DC2626;font-weight:800">$1</strong>')
    .replace(/\b(Newcastle|Marek|Gumboro|Coccidiosis|Salmonela|Coriza|Micoplasmosis|Bronquitis)\b/g,
      '<em style="font-weight:700;color:#7C3AED">$1</em>');
}

var _climaCache = { temp: null, fecha: null, lat: null, lon: null };

function obtenerTemperaturaAuto(callback){
  var ahora = Date.now();
  var cacheValido = _climaCache.temp !== null && 
                    _climaCache.ts && 
                    (ahora - _climaCache.ts) < 30 * 60 * 1000;
  if(cacheValido){
    if(callback) callback(_climaCache.temp, _climaCache.lat, _climaCache.lon);
    return;
  }

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      function(pos){
        var lat = pos.coords.latitude;
        var lon = pos.coords.longitude;
        granja.climaLat = lat;
        granja.climaLon = lon;
        fetchTemperatura(lat, lon, callback);
      },
      function(){
        var lat = granja.climaLat || _climaCache.lat || 18.4613;
        var lon = granja.climaLon || _climaCache.lon || -97.3939;
        fetchTemperatura(lat, lon, callback);
      },
      { timeout: 5000, enableHighAccuracy: false, maximumAge: 300000 }
    );
  } else {
    var lat = granja.climaLat || _climaCache.lat || 18.4613;
    var lon = granja.climaLon || _climaCache.lon || -97.3939;
    fetchTemperatura(lat, lon, callback);
  }
}

function fetchTemperatura(lat, lon, callback){
  var url = 'https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon
    +'&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code'
    +'&timezone=auto&forecast_days=1';

  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data && data.current && data.current.temperature_2m !== undefined){
        var temp = Math.round(data.current.temperature_2m * 10) / 10;
        var hoy  = new Date().toISOString().split('T')[0];
        _climaCache = { temp: temp, fecha: hoy, lat: lat, lon: lon, ts: Date.now() };
        granja.tempHoy = temp;
        granja.climaLat = lat;
        granja.climaLon = lon;
        guardarEnStorage();
        if(callback) callback(temp, lat, lon);
        actualizarClimaEnDash(temp, data.current.weather_code);
      }
    })
    .catch(function(){
      if(granja.tempHoy){
        if(callback) callback(granja.tempHoy, lat, lon);
        actualizarClimaEnDash(granja.tempHoy, undefined);
      }
    });
}

function actualizarClimaEnDash(temp, wcode){
  var el = document.getElementById('clima-dash');
  if(!el) return;
  var icono, color, sub;
  if(temp >= 35){      icono='рҹ”Ҙ'; color='#EF4444'; sub='golpe de calor вҖ” baja hasta 15%'; }
  else if(temp >= 30){ icono='вҳҖпёҸ'; color='#EF4444'; sub='calor alto вҖ” baja 5-10%'; }
  else if(temp >= 28){ icono='вҡ пёҸ'; color='#D97706'; sub='calor moderado вҖ” baja 2-5%'; }
  else if(temp >= 18){ icono='вң…'; color='#16A34A'; sub='temperatura ideal'; }
  else if(temp >= 12){ icono='рҹҢӨпёҸ'; color='#D97706'; sub='frГӯo вҖ” aumenta consumo 10%'; }
  else {               icono='рҹҘ¶'; color='#EF4444'; sub='frГӯo crГӯtico вҖ” cierra cortinas'; }

  var desc = '';
  if(wcode !== undefined){
    if(wcode === 0) desc = 'Despejado';
    else if(wcode <= 3) desc = 'Parcialmente nublado';
    else if(wcode <= 48) desc = 'Nublado/neblina';
    else if(wcode <= 67) desc = 'Lluvia';
    else if(wcode <= 77) desc = 'Nieve';
    else if(wcode <= 82) desc = 'Lluvia intensa';
    else desc = 'Tormenta';
  }

  el.innerHTML = '<div style="font-size:9px;font-weight:700;color:#9CA3AF;margin-bottom:3px">рҹҢЎпёҸ Temperatura hoy</div>'
    +'<div style="font-size:14px;font-weight:900;color:'+color+'">'+icono+' '+temp+'В°C'+(desc?' В· '+desc:'')+'</div>'
    +'<div style="font-size:8px;color:#C4C4C4;margin-top:2px">'+sub+'</div>';
}

  showToast('вҸі Generando reporte...');

  var avgP  = (datos.reduce(function(s,r){return s+r.pctPostura;},0)/datos.length).toFixed(1);
  var totH  = datos.reduce(function(s,r){return s+r.huevos;},0);

  var totI  = datos.reduce(function(s,r){return s+r.ingresoDia;},0);

function _getRecData(id){

  if(!d.frec) d.frec = 'diario';
  if(!d.dias) d.dias = [];

function sincronizarRecordatorios() {
  if (!avigoTieneSession()) return;

  }).then(function() {
  }).catch(function() {});
}

function quitarHoraRec(id, idx){ idx=parseInt(idx);

  if(data.horas.length<=1){ showToast('Debe tener al menos un horario'); return; }
  data.horas.splice(idx,1);

  _reRenderHoras(id);

}

function cambiarHoraRec(id, idx, valor){ idx=parseInt(idx);
  var data = _getRecData(id);
  if (valor && valor.indexOf(':') >= 0) {
    var parts = valor.split(':');
    valor = parts[0].padStart(2,'0') + ':' + parts[1].padStart(2,'0');
  }
  data.horas[idx] = valor;
  guardarEnStorage();
  setTimeout(sincronizarRecordatorios, 500);
}

function backupDatos(){
  try {
    if(granja.lotes && granja.lotes[granja.loteActivo||0]){
      granja.lotes[granja.loteActivo||0].historial = historial.slice();
    }
    var raw = localStorage.getItem('avigo_v1');
    if(!raw){ showToast('Sin datos para respaldar'); return; }
    var fecha = new Date().toISOString().split('T')[0];
    var nombre = 'avigo-backup-'+granja.nombre.replace(/[^a-zA-Z0-9]/g,'-')+'-'+fecha+'.json';
    var blob = new Blob([raw], {type:'application/json'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = nombre;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    showToast('вң“ Respaldo descargado: '+nombre);
  } catch(e){ showToast('Error al crear respaldo: '+e.message); }
}

function restaurarDatos(input){
  var file = input.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    try {
      var datos = JSON.parse(e.target.result);
      if(!datos.g || !datos.g.nombre){ showToast('вҡ  Archivo no vГЎlido'); return; }
      if(!confirm('ВҝRestaurar datos de "'+datos.g.nombre+'"?\nSe reemplazarГЎn los datos actuales.')) return;
      localStorage.setItem('avigo_v1', e.target.result);
      showToast('вң“ Datos restaurados. Reiniciando...');
      setTimeout(function(){ location.reload(); }, 1000);
    } catch(e){ showToast('Error al restaurar: '+e.message); }
  };
  reader.readAsText(file);
  input.value = '';
}

var _lastAutoBackup = null;
function autoBackupCheck(){

    }
  } catch(e){}
}

function _calcForraje(m2, aves, precioKg){
  var m2n = parseFloat(m2)||0;
  var prod = Math.round(m2n * 3.125 * 10)/10;
  var kgNec = aves * 0.108 * 0.4;
  var pct = kgNec>0 ? Math.min(100, Math.round(prod/kgNec*100)) : 0;
  var col = pct>=80?'#16A34A':pct>=40?'#D97706':'#EF4444';
  var el1 = document.getElementById('pct-forraje');
  var el2 = document.getElementById('bar-forraje');
  var el3 = document.getElementById('ahorro-forraje');
  if(el1){ el1.textContent=pct+'%'; el1.style.color=col; }
  if(el2){ el2.style.width=pct+'%'; el2.style.background=col; }
  if(el3){ var ahorro=Math.round(prod*30*precioKg*0.85); el3.textContent='$'+ahorro.toLocaleString('es-MX'); }
}

function _toggleHuerto(id){
  var tp = _getTraspatio();
  if(!tp.huerto) tp.huerto=[];
  var idx = tp.huerto.indexOf(id);
  if(idx>=0) tp.huerto.splice(idx,1); else tp.huerto.push(id);
  granja.traspatio = tp;
  var btn = document.getElementById('hbtn-'+id);
  var tiene = tp.huerto.indexOf(id)>=0;
  if(btn){
    btn.style.borderColor = tiene?'#16A34A':'#E5E7EB';
    btn.style.background  = tiene?'#F0FDF4':'#fff';
    btn.textContent = tiene?'вң“':'+ ';
  }
}

function _agregarVenta(){
  var unidad = document.getElementById('vta-unidad')?.value||'pieza';
  var cant   = parseInt(document.getElementById('vta-cant')?.value)||1;
  var precio = parseFloat(document.getElementById('vta-precio')?.value)||0;
  var canal  = document.getElementById('vta-canal')?.value||'directo';
  var unidades={pieza:1,docena:12,cono:30,caja:360,kg:18};
  var huevos = cant*(unidades[unidad]||1);
  var ingreso= Math.round(precio*cant*100)/100;
  if(!precio||!cant){ showToast('Ingresa cantidad y precio'); return; }
  var tp=_getTraspatio();
  if(!tp.ventasHoy) tp.ventasHoy=[];
  tp.ventasHoy.push({unidad:unidad,cant:cant,precio:precio,canal:canal,huevos:huevos,ingreso:ingreso});
  var hoy=new Date().toISOString().split('T')[0];
  if(historial.length>0&&historial[0].fecha===hoy){
    var totalVentas=tp.ventasHoy.reduce(function(s,v){return s+(v.ingreso||0);},0);
    historial[0].ingresoVenta=totalVentas;
    historial[0].ingresoDia=totalVentas;
  }
  granja.traspatio=tp;
  guardarEnStorage();
  showToast('вң“ Venta registrada');
  nav('ventas_traspatio');
}

function _quitarVenta(idx){
  var tp=_getTraspatio();
  if(!tp.ventasHoy) return;
  tp.ventasHoy.splice(idx,1);
  var hoy=new Date().toISOString().split('T')[0];
  if(historial.length>0&&historial[0].fecha===hoy){
    var totalVentas=tp.ventasHoy.reduce(function(s,v){return s+(v.ingreso||0);},0);
    historial[0].ingresoVenta=totalVentas;
    historial[0].ingresoDia=totalVentas;
  }
  granja.traspatio=tp;
  guardarEnStorage();
  nav('ventas_traspatio');
}

screens.clientes_traspatio = function(){
  setStatus(false);
  var tp = _getTraspatio();

    tp.clientes = tp.clientes.filter(function(c){
      if(!c || !c.nombre || !c.nombre.trim()) return false;
      var q = c.cantidad!==undefined ? parseInt(c.cantidad) :
              c.docenas!==undefined  ? parseInt(c.docenas)  : -1;
      return !isNaN(q) && q > 0;
    }).map(function(c){
      var q = c.cantidad!==undefined ? parseInt(c.cantidad) : parseInt(c.docenas);
      var u = ['pieza','docena','cono','caja180','caja360'].indexOf(c.unidad)>=0 ? c.unidad : 'docena';
      return {nombre:c.nombre.trim(), unidad:u, cantidad:q};

function _limpiarYRedirigir(screen){
  if(granja.clientesJaula){
    granja.clientesJaula = granja.clientesJaula.filter(function(c){
      return c && c.nombre && c.nombre.trim().length>0 && parseInt(c.cantidad||c.docenas||0)>0;
    }).map(function(c){
      return {nombre:c.nombre.trim(), unidad:c.unidad||'docena', cantidad:parseInt(c.cantidad||c.docenas)};
    });
  }
  if(granja.traspatio && granja.traspatio.clientes){
    granja.traspatio.clientes = granja.traspatio.clientes.filter(function(c){
      return c && c.nombre && c.nombre.trim().length>0 && parseInt(c.cantidad||c.docenas||0)>0;
    }).map(function(c){
      return {nombre:c.nombre.trim(), unidad:c.unidad||'docena', cantidad:parseInt(c.cantidad||c.docenas)};
    });
  }
  guardarEnStorage();
  showToast('Listo, clientes corruptos eliminados');
  nav(screen);
}

function _toggleFormClienteJaula(){
  var el=document.getElementById('form-cliente-jaula');
  var btn=document.getElementById('btn-toggle-cliente-jaula');
  if(!el) return;
  var oculto = el.getAttribute('data-oculto')!=='false';
  if(oculto){
    el.setAttribute('data-oculto','false');
    el.style.display='block';
    el.style.marginTop='14px';
    if(btn){ btn.textContent='вҖ” Cancelar'; btn.style.background='#6B7280'; }
  } else {
    el.setAttribute('data-oculto','true');
    el.style.display='none';
    if(btn){ btn.textContent='Agregar вҶ’'; btn.style.background='#0284C7'; }
  }
}

function _calcCJIngreso(){
  var unidad   = document.getElementById('inp-cj-unidad')?.value||'docena';
  var cantidad = parseInt(document.getElementById('inp-cj-cantidad')?.value)||0;
  var UNIDADES = {pieza:1,docena:12,cono:30,caja180:180,caja360:360};
  var precio   = granja.precioHuevo||0;
  var ing      = Math.round(cantidad * precio * (UNIDADES[unidad]||12));
  var huevos   = cantidad*(UNIDADES[unidad]||12);
  var el=document.getElementById('cj-preview');
  if(el) el.innerHTML='<div style="font-size:22px;font-weight:900;color:#0284C7">$'+ing.toLocaleString('es-MX')+'</div><div style="font-size:10px;color:#075985;margin-top:1px">'+huevos+' huevos/semana</div>';
}

function _agregarClienteJaula(){
  var elNombre  = document.getElementById('inp-cj-nombre');
  var elUnidad  = document.getElementById('inp-cj-unidad');
  var elCantidad= document.getElementById('inp-cj-cantidad');
  var nombre    = elNombre   ? elNombre.value.trim()          : '';
  var unidad    = elUnidad   ? (elUnidad.value||'docena')     : 'docena';
  var cantidad  = elCantidad ? parseInt(elCantidad.value)||0  : 0;
  if(!nombre)  { showToast('Escribe el nombre del cliente'); return; }
  if(!cantidad){ showToast('Escribe la cantidad'); return; }
  if(!['pieza','docena','cono','caja180','caja360'].includes(unidad)) unidad='docena';
  if(!granja.clientesJaula) granja.clientesJaula=[];
  granja.clientesJaula.push({nombre:nombre, unidad:unidad, cantidad:cantidad});
  guardarEnStorage();
  showToast('вң“ '+nombre+' guardado ('+cantidad+' '+unidad+')');
  nav('clientes_jaula');
}

function _quitarClienteJaula(idx){
  if(!granja.clientesJaula) return;
  granja.clientesJaula.splice(idx,1);
  guardarEnStorage();
  nav('clientes_jaula');
}

</script>
